        </div>
        <div class="section-title">الرسوم البيانية</div>
        <div class="charts-grid">
          ${this.chartCard(sessionsLabel + ' حسب الأشهر', 'chartSessions', true)}
        </div>
      `;
      chartsToBuild.push(
        ['chartSessions', { type: 'bar', labels: chartData.monthNames, datasets: [{ label: sessionsLabel, data: chartData.sessions, color: '#C98A1D' }] }]
      );

    } else if (cat === 'performance') {
      const py = this._ctx.year, ppy = py - 1;
      body.innerHTML = `
        <div class="section-title">الأداء العام</div>
        <div class="cards-grid">
          ${this.card('نسبة الإنجاز', { value: c.completion_rate.value + '%', changePoints: c.completion_rate.changePoints }, rateIcon)}
          ${this.card(sessionsLabel, c.total_sessions, sessionsIcon)}
        </div>
        <div class="section-title">مؤشرات الأداء الشاملة (KPIs)</div>
        <div class="kpi-grid">
          ${this.kpiItem('نسبة إنجاز ' + reqTitle, kpis.completion_rate + '%', rateIcon)}
          ${this.kpiItem('متوسط ' + reqTitle + ' الشهري', fmtNum(kpis.avg_requests_month), avgIcon)}
          ${this.kpiItem('متوسط ' + visitsLabel + ' الشهري', fmtNum(kpis.avg_visits_month), avgIcon)}
          ${this.kpiItem('متوسط ' + sessionsLabel + ' الشهري', fmtNum(kpis.avg_sessions_month), avgIcon)}
          ${this.kpiItem('أكثر ' + referralDestLabel + ' لـ' + reqTitle, kpis.top_referral, trophyIcon)}
          ${this.kpiItem('أكثر شهر نشاطًا', kpis.top_month, trophyIcon)}
        </div>
        <div class="section-title">مقارنة ${py} بالعام السابق (${ppy})</div>
        <div class="charts-grid">
          ${this.chartCard(reqTotalLabel + ': ' + py + ' مقابل ' + ppy, 'chartYoY')}
          ${this.chartCard('تطور ' + reqTitle + ' حسب الأشهر', 'chartPerfTrend')}
        </div>
      `;
      const prevYearData = Analytics.dashboard(ppy);
      chartsToBuild.push(
        ['chartYoY', { type: 'bar', labels: [String(ppy), String(py)], datasets: [{ label: reqTotalLabel, data: [prevYearData.cards.total_requests.value, c.total_requests.value], color: '#0E4B3D' }] }],
        ['chartPerfTrend', { type: 'line', labels: chartData.monthNames, datasets: [{ label: reqTotalLabel, data: chartData.requests_total, color: '#0E4B3D' }] }]
      );
    } else if (cat === 'custom') {
      body.innerHTML = `
        <div class="section-title">مؤشرات إضافية</div>
        <div class="cards-grid">
          ${customTotals.flatMap(cc => cc.fields.map(f =>
            this.card(`${cc.title} — ${f.label}`, { value: cc.totals[f.key] }, '📌')
          )).join('')}
        </div>
        <p style="color:var(--text-muted);font-size:12.5px;margin-top:10px">
          يمكنك إضافة أو إعادة تسمية المحاور المخصّصة من الإعدادات ← الحقول والمؤشرات.
        </p>
      `;
    }

    chartsToBuild.forEach(([id, cfg]) => {
      const canvas = document.getElementById(this._idPrefix + id);
      if (canvas) new MiniChart(canvas, cfg);
    });

    // نفس حركة الأرقام الحيّة وانتقال الدخول المستخدمَين في العرض التقديمي، هنا أيضًا
    // في الصفحة الرئيسية — بلا أي تكرار للكود لأنهما يستخدمان نفس الدوال المشتركة.
    body.classList.remove('slide-in');
    void body.offsetWidth;
    body.classList.add('slide-in');
    animateCountUp('#' + bodyId);
  }
};


/* ===== pages/presentation.js ===== */
/**
 * ===== عرض تقديمي (وضع ملء الشاشة) =====
 * مبني على قائمة "شرائح" عامة {officeKey, officeTitle, categoryKey, categoryTitle, ctx}،
 * تعمل بنفس آلية التنقل/التشغيل التلقائي/لوحة المفاتيح بصرف النظر عن مصدر الشرائح:
 * - startForOffice(): من الصفحة الرئيسية داخل مكتب مُسجَّل دخوله بالفعل (وضع مكتب واحد).
 * - startForAllOffices(year): من شاشة اختيار المكتب مباشرة، يجمع بيانات كل مكتب ظاهر
 *   على حدة (بتبديل مؤقت للمكتب النشط في DataLayer دون التأثير على أي جلسة عمل حالية)،
 *   مع عنوان يوضح اسم كل مكتب أمام تصنيفاته.
 * يعيد استخدام منطق حساب البيانات والرسوم من DashboardPage مباشرة دون تكرار أي كود.
 */
const PresentationPage = {
  active: false,
  currentIndex: 0,
  intervalId: null,
  intervalSeconds: 10,
  _keyHandler: null,
  multiOffice: false,
  slides: [],

  /** وضع مكتب واحد: شرائح تصنيفات الصفحة الرئيسية الحالية فقط، كما كانت من قبل. */
  buildSingleOfficeSlides() {
    const cats = (DashboardPage.categories && DashboardPage.categories.length) ? DashboardPage.categories : DashboardPage.buildBaseCategories();
    return cats.map(c => ({ officeKey: null, officeTitle: null, categoryKey: c.key, categoryTitle: c.title, ctx: DashboardPage._ctx }));
  },

  /** وضع كل المكاتب: يمرّ على كل مكتب ظاهر، يحسب بياناته مؤقتًا، ويبني شرائحه مع عنوان
   *  المكتب. لا يؤثر على أي جلسة عمل حالية لأن هذا يُستدعى من شاشة الدخول قبل اختيار
   *  مكتب أصلًا — وإن اختار المستخدم مكتبًا بعدها، Workspace.enter() يضبط كل شيء
   *  بشكل صريح بصرف النظر عمّا تركه هذا الاستعراض المؤقت. */
  buildMultiOfficeSlides(year) {
    const slides = [];
    Workspace.visibleOffices().forEach(office => {
      StorageEngine.setWorkspace(office.key);
      DataLayer.init();
      const branchName = DataLayer.getSettings().branchName || office.defaultName;
      const ctx = {
        dash: Analytics.dashboard(year),
        chartData: Analytics.chartsData(year),
        kpis: Analytics.kpis(year),
        year,
        customTotals: Analytics.customCategoryTotals(year)
      };
      const base = DashboardPage.buildBaseCategories();
      const cats = ctx.customTotals.length ? [...base, { key: 'custom', title: 'مؤشرات إضافية' }] : base;
      cats.forEach(c => slides.push({ officeKey: office.key, officeTitle: branchName, categoryKey: c.key, categoryTitle: c.title, ctx }));
    });
    return slides;
  },

  startForOffice() {
    if (!DashboardPage._ctx) return; // لم تُحسَب بيانات لوحة التحكم بعد
    this.multiOffice = false;
    this.slides = this.buildSingleOfficeSlides();
    this._open();
  },

  startForAllOffices(year) {
    this.multiOffice = true;
    this.slides = this.buildMultiOfficeSlides(year || new Date().getFullYear());
    this._open();
  },

  _open() {
    if (!this.slides.length) return;
    this.active = true;
    this.currentIndex = 0;
    document.getElementById('presentationOverlay').classList.remove('hidden');

    // محاولة ملء شاشة حقيقي إن كان مدعومًا — الطبقة المُغطّاة عبر CSS تعمل بصريًا
    // بنفس الشكل حتى لو فشلت هذه المحاولة أو لم تكن مدعومة في متصفحك.
    try {
      const el = document.getElementById('presentationOverlay');
      if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    } catch (e) { /* تجاهل */ }

    this.renderSlide();
    this.play();

    this._keyHandler = (e) => {
      if (e.key === 'ArrowLeft') this.next();
      else if (e.key === 'ArrowRight') this.prev();
      else if (e.key === 'Escape') this.stop();
    };
    document.addEventListener('keydown', this._keyHandler);
  },

  stop() {
    this.active = false;
    this.pause();
    document.getElementById('presentationOverlay').classList.add('hidden');
    if (this._keyHandler) { document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
    try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) { /* تجاهل */ }
  },

  play() {
    this.pause();
    this.intervalId = setInterval(() => this.next(), this.intervalSeconds * 1000);
    const btn = document.getElementById('presPlayPauseBtn');
    if (btn) btn.textContent = '⏸ إيقاف مؤقت';
  },
  pause() {
    if (this.intervalId) { clearInterval(this.intervalId); this.intervalId = null; }
    const btn = document.getElementById('presPlayPauseBtn');
    if (btn) btn.textContent = '▶ تشغيل';
  },
  togglePlay() { this.intervalId ? this.pause() : this.play(); },

  next() { this.currentIndex = (this.currentIndex + 1) % this.slides.length; this.renderSlide(); },
  prev() { this.currentIndex = (this.currentIndex - 1 + this.slides.length) % this.slides.length; this.renderSlide(); },
  goTo(i) { this.currentIndex = i; this.renderSlide(); },

  changeSpeed(seconds) {
    this.intervalSeconds = seconds;
    if (this.intervalId) this.play(); // إعادة تشغيل المؤقت بالسرعة الجديدة فورًا
  },

  renderSlide() {
    const slide = this.slides[this.currentIndex];
    document.getElementById('presentationSlideTitle').textContent =
      slide.officeTitle ? `${slide.officeTitle} — ${slide.categoryTitle}` : slide.categoryTitle;

    if (this.multiOffice) {
      // تفعيل مكتب هذه الشريحة تحديدًا في DataLayer قبل الرسم، لأن renderCategory
      // يقرأ تسميات المحاور المخصّصة من DataLayer.getTableConfig() مباشرة، ويجب أن
      // تعكس مكتب الشريحة الحالية بالذات لا أي مكتب آخر.
      StorageEngine.setWorkspace(slide.officeKey);
      DataLayer.init();
    }
    DashboardPage._ctx = slide.ctx;
    DashboardPage.renderCategory('presentationSlideBody', slide.categoryKey);

    const dots = document.getElementById('presentationDots');
    dots.innerHTML = this.slides.map((s, i) =>
      `<span class="pres-dot ${i === this.currentIndex ? 'active' : ''}" data-i="${i}" title="${s.officeTitle ? s.officeTitle + ' — ' : ''}${s.categoryTitle}"></span>`
    ).join('');
    dots.querySelectorAll('.pres-dot').forEach(d => {
      d.addEventListener('click', () => { this.pause(); this.goTo(+d.dataset.i); });
    });

    this._playSlideTransition();
    this._animateCountUp();
  },

  /** إعادة تشغيل حركة الدخول لكل شريحة جديدة — إزالة الصنف وإعادة إضافته بعد فرض
   *  إعادة رسم (reflow) هي الطريقة القياسية لتكرار نفس حركة CSS من الصفر في كل مرة،
   *  لأن مجرد إبقاء الصنف موجودًا لا يُعيد تشغيل حركة مُشغَّلة أصلًا. */
  _playSlideTransition() {
    const body = document.getElementById('presentationSlideBody');
    body.classList.remove('slide-in');
    void body.offsetWidth;
    body.classList.add('slide-in');
  },

  _animateCountUp() {
    animateCountUp('#presentationSlideBody');
  }
};


/* ===== pages/entry.js ===== */
/**
 * ===== صفحة إدخال البيانات =====
 * لا تحتوي على أي منطق خاص بجدول معيّن — كل شيء مبني على DataLayer.getTableConfig()،
 * لذلك إضافة محور إحصائي جديد مستقبلًا يتم فقط بإضافة إعداده في DataLayer دون
 * لمس هذا الملف إطلاقًا.
 */
const EntryPage = {
  activeTab: 'requests',

  render(container, year) {
    const cfg = DataLayer.getTableConfig();
    const visibleEntries = Object.entries(cfg).filter(([, c]) => !c.hidden);

    if (!visibleEntries.length) {
      container.innerHTML = `<div class="card">جميع محاور الإدخال مخفية حاليًا. أظهر محورًا واحدًا على الأقل من الإعدادات ← الحقول والمؤشرات.</div>`;
      return;
    }
    if (!cfg[this.activeTab] || cfg[this.activeTab].hidden) {
      this.activeTab = visibleEntries.some(([k]) => k === 'requests') ? 'requests' : visibleEntries[0][0];
    }

    container.innerHTML = `<div class="tabs" id="entryTabs"></div><div class="card" id="entryCard"></div>`;
    const tabsEl = document.getElementById('entryTabs');
    tabsEl.innerHTML = visibleEntries.map(([key, m]) =>
      `<button class="tab-btn ${key === this.activeTab ? 'active' : ''}" data-tab="${key}">${m.title}</button>`
    ).join('');
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.activeTab = btn.dataset.tab;
        tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        this.renderActiveModule(year);
      });
    });
    this.renderActiveModule(year);
  },

  /** يوجّه لمنطق الرسم المناسب — النمط العام لمعظم المحاور، أو منطق مخصّص للمحاور
   *  ذات البنية الغنية (مثل "الطلبات" التي لها حقول متغيّرة العدد لا تناسب النمط
   *  المسطّح العام). */
  renderActiveModule(year) {
    const cfg = DataLayer.getTableConfig()[this.activeTab];
    if (cfg.structured && this.activeTab === 'requests') this.renderRequestsModule(year);
    else this.renderModule(year);
  },

  renderModule(year) {
    const mod = DataLayer.getTableConfig()[this.activeTab];
    const card = document.getElementById('entryCard');
    const depts = DataLayer.listDepartments(true);
    const rows = DataLayer.listRecords(this.activeTab, { year });

    const deptField = mod.hasDept ? `
      <div class="field"><label>الإدارة</label>
        <select id="f_department_id">${depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('') || '<option value="">لا توجد إدارات — أضِف إدارة أولًا</option>'}</select>
      </div>` : '';

    const now = new Date();
    const todayMonth = now.getMonth() + 1, todayYear = now.getFullYear(), todayDay = now.getDate();
    const quickAddDeptField = mod.hasDept ? `
      <div class="field"><label>الإدارة</label>
        <select id="qa_department_id">${depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('') || '<option value="">لا توجد إدارات — أضِف إدارة أولًا</option>'}</select>
      </div>` : '';

    const numberFields = mod.valueFields.filter(f => !mod.fieldTypes[f] || mod.fieldTypes[f] === 'number');
    const textFields = mod.valueFields.filter(f => mod.fieldTypes[f] === 'text');
    // حقول "label" نص بسيط ثابت لكل شهر (لا تجميع تكراري) — مثل "موضوع الجلسة"، الذي
    // يختلف كل مرة لكنه قيمة واحدة توصف ذلك الشهر بالذات، لا قائمة تراكمية. تظهر في
    // نموذج الحفظ الكامل مع الحقول الرقمية (لا في الإضافة السريعة، لأنه لا معنى
    // "لزيادة" نص وصفي تدريجيًا كما تُزاد الأرقام).
    const labelFields = mod.valueFields.filter(f => mod.fieldTypes[f] === 'label');

    // الحقول النصية (مثل "المناسبة": تعزية، عزاء...) تُبنى بمنطق تجميع تكراري، لا رقم
    // واحد يُكتب كل مرة — لذلك تظهر فقط في قسم الإضافة السريعة (تسجيل تكرار واحد في
    // كل مرة)، ولا تظهر في نموذج "كتابة المجموع الشهري كاملًا" لأن لا مجموع واحد لها.
    const textFieldsHtml = textFields.map(f => {
      const existingValues = [...new Set(rows.flatMap(r => (Array.isArray(r[f]) ? r[f] : []).map(t => t.value)))];
      return `
        <div class="field">
          <label>${mod.labels[f]}</label>
          <input type="text" id="qa_${f}" list="qa_${f}_list" placeholder="اكتب القيمة، مثل: تعزية">
          <datalist id="qa_${f}_list">${existingValues.map(v => `<option value="${v}">`).join('')}</datalist>
        </div>`;
    }).join('');

    card.innerHTML = `
      <h3 style="margin-top:0">إدخال بيانات: ${mod.title}</h3>

      <div class="card" style="margin-bottom:16px;border:1px solid var(--gold-600)">
        <h3 style="margin-top:0;font-size:14px">➕ إضافة سريعة</h3>
        <p style="color:var(--text-muted);font-size:11.5px;margin-top:0">
          افتراضيًا لليوم الحالي (${todayDay} ${MONTHS[todayMonth - 1]} ${todayYear})، ويمكنك تغيير الشهر/السنة أدناه
          لإضافة بيانات شهر سابق. الحقول الرقمية: أدخل العدد فقط، يُضاف تلقائيًا لمجموع ذلك الشهر.
          ${textFields.length ? ' الحقول النصية: اكتب القيمة (مثل "تعزية")، وتُسجَّل كتكرار واحد يُضاف لعدّاد تلك القيمة ضمن الشهر المختار.' : ''}
        </p>
        <div class="form-grid">
          <div class="field"><label>الشهر</label>
            <select id="qa_month">${MONTHS.map((m, i) => `<option value="${i + 1}" ${i + 1 === todayMonth ? 'selected' : ''}>${m}</option>`).join('')}</select>
          </div>
          <div class="field"><label>السنة</label><input type="number" id="qa_year" value="${todayYear}"></div>
        </div>
        <p style="color:var(--text-muted);font-size:11px;margin-top:-6px">≈ ${hijriLabel(todayYear, todayMonth)} (تقريبي)</p>
        ${quickAddDeptField}
        <div class="form-grid">
          ${numberFields.map(f => `<div class="field"><label>${mod.labels[f]}</label><input type="number" min="0" id="qa_${f}" value="0"></div>`).join('')}
          ${textFieldsHtml}
        </div>
        <button class="btn btn-gold btn-small" id="quickAddBtn" style="margin-top:8px">إضافة لمجموع الشهر المختار</button>
      </div>

      ${(numberFields.length || labelFields.length) ? `
      <div class="form-grid">
        <div class="field"><label>الشهر</label><select id="f_month">${MONTHS.map((m, i) => `<option value="${i + 1}">${m}</option>`).join('')}</select></div>
        <div class="field"><label>السنة</label><input type="number" id="f_year" value="${year}"></div>
        ${deptField}
        ${labelFields.map(f => `<div class="field"><label>${mod.labels[f]}</label><input type="text" id="f_${f}" placeholder="مثال: التطورات التنموية بالمنطقة"></div>`).join('')}
        ${numberFields.map(f => `<div class="field"><label>${mod.labels[f]}</label><input type="number" min="0" id="f_${f}" value="0"></div>`).join('')}
      </div>
      <button class="btn btn-primary" id="saveEntryBtn">حفظ البيانات</button>
      ` : `<p style="color:var(--text-muted);font-size:12.5px">كل حقول هذا المحور نصية تراكمية — الإدخال يتم فقط عبر "الإضافة السريعة" أعلاه.</p>`}

      <div class="table-wrap" style="margin-top:20px">
        <table>
          <thead><tr>
            <th>الشهر</th><th>السنة</th>${mod.hasDept ? '<th>الإدارة</th>' : ''}
            ${mod.valueFields.map(f => `<th>${mod.labels[f]}</th>`).join('')}<th>إجراءات</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td>${MONTHS[r.month - 1]}</td><td>${r.year}</td>
              ${mod.hasDept ? `<td>${depts.find(d => d.id === r.department_id)?.name || '—'}</td>` : ''}
              ${mod.valueFields.map(f => `<td>${
                mod.fieldTypes[f] === 'text'
                  ? ((Array.isArray(r[f]) ? r[f] : []).map(t => `${t.value} ×${t.count}`).join('، ') || '—')
                  : mod.fieldTypes[f] === 'label'
                    ? (r[f] || '—')
                    : fmtNum(r[f])
              }</td>`).join('')}
              <td><button class="btn btn-ghost btn-small" data-del="${r.id}">حذف</button></td>
            </tr>`).join('') || `<tr><td colspan="10" style="text-align:center;color:var(--text-muted)">لا توجد بيانات مُدخلة بعد لهذا العام</td></tr>`}
          </tbody>
        </table>
      </div>
    `;

    document.getElementById('quickAddBtn').addEventListener('click', () => {
      const keys = { month: +document.getElementById('qa_month').value, year: +document.getElementById('qa_year').value };
      if (mod.hasDept) {
        const depVal = document.getElementById('qa_department_id').value;
        if (!depVal) return toast('يرجى إضافة إدارة أولًا من شاشة الإدارات', true);
        keys.department_id = +depVal;
      }
      const increments = {};
      let hasAny = false;
      numberFields.forEach(f => {
        const v = +document.getElementById(`qa_${f}`).value || 0;
        increments[f] = v;
        if (v > 0) hasAny = true;
      });
      const textEntries = textFields.map(f => ({ field: f, value: document.getElementById(`qa_${f}`).value.trim() })).filter(e => e.value);
      if (!hasAny && !textEntries.length) return toast('أدخل رقمًا أكبر من صفر أو قيمة نصية واحدة على الأقل', true);

      let summaryParts = [];
      if (numberFields.length) {
        const result = DataLayer.incrementRecord(this.activeTab, keys, increments);
        summaryParts = summaryParts.concat(numberFields.map(f => `${mod.labels[f]}: ${fmtNum(result[f])}`));
      }
      textEntries.forEach(({ field, value }) => {
        const tally = DataLayer.incrementTextTally(this.activeTab, keys, field, value);
        const entry = tally.find(t => t.value === value);
        summaryParts.push(`${mod.labels[field]} — ${value}: ${entry.count}`);
      });
      toast(`تمت الإضافة — مجموع شهر ${MONTHS[keys.month - 1]} ${keys.year} الآن: ${summaryParts.join('، ')}`);
      this.renderModule(year);
    });

    if (numberFields.length || labelFields.length) {
      document.getElementById('saveEntryBtn').addEventListener('click', () => {
        const body = { month: +document.getElementById('f_month').value, year: +document.getElementById('f_year').value };
        if (mod.hasDept) {
          const depVal = document.getElementById('f_department_id').value;
          if (!depVal) return toast('يرجى إضافة إدارة أولًا من شاشة الإدارات', true);
          body.department_id = +depVal;
        }
        labelFields.forEach(f => { body[f] = document.getElementById(`f_${f}`).value.trim(); });
        numberFields.forEach(f => { body[f] = +document.getElementById(`f_${f}`).value || 0; });
        DataLayer.upsertRecord(this.activeTab, body);
        toast('تم حفظ البيانات بنجاح');
        this.renderModule(year);
      });
    }

    card.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('هل أنت متأكد من حذف هذا السجل؟')) return;
        DataLayer.deleteRecord(this.activeTab, +btn.dataset.del);
        toast('تم الحذف');
        this.renderModule(year);
      });
    });
  },

  /** يولّد قالب CSV بعناوين الأعمدة المطابقة للمحور الحالي — نص عادي خالص، بلا أي
   *  مكتبة خارجية، يُفتح ويُحرَّر ويُحفَظ من Excel بشكل طبيعي تمامًا. */
  /** حالة مسودة النموذج مؤقتة لجلسة العمل الحالية — صفوف الإحالة والإجراءات الحالية
   *  قابلة للإضافة/الحذف بحرية قبل الحفظ، كما طلب المستخدم (وليست قائمة ثابتة). */
  _reqDraft: { referrals: [{ count: '', destination: '' }], inProgressItems: [{ count: '', action: '' }] },
  _reqInitialized: false, // يضمن محاولة التحميل التلقائي مرة واحدة فقط عند أول عرض، لا في كل إعادة رسم

  renderRequestsModule(year) {
    const card = document.getElementById('entryCard');
    const rows = DataLayer.listRecords('requests', { year });
    const now = new Date();
    const month = this._reqMonth || now.getMonth() + 1;
    const y = this._reqYear || year;
    const depts = DataLayer.listDepartments();

    // جهة الإحالة أصبحت مرتبطة بقائمة الإدارات في الإعدادات (قائمة اختيار)، بينما
    // "الإجراء الحالي للطلبات" يبقى نصًا حرًا لأنه وصف إجراء لا جهة محددة. إن كانت
    // قيمة محفوظة سابقًا (نص حر قديم) لا تطابق أي إدارة حالية، نُبقيها كخيار إضافي
    // في القائمة حتى لا تُفقد أو تُستبدل صامتة بقيمة مختلفة عند إعادة العرض.
    const referralSelect = (value) => {
      const known = depts.some(d => d.name === value);
      return `<select class="req-text">
        <option value="">— اختر جهة الإحالة —</option>
        ${depts.map(d => `<option value="${d.name}" ${d.name === value ? 'selected' : ''}>${d.name}</option>`).join('')}
        ${value && !known ? `<option value="${value}" selected>${value} (قيمة سابقة غير مطابقة لإدارة حالية)</option>` : ''}
      </select>`;
    };

    const rowsHtml = (items, kind) => items.map((item, i) => `
      <div class="form-grid" style="grid-template-columns:120px 1fr auto;align-items:end;margin-bottom:8px" data-req-row="${kind}" data-idx="${i}">
        <div class="field"><label>${i === 0 ? 'العدد' : '&nbsp;'}</label><input type="number" min="0" class="req-count" value="${item.count}"></div>
        <div class="field"><label>${i === 0 ? (kind === 'referral' ? 'جهة الإحالة' : 'الإجراء الحالي للطلبات') : '&nbsp;'}</label>${
          kind === 'referral' ? referralSelect(item.destination) : `<input type="text" class="req-text" value="${item.action}">`
        }</div>
        <button type="button" class="btn btn-ghost btn-small" data-remove-row="${kind}:${i}" ${items.length <= 1 ? 'style="visibility:hidden"' : ''}>✕</button>
      </div>
    `).join('');

    card.innerHTML = `
      <h3 style="margin-top:0">إدخال بيانات: الطلبات</h3>
      <p style="color:var(--text-muted);font-size:12px;margin-top:0">
        يمكن تسجيل أكثر من "نوع طلب" لنفس الشهر (مثل: طلبات حقوقية، طلبات مساعدة مالية...) كسجلات منفصلة.
        اختر الشهر والسنة، ثم اكتب نوع الطلب — إن كان موجودًا بالفعل لهذا الشهر ستُحمَّل بياناته للتعديل،
        وإن كان جديدًا سيُضاف كسجل مستقل بجانب الأنواع الأخرى.
      </p>

      <div class="form-grid">
        <div class="field"><label>الشهر</label><select id="rq_month">${MONTHS.map((m, i) => `<option value="${i + 1}" ${i + 1 === month ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
        <div class="field"><label>السنة</label><input type="number" id="rq_year" value="${y}"></div>
        <div class="field">
          <label>نوع الطلب</label>
          <input type="text" id="rq_type" list="rq_typeList" value="${this._reqTypeVal || ''}" placeholder="مثال: طلبات حقوقية">
          <datalist id="rq_typeList">
            ${[...new Set(rows.map(r => r.requestType).filter(Boolean))].map(t => `<option value="${t}">`).join('')}
          </datalist>
        </div>
        <div class="field"><label>العدد الإجمالي</label><input type="number" min="0" id="rq_total" value="${this._reqTotalVal ?? 0}"></div>
      </div>
      <p style="color:var(--text-muted);font-size:11px;margin-top:-6px">≈ ${hijriLabel(y, month)} (تقريبي)</p>

      <div class="card" style="margin:16px 0;background:var(--surface-2)">
        <h3 style="margin-top:0;font-size:14px">عدد الطلبات المحالة وجهة الإحالة</h3>
        <div id="rq_referrals">${rowsHtml(this._reqDraft.referrals, 'referral')}</div>
        <button type="button" class="btn btn-ghost btn-small" id="rq_addReferral">+ إضافة جهة إحالة</button>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>آلية المتابعة</label>
          <select id="rq_followUp">
            <option value="office" ${this._reqFollowUp !== 'other' ? 'selected' : ''}>يقوم مكتب التواصل والعلاقات العامة بالإمارة بمتابعة الطلبات</option>
            <option value="other" ${this._reqFollowUp === 'other' ? 'selected' : ''}>أخرى</option>
          </select>
        </div>
        <div class="field" id="rq_followUpOtherWrap" style="${this._reqFollowUp === 'other' ? '' : 'display:none'}">
          <label>وضّح آلية المتابعة</label>
          <input type="text" id="rq_followUpOther" value="${this._reqFollowUpOtherVal || ''}">
        </div>
      </div>

      <div class="card" style="margin:16px 0;background:var(--surface-2)">
        <h3 style="margin-top:0;font-size:14px">تحت الإجراء والإجراء الحالي للطلبات</h3>
        <div id="rq_inProgress">${rowsHtml(this._reqDraft.inProgressItems, 'inprogress')}</div>
        <button type="button" class="btn btn-ghost btn-small" id="rq_addInProgress">+ إضافة إجراء</button>
      </div>

      <div class="form-grid">
        <div class="field"><label>الطلبات المنجزة</label><input type="number" min="0" id="rq_completed" value="${this._reqCompletedVal ?? 0}"></div>
      </div>
      <button class="btn btn-primary" id="rq_saveBtn" style="margin-top:8px">حفظ بيانات الطلبات</button>

      <div class="table-wrap" style="margin-top:24px">
        <table>
          <thead><tr><th>الشهر</th><th>السنة</th><th>نوع الطلب</th><th>الإجمالي</th><th>المحالة</th><th>تحت الإجراء</th><th>المنجزة</th><th>إجراءات</th></tr></thead>
          <tbody>
            ${rows.map(r => {
              const referred = (r.referrals || []).reduce((s, x) => s + x.count, 0);
              const inProg = (r.inProgressItems || []).reduce((s, x) => s + x.count, 0);
              return `<tr>
                <td>${MONTHS[r.month - 1]}</td><td>${r.year}</td><td>${r.requestType || '—'}</td>
                <td>${fmtNum(r.totalCount)}</td><td>${fmtNum(referred)}</td><td>${fmtNum(inProg)}</td><td>${fmtNum(r.completedCount)}</td>
                <td>
                  <button class="btn btn-ghost btn-small" data-edit-req="${r.id}">تعديل</button>
                  <button class="btn btn-ghost btn-small" data-del-req="${r.id}">حذف</button>
                </td>
              </tr>`;
            }).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">لا توجد بيانات مُدخلة بعد لهذا العام</td></tr>`}
          </tbody>
        </table>
      </div>
    `;

    // تحميل تلقائي: يحاول مطابقة سجل موجود بالشهر + السنة + نوع الطلب المكتوب حاليًا.
    // إن لم يوجد نوع مكتوب بعد، أو لم يوجد سجل مطابق، يُبقي النموذج كما هو (لا يمسح
    // ما كتبه المستخدم للتو) — لأن غياب التطابق يعني على الأرجح أنه يُدخل نوعًا جديدًا.
    const tryAutoLoad = (forceBlankIfNoMatch = false) => {
      const m = +document.getElementById('rq_month').value, yy = +document.getElementById('rq_year').value;
      const typeVal = document.getElementById('rq_type').value.trim();
      this._reqMonth = m; this._reqYear = yy;
      const existing = DataLayer.getStructuredRequest(m, yy, typeVal);
      if (existing) {
        this._reqTypeVal = existing.requestType;
        this._reqTotalVal = existing.totalCount;
        this._reqDraft = {
          referrals: existing.referrals.length ? existing.referrals.map(x => ({ ...x })) : [{ count: '', destination: '' }],
          inProgressItems: existing.inProgressItems.length ? existing.inProgressItems.map(x => ({ ...x })) : [{ count: '', action: '' }]
        };
        this._reqFollowUp = existing.followUpMechanism;
        this._reqFollowUpOtherVal = existing.followUpOther;
        this._reqCompletedVal = existing.completedCount;
        this.renderRequestsModule(year);
      } else if (forceBlankIfNoMatch) {
        this._reqTypeVal = typeVal; this._reqTotalVal = 0; this._reqCompletedVal = 0;
        this._reqFollowUp = 'office'; this._reqFollowUpOtherVal = '';
        this._reqDraft = { referrals: [{ count: '', destination: '' }], inProgressItems: [{ count: '', action: '' }] };
        this.renderRequestsModule(year);
      }
    };
    document.getElementById('rq_month').addEventListener('change', () => tryAutoLoad(true));
    document.getElementById('rq_year').addEventListener('change', () => tryAutoLoad(true));
    document.getElementById('rq_type').addEventListener('change', () => tryAutoLoad(false));

    // مزامنة القيم المكتوبة حاليًا في الحقول البسيطة إلى الحالة المؤقتة قبل أي إعادة رسم
    const syncSimpleFields = () => {
      this._reqTypeVal = document.getElementById('rq_type').value;
      this._reqTotalVal = +document.getElementById('rq_total').value || 0;
      this._reqCompletedVal = +document.getElementById('rq_completed').value || 0;
      this._reqFollowUp = document.getElementById('rq_followUp').value;
      this._reqFollowUpOtherVal = document.getElementById('rq_followUpOther') ? document.getElementById('rq_followUpOther').value : '';
    };

    document.getElementById('rq_followUp').addEventListener('change', (e) => {
      document.getElementById('rq_followUpOtherWrap').style.display = e.target.value === 'other' ? '' : 'none';
    });

    document.getElementById('rq_addReferral').addEventListener('click', () => {
      syncSimpleFields();
      this._reqDraft.referrals.push({ count: '', destination: '' });
      this.renderRequestsModule(year);
    });
    document.getElementById('rq_addInProgress').addEventListener('click', () => {
      syncSimpleFields();
      this._reqDraft.inProgressItems.push({ count: '', action: '' });
      this.renderRequestsModule(year);
    });
    card.querySelectorAll('[data-remove-row]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncSimpleFields();
        const [kind, idx] = btn.dataset.removeRow.split(':');
        const arrKey = kind === 'referral' ? 'referrals' : 'inProgressItems';
        this._reqDraft[arrKey].splice(+idx, 1);
        if (!this._reqDraft[arrKey].length) this._reqDraft[arrKey].push(kind === 'referral' ? { count: '', destination: '' } : { count: '', action: '' });
        this.renderRequestsModule(year);
      });
    });

    document.getElementById('rq_saveBtn').addEventListener('click', () => {
      const readRows = (containerId, kind) => {
        const rowsEls = document.getElementById(containerId).querySelectorAll('[data-req-row]');
        return Array.from(rowsEls).map(el => {
          const count = +el.querySelector('.req-count').value || 0;
          const text = el.querySelector('.req-text').value.trim();
          return kind === 'referral' ? { count, destination: text } : { count, action: text };
        });
      };
      const body = {
        month: +document.getElementById('rq_month').value,
        year: +document.getElementById('rq_year').value,
        requestType: document.getElementById('rq_type').value.trim(),
        totalCount: +document.getElementById('rq_total').value || 0,
        referrals: readRows('rq_referrals', 'referral'),
        followUpMechanism: document.getElementById('rq_followUp').value,
        followUpOther: document.getElementById('rq_followUpOther') ? document.getElementById('rq_followUpOther').value.trim() : '',
        inProgressItems: readRows('rq_inProgress', 'inprogress'),
        completedCount: +document.getElementById('rq_completed').value || 0
      };
      DataLayer.upsertStructuredRequest(body);
      toast('تم حفظ بيانات الطلبات بنجاح');
      // إعادة الفورم لحالة فارغة جاهزة لإدخال نوع طلب آخر لنفس الشهر مباشرة، بدل
      // إعادة تحميل نفس السجل الذي حُفظ للتو.
      this._reqTypeVal = ''; this._reqTotalVal = 0; this._reqCompletedVal = 0;
      this._reqFollowUp = 'office'; this._reqFollowUpOtherVal = '';
      this._reqDraft = { referrals: [{ count: '', destination: '' }], inProgressItems: [{ count: '', action: '' }] };
      this.renderRequestsModule(year);
    });

    card.querySelectorAll('[data-edit-req]').forEach(btn => {
      btn.addEventListener('click', () => {
        const record = DataLayer.listRecords('requests', {}).find(r => r.id === +btn.dataset.editReq);
        if (!record) return;
        document.getElementById('rq_month').value = record.month;
        document.getElementById('rq_year').value = record.year;
        document.getElementById('rq_type').value = record.requestType;
        tryAutoLoad(true);
      });
    });
    card.querySelectorAll('[data-del-req]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('هل أنت متأكد من حذف بيانات هذا الشهر؟')) return;
        DataLayer.deleteRecord('requests', +btn.dataset.delReq);
        toast('تم الحذف');
        this.renderRequestsModule(year);
      });
    });

    // تحميل أولي عند أول عرض للنموذج فقط (وليس عند كل إعادة رسم بسبب إضافة/حذف صف)
    if (!this._reqInitialized) { this._reqInitialized = true; tryAutoLoad(false); }
  }
};


/* ===== pages/departments.js ===== */
/**
 * ===== صفحة الإدارات =====
 */
const DepartmentsPage = {
  render(container, year) {
    const depts = DataLayer.listDepartments();

    container.innerHTML = `
      <div class="card">
        <div class="form-grid" style="grid-template-columns:1fr auto">
          <div class="field"><label>اسم الإدارة الجديدة</label><input type="text" id="newDeptName" placeholder="مثال: إدارة الاتصال الرقمي"></div>
          <div class="field" style="align-self:end"><button class="btn btn-primary" id="addDeptBtn">إضافة إدارة</button></div>
        </div>
        ${Workspace.otherOfficeCheckbox('newDept')}
        <div class="table-wrap">
          <table>
            <thead><tr><th>اسم الإدارة</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody>
              ${depts.map(d => `
                <tr>
                  <td><span class="dept-name" data-id="${d.id}">${d.name}</span></td>
                  <td><span class="badge ${d.active ? 'on' : 'off'}">${d.active ? 'مفعّلة' : 'موقوفة'}</span></td>
                  <td class="table-actions">
                    <button class="btn btn-ghost btn-small" data-rename="${d.id}">تعديل الاسم</button>
                    <button class="btn btn-ghost btn-small" data-toggle="${d.id}" data-active="${d.active}">${d.active ? 'إيقاف' : 'تفعيل'}</button>
                    <button class="btn btn-ghost btn-small" data-del="${d.id}">حذف</button>
                  </td>
                </tr>
              `).join('') || `<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">لا توجد إدارات مسجّلة</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('addDeptBtn').addEventListener('click', () => {
      const input = document.getElementById('newDeptName');
      if (!input.value.trim()) return toast('يرجى إدخال اسم الإدارة', true);
      const name = input.value.trim();
      const applyBoth = document.getElementById('other_office_newDept')?.checked;
      try {
        DataLayer.addDepartment(name);
        if (applyBoth) {
          Workspace.applyToOtherOffice(() => {
            try { DataLayer.addDepartment(name); } catch (e) { /* موجودة أصلًا في المكتب الآخر، تجاهل */ }
          });
        }
        toast('تمت إضافة الإدارة' + (applyBoth ? ' في المكتبين' : ''));
        App.renderRoute();
      } catch (e) { toast(e.message, true); }
    });

    container.querySelectorAll('[data-rename]').forEach(btn => {
      btn.addEventListener('click', () => {
        const current = btn.closest('tr').querySelector('.dept-name').textContent;
        const name = prompt('اسم الإدارة الجديد:', current);
        if (!name || !name.trim()) return;
        DataLayer.updateDepartment(+btn.dataset.rename, { name: name.trim() });
        let bothMsg = '';
        if (confirm('تطبيق نفس إعادة التسمية على المكتب الآخر أيضًا؟')) {
          Workspace.applyToOtherOffice(() => {
            const otherDept = DataLayer.listDepartments().find(d => d.name === current);
            if (otherDept) DataLayer.updateDepartment(otherDept.id, { name: name.trim() });
          });
          bothMsg = ' في المكتبين';
        }
        toast('تم التعديل' + bothMsg);
        App.renderRoute();
      });
    });

    container.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const active = btn.dataset.active === '1' ? 0 : 1;
        DataLayer.updateDepartment(+btn.dataset.toggle, { active });
        toast(active ? 'تم تفعيل الإدارة' : 'تم إيقاف الإدارة'); App.renderRoute();
      });
    });

    container.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('حذف الإدارة نهائيًا؟ يفضّل الإيقاف بدلاً من الحذف إذا كانت مرتبطة ببيانات سابقة.')) return;
        try { DataLayer.deleteDepartment(+btn.dataset.del); toast('تم الحذف'); App.renderRoute(); }
        catch (e) { toast(e.message, true); }
      });
    });
  }
};


/* ===== pages/reports.js ===== */
/**
 * ===== صفحة التقارير =====
 * تعتمد بالكامل على Analytics لحساب الأرقام — لا حسابات محلية هنا.
 */
const ReportsPage = {
  // حالة "الملخص التنفيذي" مؤقتة لجلسة العمل الحالية فقط (لا تُحفظ)، لأنها نص خاص
  // بهذا التقرير تحديدًا وليست إعدادًا عامًا للنظام.
  summaryState: {
    intro: '',
    recommendations: '',
    selected: new Set(['requests_total', 'requests_completed', 'requests_in_progress', 'completion_rate'])
  },
  pageOrientation: 'portrait',
  includeCover: false,

  /** حقول العنوان والفترة الزمنية للغلاف — تُعرض فقط حين تفعيل "إرفاق غلاف خارجي"
   *  وتوفّر خلفية غلاف مرفوعة من الإعدادات. مشتركة بين كل الصفحات القابلة للطباعة
   *  (التقارير، عن المكتب، دليل الإجراءات) حتى لا يتكرر نفس الكود في كل واحدة. */
  coverOptionsHtml(idPrefix, defaultTitle, defaultFrom, defaultTo) {
    const g = StorageEngine.readGlobal() || {};
    if (!g.coverBackground) {
      return `<p style="color:var(--text-muted);font-size:11.5px">لا توجد خلفية غلاف مرفوعة بعد — أضِفها من الإعدادات ← عام.</p>`;
    }
    return `
      <div class="field"><label>عنوان الغلاف</label><input type="text" id="${idPrefix}_title" value="${defaultTitle}"></div>
      <div class="form-grid">
        <div class="field"><label>الفترة من (اختياري)</label><input type="text" id="${idPrefix}_from" value="${defaultFrom || ''}"></div>
        <div class="field"><label>إلى</label><input type="text" id="${idPrefix}_to" value="${defaultTo || ''}"></div>
      </div>
    `;
  },
  readCoverOptions(idPrefix) {
    const titleEl = document.getElementById(idPrefix + '_title');
    if (!titleEl) return null;
    return {
      title: titleEl.value.trim(),
      periodFrom: document.getElementById(idPrefix + '_from')?.value.trim() || '',
      periodTo: document.getElementById(idPrefix + '_to')?.value.trim() || ''
    };
  },

  rteToolbarHtml(targetId) { return RTE.toolbarHtml(targetId); },
  wireRte(targetId) {
    RTE.wire(targetId, (html) => {
      if (targetId === 'summaryIntro') this.summaryState.intro = html;
      else this.summaryState.recommendations = html;
    });
  },

  /** المؤشرات المتاحة للاختيار في الملخص التنفيذي — تُبنى من ناتج aggregateRange نفسه
   *  دون أي حساب إضافي، بالإضافة إلى أي محاور مخصّصة أضافها المستخدم. */
  summaryIndicatorDefs(d) {
    // كل تسميات هذا الجدول مشتقة من DataLayer.getTableConfig() مباشرة، وليست نصوصًا
    // ثابتة — بنفس المنطق المطبَّق على الصفحة الرئيسية تمامًا، حتى تنعكس أي إعادة
    // تسمية لمحور أو حقل من الإعدادات هنا أيضًا دون استثناء. حقل group يُستخدم لتقسيم
    // القائمة في الواجهة تحت عنوان كل محور بدل قائمة مسطّحة واحدة.
    const tcfg = DataLayer.getTableConfig();
    const base = [
      { key: 'requests_total', group: tcfg.requests.title, label: tcfg.requests.labels.totalCount, value: fmtNum(d.requests.total) },
      { key: 'requests_completed', group: tcfg.requests.title, label: tcfg.requests.labels.completedCount, value: fmtNum(d.requests.completed) },
      { key: 'requests_in_progress', group: tcfg.requests.title, label: tcfg.requests.labels.inProgressCount, value: fmtNum(d.requests.in_progress) },
      { key: 'requests_referred', group: tcfg.requests.title, label: tcfg.requests.labels.referralCount, value: fmtNum(d.requests.referred) },
      { key: 'completion_rate', group: tcfg.requests.title, label: 'نسبة الإنجاز', value: (d.requests.total ? Math.round((d.requests.completed / d.requests.total) * 1000) / 10 : 0) + '%' },
      { key: 'top_referral', group: tcfg.requests.title, label: 'أكثر ' + tcfg.requests.labels.referralDestination + ' للطلبات', value: d.by_referral[0]?.name || '—' },
      { key: 'visits', group: tcfg.activities.title, label: tcfg.activities.labels.visits_count, value: fmtNum(d.visits) },
      { key: 'visitors', group: tcfg.activities.title, label: tcfg.activities.labels.visitors_count, value: fmtNum(d.visitors) },
      { key: 'official_meetings', group: tcfg.activities.title, label: tcfg.activities.labels.official_meetings_count, value: fmtNum(d.official_meetings) },
      { key: 'celebrations', group: tcfg.activities.title, label: tcfg.activities.labels.celebrations_count, value: fmtNum(d.celebrations) },
      { key: 'communication_celebrations', group: tcfg.communication.title, label: tcfg.communication.labels.celebration, value: fmtNum(d.communication_celebrations) },
      { key: 'communication_condolences', group: tcfg.communication.title, label: tcfg.communication.labels.condolence, value: fmtNum(d.communication_condolences) },
      { key: 'communication_methods', group: tcfg.communication.title, label: tcfg.communication.labels.method, value: fmtNum(d.communication_methods) },
      { key: 'sessions', group: tcfg.weekly_sessions.title, label: tcfg.weekly_sessions.labels.sessions_count, value: fmtNum(d.sessions) },
      { key: 'session_attendees', group: tcfg.weekly_sessions.title, label: tcfg.weekly_sessions.labels.attendees_count, value: fmtNum(d.session_attendees) }
    ];
    const { fromYear, fromMonth, toYear, toMonth } = d.period;
    Analytics.customCategoryRangeTotals(fromYear, fromMonth, toYear, toMonth).forEach(c => {
      c.fields.forEach(f => base.push({ key: `${c.key}_${f.key}`, group: c.title, label: `${c.title} — ${f.label}`, value: fmtNum(c.totals[f.key]) }));
    });
    return base;
  },

  render(container, year) {
    const s = DataLayer.getSettings();
    const years = yearRange(Math.min(s.reportYearFrom, year - 1), Math.max(s.reportYearTo, year + 1));

    container.innerHTML = `
      <div class="card no-print">
        <div class="report-toolbar">
          <div class="field">
            <label>نوع التقرير</label>
            <select id="repType">
              <option value="monthly">تقرير شهري</option>
              <option value="quarterly">تقرير ربع سنوي</option>
              <option value="half">تقرير نصف سنوي</option>
              <option value="yearly">تقرير سنوي</option>
              <option value="cumulative">تقرير تراكمي منذ التأسيس</option>
              <option value="compare">مقارنة بين فترتين</option>
            </select>
          </div>
          <div class="field">
            <label>اتجاه الصفحة</label>
            <select id="repOrientation">
              <option value="portrait" ${this.pageOrientation === 'portrait' ? 'selected' : ''}>عمودي</option>
              <option value="landscape" ${this.pageOrientation === 'landscape' ? 'selected' : ''}>أفقي</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;padding:9px 0">
              <input type="checkbox" id="repIncludeCover" ${this.includeCover ? 'checked' : ''}> إرفاق غلاف خارجي
            </label>
          </div>
          <div id="repCoverOptions" class="form-grid" style="display:${this.includeCover ? 'grid' : 'none'}">
            ${this.includeCover ? this.coverOptionsHtml('repCover', '', '', '') : ''}
          </div>
          <div id="repParams" class="report-toolbar" style="margin:0"></div>
          <button class="btn btn-primary" id="genReportBtn">إنشاء التقرير</button>
        </div>
      </div>

      <div class="card no-print" style="margin-top:16px" id="summaryComposerCard">
        <h3 style="margin-top:0">تخصيص الملخص التنفيذي (اختياري)</h3>
        <div class="field">
          <label>مقدمة التقرير (اتركها فارغة لاستخدام النص التلقائي المبني على الأرقام)</label>
          ${this.rteToolbarHtml('summaryIntro')}
          <div id="summaryIntro" class="rte-box" contenteditable="true" data-placeholder="مثال: يستعرض هذا التقرير أداء المكتب خلال الفترة، مع التركيز على...">${this.summaryState.intro}</div>
        </div>
        <div class="field" style="margin-top:12px">
          <label>المؤشرات التي ستظهر في جدول التقرير المطبوع (تُحدَّث المعاينة فور تبديل أي منها)</label>
          <div id="summaryIndicatorsList">
            <div style="color:var(--text-muted);font-size:12px">تظهر قائمة الاختيار هنا بعد الضغط على "إنشاء التقرير" أول مرة.</div>
          </div>
        </div>
        <div class="field" style="margin-top:12px">
          <label>النتائج والتوصيات (اختياري)</label>
          ${this.rteToolbarHtml('summaryRecommendations')}
          <div id="summaryRecommendations" class="rte-box" contenteditable="true" data-placeholder="مثال: نوصي بزيادة عدد الزيارات الميدانية خلال الفترة القادمة...">${this.summaryState.recommendations}</div>
        </div>
      </div>

      <div id="repOutput" class="report-output"></div>
    `;

    const yearSelectHtml = (id, sel) => `<div class="field"><label>السنة</label><select id="${id}">${years.map(y => `<option value="${y}" ${y === sel ? 'selected' : ''}>${y}</option>`).join('')}</select></div>`;
    const monthSelectHtml = (id) => `<div class="field"><label>الشهر</label><select id="${id}">${MONTHS.map((m, i) => `<option value="${i + 1}">${m}</option>`).join('')}</select></div>`;

    const paramsEl = document.getElementById('repParams');
    const typeSel = document.getElementById('repType');

    const renderParams = () => {
      const t = typeSel.value;
      if (t === 'monthly') paramsEl.innerHTML = yearSelectHtml('p_year', year) + monthSelectHtml('p_month');
      else if (t === 'quarterly') paramsEl.innerHTML = yearSelectHtml('p_year', year) + `<div class="field"><label>الربع</label><select id="p_quarter"><option value="1">الأول (يناير-مارس)</option><option value="2">الثاني (أبريل-يونيو)</option><option value="3">الثالث (يوليو-سبتمبر)</option><option value="4">الرابع (أكتوبر-ديسمبر)</option></select></div>`;
      else if (t === 'half') paramsEl.innerHTML = yearSelectHtml('p_year', year) + `<div class="field"><label>النصف</label><select id="p_half"><option value="1">الأول (يناير-يونيو)</option><option value="2">الثاني (يوليو-ديسمبر)</option></select></div>`;
      else if (t === 'yearly') paramsEl.innerHTML = yearSelectHtml('p_year', year);
      else if (t === 'cumulative') paramsEl.innerHTML = `<p style="color:var(--text-muted);align-self:center">سيشمل التقرير جميع البيانات منذ ${Analytics.earliestDataYear()} حتى اليوم.</p>`;
      else if (t === 'compare') {
        paramsEl.innerHTML = `
          <div class="field"><label>من (فترة ١)</label><select id="c1fy">${years.map(y => `<option ${y===year?'selected':''}>${y}</option>`).join('')}</select></div>
          <div class="field">${monthSelectHtml('c1fm')}</div>
          <div class="field"><label>إلى (فترة ١)</label><select id="c1ty">${years.map(y => `<option ${y===year?'selected':''}>${y}</option>`).join('')}</select></div>
          <div class="field">${monthSelectHtml('c1tm')}</div>
          <div class="field"><label>من (فترة ٢)</label><select id="c2fy">${years.map(y => `<option ${y===year-1?'selected':''}>${y}</option>`).join('')}</select></div>
          <div class="field">${monthSelectHtml('c2fm')}</div>
          <div class="field"><label>إلى (فترة ٢)</label><select id="c2ty">${years.map(y => `<option ${y===year-1?'selected':''}>${y}</option>`).join('')}</select></div>
          <div class="field">${monthSelectHtml('c2tm')}</div>
        `;
      }
    };
    typeSel.addEventListener('change', renderParams);
    renderParams();
    document.getElementById('genReportBtn').addEventListener('click', () => this.generate());

    this.wireRte('summaryIntro');
    this.wireRte('summaryRecommendations');
    document.getElementById('repOrientation').addEventListener('change', (e) => {
      this.pageOrientation = e.target.value;
      this.generate();
    });
    document.getElementById('repIncludeCover').addEventListener('change', (e) => {
      this.includeCover = e.target.checked;
      const box = document.getElementById('repCoverOptions');
      box.style.display = this.includeCover ? 'grid' : 'none';
      box.innerHTML = this.includeCover ? this.coverOptionsHtml('repCover', '', '', '') : '';
    });
  },

  generate() {
    const t = document.getElementById('repType').value;
    const out = document.getElementById('repOutput');
    const val = id => document.getElementById(id).value;

    if (t === 'compare') {
      const period1 = Analytics.aggregateRange(+val('c1fy'), +val('c1fm'), +val('c1ty'), +val('c1tm'));
      const period2 = Analytics.aggregateRange(+val('c2fy'), +val('c2fm'), +val('c2ty'), +val('c2tm'));
      this.renderIndicatorPicker(null);
      this.renderCompare(out, period1, period2);
      return;
    }

    let range, label;
    if (t === 'monthly') { const y = +val('p_year'), m = +val('p_month'); range = Analytics.aggregateRange(y, m, y, m); label = `تقرير شهري — ${y} (${MONTHS[m - 1]}) / ${hijriLabel(y, m)}`; }
    else if (t === 'quarterly') { const y = +val('p_year'), q = +val('p_quarter'); const sm = (q - 1) * 3 + 1; range = Analytics.aggregateRange(y, sm, y, sm + 2); label = `تقرير ربع سنوي — ${y} (الربع ${q})`; }
    else if (t === 'half') { const y = +val('p_year'), h = +val('p_half'); range = h === 1 ? Analytics.aggregateRange(y, 1, y, 6) : Analytics.aggregateRange(y, 7, y, 12); label = `تقرير نصف سنوي — ${y} (النصف ${h})`; }
    else if (t === 'yearly') { const y = +val('p_year'); range = Analytics.aggregateRange(y, 1, y, 12); label = `تقرير سنوي — ${y}`; }
    else if (t === 'cumulative') { const first = Analytics.earliestDataYear(); range = Analytics.aggregateRange(first, 1, new Date().getFullYear(), 12); label = `تقرير تراكمي منذ ${first}`; }

    this.renderIndicatorPicker(range);
    // تعبئة تلقائية لحقلي عنوان الغلاف والفترة (إن كانا فارغين فقط، حتى لا تُستبدَل
    // كتابة المستخدم اليدوية بشيء تلقائي في كل مرة يُعاد فيها إنشاء التقرير).
    const coverTitleEl = document.getElementById('repCover_title');
    if (coverTitleEl && !coverTitleEl.value.trim()) coverTitleEl.value = label;
    const coverFromEl = document.getElementById('repCover_from');
    const coverToEl = document.getElementById('repCover_to');
    if (coverFromEl && coverToEl && !coverFromEl.value.trim() && !coverToEl.value.trim()) {
      const { fromYear, fromMonth, toYear, toMonth } = range.period;
      coverFromEl.value = `${MONTHS[fromMonth - 1]} ${fromYear}`;
      coverToEl.value = `${MONTHS[toMonth - 1]} ${toYear}`;
    }
    this.renderSingle(out, range, label);
  },

  /** يبني قائمة اختيار المؤشرات (Checkboxes) بناءً على بيانات التقرير الحالي، ويربطها
   *  بحيث يعيد أي تبديل توليد التقرير فورًا لعكس الاختيار الجديد في المعاينة. */
  renderIndicatorPicker(d) {
    const container = document.getElementById('summaryIndicatorsList');
    if (!d) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:12px">قائمة المؤشرات غير متاحة لتقارير المقارنة — استخدم حقل النتائج والتوصيات أدناه بدلًا من ذلك.</div>';
      return;
    }
    const defs = this.summaryIndicatorDefs(d);
    // تقسيم القائمة تحت عنوان كل محور بدل قائمة مسطّحة واحدة — يحافظ على ترتيب
    // ظهور المحاور الأولى مرة واحدة فقط (Map تحفظ ترتيب أول إدراج لكل مفتاح).
    const groups = new Map();
    defs.forEach(ind => {
      if (!groups.has(ind.group)) groups.set(ind.group, []);
      groups.get(ind.group).push(ind);
    });
    container.innerHTML = [...groups.entries()].map(([groupTitle, items]) => `
      <div class="indicator-group-title">${groupTitle}</div>
      <div class="indicator-grid">
        ${items.map(ind => `
          <label class="indicator-check">
            <input type="checkbox" data-ind="${ind.key}" ${this.summaryState.selected.has(ind.key) ? 'checked' : ''}>
            ${ind.label}
          </label>
        `).join('')}
      </div>
    `).join('');
    container.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) this.summaryState.selected.add(cb.dataset.ind);
        else this.summaryState.selected.delete(cb.dataset.ind);
        this.generate();
      });
    });
  },

  /** يبني كتلة الملخص التنفيذي: نص المقدمة (المخصّص أو التلقائي) ثم قائمة المؤشرات
   *  المختارة أسفله مباشرة. */
  execSummaryHtml(d) {
    const intro = this.summaryState.intro.trim() || this.summaryText(d);
    return `<div class="exec-summary"><strong>الملخص التنفيذي:</strong>${intro}</div>`;
  },

  /** جدول المؤشرات المطبوع فعليًا — مبني حصرًا من المؤشرات التي اخترتها في قائمة
   *  الاختيار، لضمان ارتباطها فعليًا بما يظهر في التقرير (بدل جدول ثابت منفصل). */
  /** يُطبَّق هذا الفلتر في كل مكان تُعرَض فيه المؤشرات المختارة (الجدول المطبوع
   *  وتصدير Excel معًا) من مكان واحد فقط، لضمان عدم تفرّق المنطق بينهما مستقبلًا. */
  getSelectedIndicators(d) {
    const defs = this.summaryIndicatorDefs(d);
    return defs.filter(ind => {
      if (!this.summaryState.selected.has(ind.key)) return false;
      if (ind.key.startsWith('custom_') && (ind.value === '0' || ind.value === 0)) return false;
      return true;
    });
  },

  selectedIndicatorsTable(d) {
    const selectedDefs = this.getSelectedIndicators(d);
    if (!selectedDefs.length) {
      return '<p style="color:var(--text-muted);font-size:12.5px">لم تُحدَّد أي مؤشرات للعرض — اختر مؤشرات من قسم "تخصيص الملخص التنفيذي".</p>';
    }
    return `
      <div class="table-wrap"><table>
        <thead><tr><th>المؤشر</th><th>القيمة</th></tr></thead>
        <tbody>${selectedDefs.map(ind => `<tr><td>${ind.label}</td><td>${ind.value}</td></tr>`).join('')}</tbody>
      </table></div>
    `;
  },

  /** يحوّل نص التوصيات المنسّق (HTML من محرر التنسيق) إلى نص عادي مقروء لتصدير Excel،
   *  حيث لا تدعم خلايا الجداول تنسيق HTML. */
  htmlToPlainText(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html
      .replace(/<div>/gi, '\n').replace(/<\/div>/gi, '')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<li>/gi, '• ').replace(/<\/li>/gi, '\n');
    return (tmp.textContent || '').trim();
  },

  recommendationsHtml() {
    const html = this.summaryState.recommendations.trim();
    if (!html) return '';
    return `<h3>النتائج والتوصيات</h3><div class="exec-summary">${html}</div>`;
  },

  /** showBranch يُخفي اسم الفرع/المكتب عند التمرير بـfalse — تُستخدم في الصفحات
   *  المشتركة بين المكتبين (عن المكتب، دليل الإجراءات) حيث لا معنى لعرض اسم مكتب
   *  واحد بعينه على محتوى مشترك بين الاثنين، بخلاف التقارير الفعلية لكل مكتب. */
  reportHeader(label, showBranch = true) {
    const s = DataLayer.getSettings();
    const g = StorageEngine.readGlobal() || {};
    return `
      <div class="report-header">
        ${g.organizationLogo ? `<img src="${g.organizationLogo}" alt="الشعار">` : ''}
        <div>
          ${showBranch ? `<div class="report-header-branch">${s.branchName || ''}</div>` : ''}
          <div class="report-header-org">${g.organizationName || ''}</div>
          <h2 style="margin:2px 0 0">${label}</h2>
        </div>
      </div>
    `;
  },

  summaryText(d) {
    const rate = d.requests.total ? Math.round((d.requests.completed / d.requests.total) * 1000) / 10 : 0;
    const topReferral = d.by_referral[0]?.name || '—';
    const reqTitle = DataLayer.getTableConfig().requests.title;
    return `خلال الفترة المشمولة بالتقرير، بلغ إجمالي ${reqTitle} الواردة ${fmtNum(d.requests.total)} طلبًا، منها ${fmtNum(d.requests.completed)} طلبًا منجزًا و${fmtNum(d.requests.in_progress)} طلبًا تحت الإجراء، بنسبة إنجاز بلغت ${rate}%. كما سُجّلت ${fmtNum(d.visits)} زيارة استقبلت ${fmtNum(d.visitors)} زائرًا، و${fmtNum(d.official_meetings)} لقاء رسمي، و${fmtNum(d.celebrations)} مناسبة رعاية احتفال، وعُقدت ${fmtNum(d.sessions)} مأدبة أسبوعية بحضور ${fmtNum(d.session_attendees)} مواطنًا. وكانت "${topReferral}" جهة الإحالة الأكثر استقبالًا للطلبات المحالة خلال هذه الفترة.`;
  },

  statsTableRows(d) {
    const tcfg = DataLayer.getTableConfig();
    return [
      [tcfg.requests.labels.totalCount, d.requests.total], [tcfg.requests.labels.completedCount, d.requests.completed], [tcfg.requests.labels.inProgressCount, d.requests.in_progress],
      [tcfg.activities.labels.visits_count, d.visits], [tcfg.activities.labels.visitors_count, d.visitors],
      [tcfg.activities.labels.official_meetings_count, d.official_meetings], [tcfg.activities.labels.celebrations_count, d.celebrations],
      [tcfg.communication.labels.celebration, d.communication_celebrations], [tcfg.communication.labels.condolence, d.communication_condolences], [tcfg.communication.labels.method, d.communication_methods],
      [tcfg.weekly_sessions.labels.sessions_count, d.sessions], [tcfg.weekly_sessions.labels.attendees_count, d.session_attendees],
    ];
  },

  kpiItem(label, value) {
    return `<div class="kpi-item"><div class="kv">${value}</div><div class="kl">${label}</div></div>`;
  },

  periodKpiGrid(range) {
    const k = Analytics.periodKpis(range);
    const sel = this.summaryState.selected;
    const tcfg = DataLayer.getTableConfig();
    const items = [
      ['completion_rate', 'نسبة إنجاز ' + tcfg.requests.title, k.completion_rate + '%'],
      ['requests_total', 'متوسط ' + tcfg.requests.title + ' الشهري', fmtNum(k.avg_requests_month)],
      ['visits', 'متوسط ' + tcfg.activities.labels.visits_count + ' الشهري', fmtNum(k.avg_visits_month)],
      ['sessions', 'متوسط ' + tcfg.weekly_sessions.labels.sessions_count + ' الشهري', fmtNum(k.avg_sessions_month)],
      ['top_referral', 'أكثر ' + tcfg.requests.labels.referralDestination + ' لـ' + tcfg.requests.title, k.top_referral]
    ].filter(([key]) => sel.has(key));

    // إن لم يُحدَّد أي مؤشر أداء ذي صلة، يختفي القسم كاملًا بدل عرضه بعنصر واحد فقط
    // (عدد الأشهر) — لضمان اتساق كامل مع جدول المؤشرات المختارة أعلاه.
    if (!items.length) return '';

    return `
      <h3>مؤشرات الأداء لهذه الفترة</h3>
      <div class="kpi-grid" style="margin-bottom:18px">
        ${items.map(([, label, val]) => this.kpiItem(label, val)).join('')}
        ${this.kpiItem('عدد الأشهر المشمولة', fmtNum(k.monthsCount))}
      </div>
    `;
  },

  customCategorySection(range) {
    const { fromYear, fromMonth, toYear, toMonth } = range.period;
    const cats = Analytics.customCategoryRangeTotals(fromYear, fromMonth, toYear, toMonth);
    if (!cats.length) return '';
    return `
      <h3>مؤشرات إضافية</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>المحور</th><th>الحقل</th><th>القيمة</th></tr></thead>
        <tbody>${cats.flatMap(c => c.fields.map(f => `<tr><td>${c.title}</td><td>${f.label}</td><td>${fmtNum(c.totals[f.key])}</td></tr>`)).join('')}</tbody>
      </table></div>
    `;
  },

  /** يبني عنصر الغلاف كجزء طبيعي من محتوى الصفحة منذ البداية (مخفي بـCSS عاديًا،
   *  ويظهر فقط أثناء الطباعة عبر @media print — تمامًا كأي عنصر آخر مخصّص للطباعة
   *  فقط في هذا النظام، ينجح دائمًا). هذا يستبدل النمط السابق (إدراج العنصر ديناميكيًا
   *  في اللحظة الأخيرة قبل استدعاء print()) الذي أثبت عدم موثوقيته في بعض المتصفحات/
   *  الأجهزة — بلا أي تفسير واضح لماذا يفشل، رغم أن العنصر يصل للشجرة بشكل صحيح.
   *  إبقاء الغلاف ضمن نفس دورة الرسم العادية لبقية التقرير (التي نعلم أنها تُطبع
   *  بنجاح دائمًا) يزيل الحاجة لأي توقيت خاص أو افتراضات حول لحظة الطباعة. */
  coverHtml(idPrefix, defaultTitle, defaultFrom, defaultTo) {
    if (!this.includeCover) return '';
    const g = StorageEngine.readGlobal() || {};
    if (!g.coverBackground) return '';
    const titleEl = document.getElementById(idPrefix + '_title');
    const fromEl = document.getElementById(idPrefix + '_from');
    const toEl = document.getElementById(idPrefix + '_to');
    const title = (titleEl && titleEl.value.trim()) || defaultTitle;
    const from = (fromEl && fromEl.value.trim()) || defaultFrom || '';
    const to = (toEl && toEl.value.trim()) || defaultTo || '';
    const periodHtml = (from && to) ? `<div class="cover-overlay-period">من ${from} إلى ${to}</div>` : '';
    const titleStyle = g.coverTitleFontSize ? ` style="font-size:${g.coverTitleFontSize}px"` : '';
    return `
      <div class="cover-page cover-front cover-generated">
        <img src="${g.coverBackground}" alt="">
        <div class="cover-overlay-text">
          <div class="cover-overlay-title"${titleStyle}>${title}</div>
          ${periodHtml}
        </div>
      </div>`;
  },

  renderSingle(out, d, label) {
    const { fromYear, fromMonth, toYear, toMonth } = d.period;
    const coverDefaultFrom = `${MONTHS[fromMonth - 1]} ${fromYear}`, coverDefaultTo = `${MONTHS[toMonth - 1]} ${toYear}`;
    out.innerHTML = `
      ${this.coverHtml('repCover', label, coverDefaultFrom, coverDefaultTo)}
      <div id="printArea">
        ${this.reportHeader(label)}
        ${this.execSummaryHtml(d)}
        <h3>المؤشرات</h3>
        ${this.selectedIndicatorsTable(d)}
        ${this.periodKpiGrid(d)}
        <h3>الرسوم البيانية</h3>
        <div class="charts-grid">
          <div class="chart-card"><h3>اتجاه الطلبات خلال الفترة</h3><canvas id="repChartTrend"></canvas></div>
          <div class="chart-card"><h3>المنجزة مقابل تحت الإجراء</h3><canvas id="repChartCompare"></canvas></div>
          <div class="chart-card full"><h3>توزيع الطلبات حسب جهة الإحالة</h3><canvas id="repChartDept"></canvas></div>
        </div>
        <h3>توزيع الطلبات حسب جهة الإحالة (تفصيلي)</h3>
        <div class="table-wrap"><table>
          <thead><tr><th>جهة الإحالة</th><th>عدد الطلبات المحالة إليها</th></tr></thead>
          <tbody>${d.by_referral.map(x => `<tr><td>${x.name}</td><td>${fmtNum(x.total)}</td></tr>`).join('') || '<tr><td colspan="2" style="text-align:center">لا توجد بيانات</td></tr>'}</tbody>
          ${d.by_referral.length ? `<tfoot><tr style="font-weight:700">
            <td>الإجمالي (كل الجهات)</td><td>${fmtNum(d.requests.referred)}</td>
          </tr></tfoot>` : ''}
        </table></div>
        ${this.recommendationsHtml()}
      </div>
      <div class="no-print" style="margin-top:18px;display:flex;gap:10px">
        <button class="btn btn-gold" id="exportPdfBtn">تصدير PDF (طباعة)</button>
        <button class="btn btn-ghost" id="exportExcelBtn">تصدير Excel</button>
      </div>
    `;
    this.buildSingleCharts(d);
    document.getElementById('exportPdfBtn').addEventListener('click', () => {
      this.renderSingle(out, d, label); // إعادة بناء الغلاف بأحدث عنوان/فترة كتبها المستخدم قبل الطباعة مباشرة
      this.printToPdf(label);
    });
    document.getElementById('exportExcelBtn').addEventListener('click', () => this.exportExcelSingle(d, label));
  },

  buildSingleCharts(d) {
    const { fromYear, fromMonth, toYear, toMonth } = d.period;
    const series = Analytics.monthlySeries(fromYear, fromMonth, toYear, toMonth);
    const palette = ['#0E4B3D', '#146B54', '#B8902F', '#1E8A5F', '#7C8B82', '#C98A1D'];
    const mk = (id, cfg) => { const c = document.getElementById(id); if (c) new MiniChart(c, cfg); };
    const reqTotalLabel = DataLayer.getTableConfig().requests.labels.totalCount;

    mk('repChartTrend', { type: 'line', labels: series.labels, datasets: [{ label: reqTotalLabel, data: series.requests_total, color: palette[0] }] });
    mk('repChartCompare', { type: 'bar', labels: series.labels, datasets: [
      { label: 'منجزة', data: series.requests_completed, color: palette[1] },
      { label: 'تحت الإجراء', data: series.requests_in_progress, color: palette[2] }
    ]});
    mk('repChartDept', { type: 'doughnut', labels: d.by_referral.map(x => x.name), data: d.by_referral.map(x => x.total), colors: palette });
  },

  renderCompare(out, p1, p2) {
    const label = 'مقارنة بين فترتين';
    out.innerHTML = `
      ${this.coverHtml('repCover', label, '', '')}
      <div id="printArea">
        ${this.reportHeader(label)}
        <div class="compare-cols">
          <div><h3>الفترة الأولى</h3><div class="table-wrap"><table><tbody>${this.statsTableRows(p1).map(r => `<tr><td>${r[0]}</td><td>${fmtNum(r[1])}</td></tr>`).join('')}</tbody></table></div></div>
          <div><h3>الفترة الثانية</h3><div class="table-wrap"><table><tbody>${this.statsTableRows(p2).map(r => `<tr><td>${r[0]}</td><td>${fmtNum(r[1])}</td></tr>`).join('')}</tbody></table></div></div>
        </div>
        <div class="compare-cols">
          <div>${this.periodKpiGrid(p1)}</div>
          <div>${this.periodKpiGrid(p2)}</div>
        </div>
        <h3>مقارنة بصرية بين الفترتين</h3>
        <div class="charts-grid">
          <div class="chart-card full"><canvas id="repChartCompareBars"></canvas></div>
        </div>
        <h3>الفروقات</h3>
        <div class="table-wrap"><table>
          <thead><tr><th>المؤشر</th><th>الفترة الأولى</th><th>الفترة الثانية</th><th>نسبة التغيّر</th></tr></thead>
          <tbody>${this.diffRows(p1, p2)}</tbody>
        </table></div>
        <div class="compare-cols">
          <div>${this.customCategorySection(p1)}</div>
          <div>${this.customCategorySection(p2)}</div>
        </div>
        ${this.recommendationsHtml()}
      </div>
      <div class="no-print" style="margin-top:18px;display:flex;gap:10px">
        <button class="btn btn-gold" id="exportPdfBtn">تصدير PDF (طباعة)</button>
        <button class="btn btn-ghost" id="exportExcelBtn">تصدير Excel</button>
      </div>
    `;
    this.buildCompareChart(p1, p2);
    document.getElementById('exportPdfBtn').addEventListener('click', () => {
      this.renderCompare(out, p1, p2);
      this.printToPdf(label);
    });
    document.getElementById('exportExcelBtn').addEventListener('click', () => this.exportExcelCompare(p1, p2));
  },

  buildCompareChart(p1, p2) {
    const canvas = document.getElementById('repChartCompareBars');
    if (!canvas) return;
    const tcfg = DataLayer.getTableConfig();
    const labels = [tcfg.requests.title, tcfg.activities.labels.visits_count, tcfg.weekly_sessions.labels.sessions_count, tcfg.communication.labels.celebration];
    new MiniChart(canvas, {
      type: 'bar', labels,
      datasets: [
        { label: 'الفترة الأولى', data: [p1.requests.total, p1.visits, p1.sessions, p1.communication_celebrations], color: '#0E4B3D' },
        { label: 'الفترة الثانية', data: [p2.requests.total, p2.visits, p2.sessions, p2.communication_celebrations], color: '#B8902F' }
      ]
    });
  },

  diffRows(p1, p2) {
    const tcfg = DataLayer.getTableConfig();
    const pairs = [
      [tcfg.requests.labels.totalCount, p1.requests.total, p2.requests.total], [tcfg.requests.labels.completedCount, p1.requests.completed, p2.requests.completed],
      [tcfg.activities.labels.visits_count, p1.visits, p2.visits], [tcfg.activities.labels.visitors_count, p1.visitors, p2.visitors],
      [tcfg.communication.labels.celebration, p1.communication_celebrations, p2.communication_celebrations],
      [tcfg.communication.labels.condolence, p1.communication_condolences, p2.communication_condolences],
      [tcfg.weekly_sessions.labels.sessions_count, p1.sessions, p2.sessions], [tcfg.weekly_sessions.labels.attendees_count, p1.session_attendees, p2.session_attendees],
    ];
    return pairs.map(([label, a, b]) => {
      const change = b ? Math.round(((a - b) / b) * 1000) / 10 : (a > 0 ? 100 : 0);
      const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
      return `<tr><td>${label}</td><td>${fmtNum(a)}</td><td>${fmtNum(b)}</td><td><span class="change ${cls}">${fmtPct(change)}</span></td></tr>`;
    }).join('');
  },

  /** overrideFront/overrideBack اختياريان — إن مُرِّرا (حتى لو '' أو null) يُستخدمان
   *  بدل غلاف التقارير الافتراضي، لتمكين صفحات أخرى (مثل دليل الإجراءات) من استخدام
   *  نفس آلية الطباعة والغلاف بأغلفتها الخاصة دون تكرار الكود. */
  /** coverOptions: { title, periodFrom, periodTo } — تُستخدم فقط إن كان includeCover
   *  مفعّلًا ووُجدت خلفية غلاف مرفوعة من الإعدادات. العنوان والفترة نص HTML حقيقي
   *  يُكتب فوق الخلفية عند كل طباعة، وليس جزءًا من الصورة نفسها. */
  printToPdf(label) {
    document.title = label;
    let styleTag = document.getElementById('dynamicPrintStyle');
    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = 'dynamicPrintStyle';
      document.head.appendChild(styleTag);
    }
    // القالب يبقى على حدود الصفحة من كل الجهات (4مم)، تمامًا كما يعمل بالفعل في
    // الجانبين — والنزول بالكتابة (رأسيًا) يتم عبر حشوة على #printArea مع خاصية
    // box-decoration-break: clone التي تُصمَّم خصيصًا لتكرار الحشوة في كل صفحة عند
    // انقسام عنصر عبر عدة صفحات (انظر CSS). إن لم تدعمها العارضة المستخدمة، ستظهر
    // الحشوة في أول/آخر صفحة فقط — جرّب النتيجة وأخبرني تحديدًا بشأن الصفحة الثانية.
    styleTag.textContent = `
      @page {
        size: A4 ${this.pageOrientation};
        margin: 4mm;
      }
    `;

    // نستخدم عنصر <img> حقيقي بدل خلفية CSS، لأن عناصر img تُطبع دائمًا في كل المتصفحات
    // دون الحاجة لتفعيل "طباعة الخلفيات" يدويًا من نافذة الطباعة.
    const g = StorageEngine.readGlobal() || {};
    const bg = this.pageOrientation === 'landscape' ? g.reportBackgroundLandscape : g.reportBackgroundPortrait;
    const bgImg = document.getElementById('printBgImg');
    bgImg.src = bg || '';

    // مهم جدًا: الصفحات التي تستدعي renderSingle/renderCompare مجددًا قبل الطباعة
    // مباشرة (لتحديث عنوان/فترة الغلاف بآخر ما كتبه المستخدم) تُنشئ عنصر <img> جديدًا
    // تمامًا لصورة الغلاف، لم يبدأ تحميله وفك ترميزه بعد رغم أنه "ظهر" للتو في الشجرة.
    // افتراض أن الصورة "سبق عرضها على الشاشة فعُولجت مسبقًا" غير صحيح هنا تحديدًا —
    // هذا العنصر بالذات جديد. ننتظر اكتمال فك الترميز الفعلي قبل استدعاء print()، مع
    // سقف زمني احتياطي لا يعطّل الطباعة إن تعذّر ذلك لأي سبب.
    const coverImg = document.querySelector('.cover-page img');

    // إصلاح جذري وأخير لمشكلة الصفحة الفارغة: إخفاء عناصر .no-print عبر display:none
    // لم يكن كافيًا — يبدو أن محرك الطباعة في هذه البيئة يحجز مساحة صفحة لمحتوًى مخفي
    // بناءً على ترتيبه في DOM (المصدر) بصرف النظر عن display:none أو خاصية order في
    // flexbox. الحل القاطع: إزالة هذه العناصر فعليًا من الشجرة وقت الطباعة (لا إخفاؤها
    // فقط)، ثم إعادتها لمكانها الأصلي بعد انتهاء الطباعة مباشرة — بحيث لا وجود لها
    // إطلاقًا في الشجرة أثناء أخذ لقطة الطباعة، مهما كانت غرابة سلوك هذا المحرك.
    const removedNodes = [...document.querySelectorAll('.no-print')].map(el => {
      const placeholder = document.createComment('no-print-placeholder');
      el.parentNode.insertBefore(placeholder, el);
      el.remove();
      return { el, placeholder };
    });
    const restoreRemoved = () => {
      removedNodes.forEach(({ el, placeholder }) => {
        if (placeholder.parentNode) placeholder.parentNode.replaceChild(el, placeholder);
      });
    };
    window.addEventListener('afterprint', restoreRemoved, { once: true });
    setTimeout(restoreRemoved, 5000); // شبكة أمان إن لم يُطلَق afterprint لأي سبب

    const printNow = () => window.print();
    if (coverImg && coverImg.decode) {
      Promise.race([coverImg.decode().catch(() => {}), new Promise(res => setTimeout(res, 800))]).then(printNow);
    } else {
      printNow();
    }
  },

  exportExcelSingle(d, label) {
    const selectedDefs = this.getSelectedIndicators(d);
    const summary = [['المؤشر', 'القيمة'], ...selectedDefs.map(ind => [ind.label, ind.value])];
    const k = Analytics.periodKpis(d);
    const tcfg = DataLayer.getTableConfig();
    const kpiRows = [['المؤشر', 'القيمة'],
      ['نسبة إنجاز ' + tcfg.requests.title, k.completion_rate + '%'], ['متوسط ' + tcfg.requests.title + ' الشهري', k.avg_requests_month],
      ['متوسط ' + tcfg.activities.labels.visits_count + ' الشهري', k.avg_visits_month],
      ['متوسط ' + tcfg.weekly_sessions.labels.sessions_count + ' الشهري', k.avg_sessions_month],
      ['أكثر ' + tcfg.requests.labels.referralDestination + ' للطلبات', k.top_referral], ['عدد الأشهر المشمولة', k.monthsCount]
    ];
    const byDept = [['جهة الإحالة', 'عدد الطلبات المحالة إليها'],
      ...d.by_referral.map(x => [x.name, x.total]),
      ['الإجمالي (كل الجهات)', d.requests.referred]
    ];
    const sheets = [
      { name: 'الملخص', rows: summary },
      { name: 'مؤشرات الأداء', rows: kpiRows },
      { name: 'حسب الإدارات', rows: byDept }
    ];
    const { fromYear, fromMonth, toYear, toMonth } = d.period;
    const customCats = Analytics.customCategoryRangeTotals(fromYear, fromMonth, toYear, toMonth);
    if (customCats.length) {
      const rows = [['المحور', 'الحقل', 'القيمة'], ...customCats.flatMap(c => c.fields.map(f => [c.title, f.label, c.totals[f.key]]))];
      sheets.push({ name: 'مؤشرات إضافية', rows });
    }
    if (this.summaryState.recommendations.trim()) {
      sheets.push({ name: 'النتائج والتوصيات', rows: [['النتائج والتوصيات'], [this.htmlToPlainText(this.summaryState.recommendations)]] });
    }
    XlsExport.download(sheets, label);
  },

  exportExcelCompare(p1, p2) {
    const rows = [['المؤشر', 'الفترة الأولى', 'الفترة الثانية']];
    this.statsTableRows(p1).forEach((r, i) => rows.push([r[0], r[1], this.statsTableRows(p2)[i][1]]));
    const sheets = [{ name: 'المقارنة', rows }];
    if (this.summaryState.recommendations.trim()) {
      sheets.push({ name: 'النتائج والتوصيات', rows: [['النتائج والتوصيات'], [this.htmlToPlainText(this.summaryState.recommendations)]] });
    }
    XlsExport.download(sheets, 'مقارنة_بين_فترتين');
  }
};


/* ===== pages/settings.js ===== */
/**
 * ===== صفحة الإعدادات =====
 * تجمع كل شاشات الضبط والصيانة تحت مكان واحد: الإعدادات العامة (اسم المكتب،
 * الشعار، السنوات)، الإدارات، سلامة البيانات، والنسخ الاحتياطي — كتبويبات فرعية،
 * بدلاً من عناصر منفصلة في القائمة الرئيسية. كل تبويب يستدعي صفحته الأصلية دون
 * أي تكرار في الكود (DepartmentsPage وDataHealthPage وBackupPage كما هي).
 */
const SettingsPage = {
  activeTab: 'general',
  allTabs: [
    { key: 'general', title: 'عام', perm: 'settings_general' },
    { key: 'fields', title: 'الحقول والمؤشرات', perm: 'settings_fields' },
    { key: 'departments', title: 'الإدارات', perm: 'settings_departments' },
    { key: 'about', title: 'عن المكتب', perm: 'about_edit' },
    { key: 'procedures', title: 'دليل الإجراءات', perm: 'about_edit' },
    { key: 'health', title: 'سلامة البيانات', perm: 'settings_health' },
    { key: 'backup', title: 'النسخ الاحتياطي', perm: 'settings_backup' },
    { key: 'users', title: 'المستخدمون', perm: 'manage_users' } // مسؤول النظام فقط دائمًا
  ],
  get tabs() { return this.allTabs.filter(t => Auth.isAdmin() || Auth.can(t.perm)); },

  render(container, year) {
    if (!this.tabs.some(t => t.key === this.activeTab)) this.activeTab = this.tabs[0]?.key || 'general';
    container.innerHTML = `<div class="tabs" id="settingsTabs"></div><div id="settingsBody"></div>`;
    const tabsEl = document.getElementById('settingsTabs');
    tabsEl.innerHTML = this.tabs.map(t =>
      `<button class="tab-btn ${t.key === this.activeTab ? 'active' : ''}" data-tab="${t.key}">${t.title}</button>`
    ).join('');
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.activeTab = btn.dataset.tab;
        tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        this.renderTab(year);
      });
    });
    this.renderTab(year);
  },

  renderTab(year) {
    const body = document.getElementById('settingsBody');
    if (this.activeTab === 'general') this.renderGeneral(body);
    else if (this.activeTab === 'fields') this.renderFields(body);
    else if (this.activeTab === 'departments') DepartmentsPage.render(body, year);
    else if (this.activeTab === 'about') this.renderAbout(body);
    else if (this.activeTab === 'procedures') this.renderProcGuide(body);
    else if (this.activeTab === 'health') DataHealthPage.render(body);
    else if (this.activeTab === 'backup') BackupPage.render(body);
    else if (this.activeTab === 'users') this.renderUsers(body);
  },

  navIconLabels: {
    dashboard: 'الصفحة الرئيسية', about: 'عن المكتب', procedures: 'دليل الإجراءات',
    entry: 'إدخال البيانات', reports: 'التقارير', settings: 'الإعدادات'
  },

        <div class="form-grid">

            <label>&nbsp;</label>
            <div style="display:flex;align-items:center;gap:10px">
              ${g.organizationLogo ? `<img src="${g.organizationLogo}" alt="الشعار" style="height:44px;width:auto;max-width:120px;border-radius:6px;border:1px solid var(--border);object-fit:cover">` : '<span style="color:var(--text-muted);font-size:12.5px">لا يوجد شعار محفوظ</span>'}
              ${g.organizationLogo ? `<button class="btn btn-ghost btn-small" id="removeOrgLogoBtn">إزالة الشعار</button>` : ''}
            </div>

          ويظهران في شاشة اختيار المكتب وفي ترويسة التقارير المطبوعة لكلا المكتبين.

      </div>
    `;
    container.innerHTML = `
      ${orgIdentityCard}

      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">خلفية التقرير المطبوع (اختياري)</h3>
        <p style="color:var(--text-muted);font-size:12.5px;line-height:1.8">
          ارفع قالب خلفية (مثل ترويسة رسمية بشعار مائي) لاستخدامه خلف محتوى التقرير عند التصدير PDF

    const orgLogoInput = document.getElementById('s_orgLogoFile');

      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 800 * 1024) toast('حجم الصورة كبير، يُفضّل شعار أصغر من 800 كيلوبايت', true);
      const reader = new FileReader();
      reader.onload = () => {
        const current = StorageEngine.readGlobal() || {};
        StorageEngine.writeGlobal({ ...current, organizationLogo: reader.result });
        toast('تم حفظ الشعار');
        App.refreshBranding();
        App.renderRoute();
      };
      reader.readAsDataURL(file);
    });

    const removeLogoBtn = document.getElementById('removeOrgLogoBtn');
    if (removeLogoBtn) removeLogoBtn.addEventListener('click', () => {
      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, organizationLogo: '' });
      toast('تمت إزالة الشعار');
      App.refreshBranding();
      App.renderRoute();
    });

      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, organizationName: name });
      toast('تم حفظ اسم الجهة');
      App.refreshBranding();
      App.renderRoute();
    });
