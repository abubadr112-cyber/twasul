      StorageEngine.writeGlobal({ ...current, navIcons });
      toast('تم حفظ الأيقونات');
      App.refreshBranding();
    });

    document.getElementById('saveVisibilityBtn').addEventListener('click', () => {
      const hidden = Workspace.OFFICES.filter(o => !document.getElementById(`vis_${o.key}`).checked).map(o => o.key);
      if (hidden.length === Workspace.OFFICES.length) {
        return toast('يجب إظهار مكتب واحد على الأقل', true);
      }
      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, hiddenOffices: hidden });
      toast('تم حفظ وضع العرض');
      App.refreshBranding();
    });

    const bgUpload = (inputId, field, warnMB) => {
      document.getElementById(inputId).addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > warnMB * 1024 * 1024) toast(`حجم الصورة كبير، يُفضّل أصغر من ${warnMB} ميجابايت`, true);
        const reader = new FileReader();
        reader.onload = () => {
          const current = StorageEngine.readGlobal() || {};
          StorageEngine.writeGlobal({ ...current, [field]: reader.result });
          toast('تم حفظ الخلفية');
          App.renderRoute();
        };
        reader.readAsDataURL(file);
      });
    };
    bgUpload('s_bgPortraitFile', 'reportBackgroundPortrait', 1.5);
    bgUpload('s_bgLandscapeFile', 'reportBackgroundLandscape', 1.5);
    bgUpload('s_cardBgFile', 'landingCardBackground', 1.5);
    bgUpload('s_coverBackgroundFile', 'coverBackground', 2);

      toast('تمت إزالة خلفية البطاقات');
      App.renderRoute();

    const removeCoverBackgroundBtn = document.getElementById('removeCoverBackgroundBtn');
    if (removeCoverBackgroundBtn) removeCoverBackgroundBtn.addEventListener('click', () => {

      StorageEngine.writeGlobal({ ...current, coverBackground: '' });
      toast('تمت إزالة خلفية الغلاف');
      App.renderRoute();
    });

    const coverFontSizeInput = document.getElementById('s_coverTitleFontSize');
    if (coverFontSizeInput) coverFontSizeInput.addEventListener('change', () => {
      const size = Math.max(20, Math.min(120, +coverFontSizeInput.value || 64));
      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, coverTitleFontSize: size });
      toast('تم حفظ حجم خط العنوان');

    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
      const patch = {
        branchName: document.getElementById('s_branchName').value.trim() || 'مكتب بلا اسم',
        foundingYear: +document.getElementById('s_foundingYear').value,
        reportYearFrom: +document.getElementById('s_reportYearFrom').value,
        reportYearTo: +document.getElementById('s_reportYearTo').value
      };
      if (patch.reportYearFrom > patch.reportYearTo) {
        return toast('بداية نطاق السنوات يجب أن تكون قبل نهايته', true);
      }
      DataLayer.updateSettings(patch);
      toast('تم حفظ الإعدادات');
      App.refreshBranding();
      App.setupYearSelect();
      App.renderRoute();
    });
  },

  renderFields(container) {
    const cfg = DataLayer.getTableConfig();

    const customCats = DataLayer.listCustomCategories();

            </div>`).join('')}

        </div>
        ${Workspace.otherOfficeCheckbox('core_' + key)}
      </div>

    const customRow = (c) => `
      <div class="card" style="margin-bottom:12px">
        <div class="form-grid">
          <div class="field"><label>اسم المحور (مخصّص)</label>
            <input type="text" id="cat_title_${c.key}" value="${c.title}">
          </div>
          ${c.valueFields.map(f => `
            <div class="field"><label>تسمية حقل: ${f.label}</label>
              <input type="text" id="cat_field_${c.key}_${f.key}" value="${f.label}">
            </div>`).join('')}

        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
          <div style="display:flex;gap:8px">

        <h3 style="margin-top:0">المحاور الأساسية</h3>

        const title = document.getElementById(`cat_title_${key}`).value.trim();
        const fieldLabels = {};
        c.valueFields.forEach(f => { fieldLabels[f] = document.getElementById(`cat_field_${key}_${f}`).value.trim(); });

        const applyBoth = document.getElementById(`other_office_core_${key}`)?.checked;
        if (applyBoth) Workspace.applyToOtherOffice(() => DataLayer.renameCoreCategory(key, { title, fieldLabels }));

        App.renderRoute();
      });

        const title = document.getElementById(`cat_title_${key}`).value.trim();
        const fieldLabels = {};
        c.valueFields.forEach(f => { fieldLabels[f] = document.getElementById(`cat_field_${key}_${f}`).value.trim(); });

          App.renderRoute();

          DataLayer.setCategoryVisibility(cb.dataset.visibility, !cb.checked);
          toast(cb.checked ? 'أصبح المحور ظاهرًا في إدخال البيانات' : 'أصبح المحور مخفيًا في إدخال البيانات');
        } catch (e) { toast(e.message, true); }
      });
    });

    document.getElementById('addCategoryBtn').addEventListener('click', () => {
      const title = document.getElementById('newCatTitle').value;
      const f1 = document.getElementById('newCatField1').value;
      const f1Type = document.getElementById('newCatField1Type').value;
      const f2 = document.getElementById('newCatField2').value;
      const f2Type = document.getElementById('newCatField2Type').value;
      const fields = [{ label: f1, type: f1Type }, { label: f2, type: f2Type }];
      try {
        DataLayer.addCustomCategory(title, fields);
        const applyBoth = document.getElementById('other_office_newCat')?.checked;
        if (applyBoth) Workspace.applyToOtherOffice(() => DataLayer.addCustomCategory(title, fields));
        toast('تمت إضافة المحور' + (applyBoth ? ' في المكتبين' : '') + ' — يظهر الآن كتبويب في إدخال البيانات');
        App.renderRoute();
      } catch (e) { toast(e.message, true); }
    });
  },

  permissionDefs: [
    { key: 'settings_general', label: 'الإعدادات العامة (اسم المكتب، السنوات، الظهور)' },
    { key: 'settings_fields', label: 'الحقول والمؤشرات' },
    { key: 'settings_departments', label: 'إدارة الإدارات' },
    { key: 'settings_health', label: 'سلامة البيانات' },
    { key: 'settings_backup', label: 'النسخ الاحتياطي' },
    { key: 'about_edit', label: 'تعديل صفحة "عن المكتب"' }
  ],

  renderUsers(container) {
    const auth = Auth.getAuth();
    const roleCard = (role, title, note) => {
      const acc = auth[role];
      const permsHtml = role === 'admin' ? `<p style="color:var(--text-muted);font-size:12.5px">صلاحيات كاملة دائمًا — لا يمكن تقييدها.</p>` : `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin:10px 0">
          ${this.permissionDefs.map(p => `
            <label style="display:flex;align-items:center;gap:6px;font-size:12.5px">
              <input type="checkbox" data-perm="${role}:${p.key}" ${acc.permissions?.[p.key] ? 'checked' : ''}> ${p.label}
            </label>
          `).join('')}
        </div>
        <p style="color:var(--text-muted);font-size:11.5px">صلاحيتا "إدخال البيانات" و"التقارير" متاحتان دائمًا لهذا المستوى، وهوية الجهة (الاسم والشعار) تبقى حكرًا على مسؤول النظام دائمًا.</p>
      `;

      const expiryHtml = role === 'admin' ? '' : (() => {
        const isExpired = Auth.isExpired(acc);
        const isDisabled = acc.enabled === false;
        let statusBadge = '';
        if (isDisabled) statusBadge = '<span style="background:var(--danger);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px">معطَّل حاليًا</span>';
        else if (isExpired) statusBadge = '<span style="background:var(--danger);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px">منتهي الصلاحية</span>';
        else if (acc.expiresAt) statusBadge = `<span style="background:var(--green-100);color:var(--green-800);padding:2px 8px;border-radius:20px;font-size:11px">فعّال حتى ${acc.expiresAt}</span>`;
        else statusBadge = '<span style="background:var(--green-100);color:var(--green-800);padding:2px 8px;border-radius:20px;font-size:11px">فعّال دائم</span>';
        return `
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <strong style="font-size:12.5px">حالة الحساب:</strong> ${statusBadge}
            </div>
            <div class="form-grid">
              <div class="field">
                <label style="display:flex;align-items:center;gap:6px">
                  <input type="checkbox" id="u_${role}_enabled" ${acc.enabled === false ? '' : 'checked'}> الحساب مفعّل
                </label>
              </div>
              <div class="field">
                <label>تاريخ انتهاء الصلاحية (اختياري — لحساب مؤقت)</label>
                <input type="date" id="u_${role}_expiresAt" value="${acc.expiresAt || ''}">
              </div>
            </div>
            <p style="color:var(--text-muted);font-size:11px;margin-top:6px">
              اترك التاريخ فارغًا لحساب دائم بلا انتهاء. بعد هذا التاريخ لن يتمكن هذا الحساب من تسجيل الدخول
              حتى تُمدِّد التاريخ أو تحذفه من هنا. يمكنك أيضًا تعطيله فورًا يدويًا بإلغاء "الحساب مفعّل" أعلاه.
            </p>
          </div>
        `;
      })();

      return `
        <div class="card" style="margin-bottom:16px">
          <h3 style="margin-top:0">${title}</h3>
          <p style="color:var(--text-muted);font-size:12.5px">${note}</p>
          <div class="form-grid">
            <div class="field"><label>اسم المستخدم</label><input type="text" id="u_${role}_username" value="${acc.username}"></div>
            <div class="field"><label>كلمة مرور جديدة (اتركها فارغة للإبقاء على الحالية)</label><input type="password" id="u_${role}_password" placeholder="••••••••"></div>
          </div>
          ${permsHtml}
          ${expiryHtml}
          <button class="btn btn-primary btn-small" data-save-role="${role}" style="margin-top:12px">حفظ ${title}</button>
        </div>
      `;
    };

    container.innerHTML = `
      <div class="card" style="margin-bottom:16px">
        <p style="color:var(--text-muted);font-size:12.5px;line-height:1.9;margin:0">
          ⚠️ تنبيه: هذا فصل استخدام بسيط بين ثلاثة مستويات لمنع التعديل العرضي بين من يشاركون
          هذا الجهاز — وليس حماية أمنية حقيقية، لأن النظام يعمل بالكامل محليًا دون خادم.
          لا تعتمد عليه لحماية معلومات حساسة فعليًا.
        </p>
      </div>
      ${roleCard('admin', 'مسؤول النظام', 'تحكم كامل بلا استثناء.')}
      ${roleCard('supervisor', 'مشرف', 'إدخال بيانات وتقارير، مع صلاحيات إعدادات محدودة قابلة للتعديل أدناه (باستثناء هوية الجهة دائمًا).')}
      ${roleCard('employee', 'موظف', 'إدخال بيانات وطباعة تقارير كحد أساسي، ويمكن منحه صلاحيات إضافية أدناه.')}
    `;

    container.querySelectorAll('[data-save-role]').forEach(btn => {
      btn.addEventListener('click', () => {
        const role = btn.dataset.saveRole;
        const username = document.getElementById(`u_${role}_username`).value;
        const password = document.getElementById(`u_${role}_password`).value;
        try {
          Auth.updateRoleCredentials(role, { username, password });
          if (role !== 'admin') {
            const perms = {};
            this.permissionDefs.forEach(p => {
              const cb = container.querySelector(`[data-perm="${role}:${p.key}"]`);
              perms[p.key] = !!cb.checked;
            });
            Auth.updateRolePermissions(role, perms);
            const enabled = document.getElementById(`u_${role}_enabled`).checked;
            const expiresAt = document.getElementById(`u_${role}_expiresAt`).value || null;
            Auth.updateRoleExpiry(role, { enabled, expiresAt });
          }
          toast('تم الحفظ');
          App.refreshBranding();
          App.renderRoute();
        } catch (e) { toast(e.message, true); }
      });
    });
  },

  renderAbout(container) {
    const g = StorageEngine.readGlobal() || {};
    container.innerHTML = `
      <div class="card">
        <p style="color:var(--text-muted);font-size:12.5px;margin-top:0">
          هذا المحتوى يظهر في صفحة "عن المكتب" التي يراها الجميع للعرض فقط — التعديل من هنا حصرًا.
          <strong>محتوى مشترك بين المكتبين</strong> (وليس خاصًا بكل مكتب على حدة).
        </p>
        <div class="field">
          <label>نبذة تعريفية</label>
          ${RTE.toolbarHtml('about_intro')}
          <div id="about_intro" class="rte-box" contenteditable="true">${g.aboutIntro || ''}</div>
        </div>
        <button class="btn btn-primary" id="saveAboutBtn" style="margin-top:16px">حفظ</button>
      </div>
    `;
    let draftIntro = g.aboutIntro || '';
    RTE.wire('about_intro', (html) => { draftIntro = html; });
    document.getElementById('saveAboutBtn').addEventListener('click', () => {
      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, aboutIntro: draftIntro });
      toast('تم حفظ محتوى "عن المكتب"');
    });
  },

  renderProcGuide(container) {
    const g = StorageEngine.readGlobal() || {};
    const titles = g.procGuideFieldTitles || {};
    container.innerHTML = `
      <div class="card">
        <p style="color:var(--text-muted);font-size:12.5px;margin-top:0">
          <strong>محتوى مشترك بين المكتبين</strong> (وليس خاصًا بكل مكتب على حدة).
          خلفية الغلاف الخارجي أصبحت مشتركة أيضًا مع التقارير — تُدار من الإعدادات ← عام.
        </p>
        <h3 style="margin-top:0">محتوى دليل الإجراءات</h3>
        <p style="color:var(--text-muted);font-size:12.5px;line-height:1.8">
          هذا المحتوى يظهر في صفحة "دليل الإجراءات" المستقلة في القائمة الجانبية. يمكنك إعادة
          تسمية عنوان أي حقل ليناسب احتياجك (تمامًا كتسميات حقول إدخال البيانات)، والمستخدم
          يختار بنفسه أي الحقول يطبعها عند التصدير.
        </p>
        ${ProceduresPage.fields.map(f => `
          <div class="field" style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border)">
            <label>عنوان الحقل</label>
            <input type="text" id="procTitle_${f.key}" value="${titles[f.key] || f.defaultTitle}">
            <label style="margin-top:10px;display:block">المحتوى</label>
            ${RTE.toolbarHtml('procContent_' + f.key, { table: f.key === 'content' })}
            <div id="procContent_${f.key}" class="rte-box" contenteditable="true">${g['procGuide_' + f.key] || ''}</div>
          </div>
        `).join('')}
        <button class="btn btn-primary" id="saveProcBtn" style="margin-top:18px">حفظ دليل الإجراءات</button>
      </div>
    `;

    const draft = {};
    ProceduresPage.fields.forEach(f => {
      draft['procGuide_' + f.key] = g['procGuide_' + f.key] || '';
      RTE.wire('procContent_' + f.key, (html) => { draft['procGuide_' + f.key] = html; });
    });
    document.getElementById('saveProcBtn').addEventListener('click', () => {
      const newTitles = {};
      ProceduresPage.fields.forEach(f => {
        newTitles[f.key] = document.getElementById(`procTitle_${f.key}`).value.trim() || f.defaultTitle;
      });
      const current = StorageEngine.readGlobal() || {};
      StorageEngine.writeGlobal({ ...current, ...draft, procGuideFieldTitles: newTitles });
      toast('تم حفظ دليل الإجراءات');
      App.renderRoute();
    });
  }
};


/* ===== pages/backup.js ===== */
/**
 * ===== صفحة النسخ الاحتياطي والاستعادة =====
 */
const BackupPage = {
  _inspected: null, // نتيجة فحص آخر ملف اختير، قبل التنفيذ الفعلي

  render(container) {
    const s = DataLayer.getSettings();
    const history = DataLayer.listBackupHistory();
    container.innerHTML = `
      <div class="card">
        <h3 style="margin-top:0">تنبيه هام حول التخزين</h3>
        <p style="color:var(--text-muted);line-height:1.9">
          يحفظ النظام بياناتك تلقائيًا داخل هذا المتصفح على هذا الجهاز فقط (لا يُرسل أي شيء إلى الإنترنت).
          يُنصح بشدة بأخذ نسخة احتياطية بشكل دوري — أسبوعيًا على الأقل — وحفظها في مكان آمن خارج الجهاز.
          آخر نسخة احتياطية: <strong>${fmtDateTime(s.lastBackupAt)}</strong>
        </p>
      </div>

      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">إنشاء نسخة احتياطية</h3>
        <p style="color:var(--text-muted);font-size:12.5px">اختر نوع النسخة المناسب لحاجتك.</p>
        <div class="form-grid">
          <button class="btn btn-primary" id="backupFullBtn">نسخة كاملة (كل شيء)</button>
          <button class="btn btn-ghost" id="backupStatsBtn">الإحصاءات فقط</button>
          <button class="btn btn-ghost" id="backupSettingsBtn">الإعدادات فقط</button>
          <button class="btn btn-ghost" id="backupMediaBtn">الوسائط فقط (الشعار والخلفيات)</button>
        </div>
      </div>

      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">استيراد نسخة احتياطية</h3>
        <input type="file" id="importFile" accept=".json">
        <div id="inspectResult" style="margin-top:14px"></div>
      </div>

      ${history.length ? `
      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">سجل النسخ الاحتياطية (آخر ١٠)</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>التاريخ</th><th>النوع</th><th>السجلات</th><th>الحجم</th><th>إجراءات</th></tr></thead>
            <tbody>
              ${history.map(b => `<tr>
                <td>${fmtDateTime(b.createdAt)}</td>
                <td>${{ full: 'كاملة', stats: 'إحصاءات', settings: 'إعدادات', media: 'وسائط' }[b.backupType] || b.backupType}</td>
                <td>${b.recordCount ?? '—'}</td>
                <td>${b.sizeKB} كيلوبايت</td>
                <td>
                  <button class="btn btn-ghost btn-small" data-redownload="${b.id}">تنزيل</button>
                  <button class="btn btn-ghost btn-small" data-delhist="${b.id}">حذف</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      ${Auth.isAdmin() ? `
      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">إعادة تعيين النظام بالكامل</h3>
        <p style="color:var(--text-muted)">يحذف كل البيانات المحلية ويعيد النظام إلى حالته الافتراضية. متاح لمسؤول النظام فقط.</p>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:12px">
          <input type="checkbox" id="backupBeforeReset" checked>
          تنزيل نسخة احتياطية تلقائيًا قبل الحذف (موصى به)
        </label>
        <button class="btn btn-danger" id="resetBtn">تصفير جميع البيانات</button>
      </div>
      ` : ''}
    `;

    document.getElementById('backupFullBtn').addEventListener('click', () => this.downloadBackup('full'));
    document.getElementById('backupStatsBtn').addEventListener('click', () => this.downloadBackup('stats'));
    document.getElementById('backupSettingsBtn').addEventListener('click', () => this.downloadBackup('settings'));
    document.getElementById('backupMediaBtn').addEventListener('click', () => this.downloadBackup('media'));

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      const box = document.getElementById('inspectResult');
      if (!file) { box.innerHTML = ''; return; }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          this._inspected = DataLayer.inspectBackupFile(reader.result);
          this._inspectedText = reader.result;
          this.renderInspectSummary(box);
        } catch (err) {
          this._inspected = null;
          box.innerHTML = `<p style="color:var(--danger)">تعذّر قبول الملف: ${err.message}</p>`;
        }
      };
      reader.onerror = () => { box.innerHTML = '<p style="color:var(--danger)">تعذّرت قراءة الملف</p>'; };
      reader.readAsText(file, 'utf-8');
    });

    container.querySelectorAll('[data-redownload]').forEach(btn => {
      btn.addEventListener('click', () => {
        const entry = history.find(b => b.id === btn.dataset.redownload);
        if (entry) this._triggerDownload(entry.content, entry.filename);
      });
    });
    container.querySelectorAll('[data-delhist]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('حذف هذه النسخة من السجل؟ (هذا لا يحذف أي نسخة نزّلتها بالفعل لجهازك)')) return;
        DataLayer.deleteBackupHistoryEntry(btn.dataset.delhist);
        this.render(container);
      });
    });

    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      if (!confirm('سيتم حذف جميع البيانات نهائيًا من هذا المتصفح. هل أنت متأكد؟')) return;
      if (!confirm('تأكيد أخير: لا يمكن التراجع عن هذا الإجراء إلا باستيراد نسخة احتياطية سابقة. متابعة؟')) return;
      if (document.getElementById('backupBeforeReset').checked) this.downloadBackup('full');
      DataLayer.resetAll();
      toast('تمت إعادة تعيين النظام');
      App.refreshBranding();
      App.setupYearSelect();
      App.renderRoute();
    });
  },

  /** يعرض ملخص الملف المُختار (تاريخ الإنشاء، النوع، عدد السجلات، الحجم) مع خيارات
   *  وضع الاستيراد الثلاثة — قبل أي تنفيذ فعلي على البيانات. */
  renderInspectSummary(box) {
    const i = this._inspected;
    box.innerHTML = `
      <div class="card" style="background:var(--surface-2);margin-top:0">
        <div class="kpi-grid">
          <div class="kpi-item"><div class="kv">${{ full: 'كاملة', stats: 'إحصاءات', settings: 'إعدادات', media: 'وسائط' }[i.backupType] || i.backupType}</div><div class="kl">نوع النسخة</div></div>
          <div class="kpi-item"><div class="kv">${i.createdAt ? fmtDateTime(i.createdAt) : '—'}</div><div class="kl">تاريخ الإنشاء</div></div>
          <div class="kpi-item"><div class="kv">${i.recordCount}</div><div class="kl">عدد السجلات</div></div>
          <div class="kpi-item"><div class="kv">${i.sizeKB} ك.ب</div><div class="kl">حجم الملف</div></div>
        </div>
        ${i.isLegacy ? `<p style="color:var(--gold-600);font-size:12px;margin-top:10px">⚠ ملف من إصدار قديم للنظام — سيُقبل، لكن بعض البيانات الوصفية غير متوفرة فيه.</p>` : ''}

        <div style="margin-top:16px">
          <label style="display:block;margin-bottom:8px">طريقة الاستيراد</label>
          <label style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px">
            <input type="radio" name="importMode" value="merge" checked style="margin-top:3px">
            <span><strong>دمج (الافتراضي الآمن)</strong> — يضيف السجلات غير الموجودة فقط، لا يمسّ أي سجل حالي إطلاقًا.</span>
          </label>
          <label style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px">
            <input type="radio" name="importMode" value="update" style="margin-top:3px">
            <span><strong>تحديث</strong> — يستبدل قيمة أي شهر مشترك بمحتوى النسخة، ويضيف الأشهر الجديدة، دون حذف أي شيء آخر.</span>
          </label>
          <label style="display:flex;align-items:flex-start;gap:8px;font-size:13px">
            <input type="radio" name="importMode" value="replace" style="margin-top:3px">
            <span><strong>استبدال كامل</strong> — يحذف كل البيانات الحالية ويستبدلها بمحتوى النسخة بلا استثناء.</span>
          </label>
        </div>
        <button class="btn btn-primary" id="confirmImportBtn" style="margin-top:14px">تنفيذ الاستيراد</button>
      </div>
    `;
    document.getElementById('confirmImportBtn').addEventListener('click', () => this.executeImport());
  },

  executeImport() {
    const mode = document.querySelector('input[name="importMode"]:checked').value;
    if (mode === 'replace') {
      if (!confirm('سيتم حذف جميع البيانات الحالية واستبدالها بمحتويات النسخة الاحتياطية. لا يمكن التراجع عن هذه العملية. هل تريد المتابعة؟')) return;
      this.downloadBackup('full');
    }
    try {
      const report = DataLayer.importBackup(this._inspectedText, mode);
      this.renderImportReport(report);
      App.refreshBranding();
      App.setupYearSelect();
      App.renderRoute();
    } catch (err) {
      toast('فشل الاستيراد: ' + err.message, true);
    }
  },

  renderImportReport(report) {
    const modeLabel = { merge: 'دمج', update: 'تحديث', replace: 'استبدال كامل' }[report.mode];
    const lines = [
      `تم الاستيراد بنجاح (${modeLabel})`,
      `أُضيف: ${report.added} سجلًا جديدًا`,
      `حُدِّث: ${report.updated} سجلًا`,
      `تُجوهل: ${report.skipped} سجلًا (موجود مسبقًا)`,
      report.errors ? `أخطاء: ${report.errors}` : null,
      `المدة: ${report.durationMs} مللي ثانية`
    ].filter(Boolean);
    toast(lines.join(' — '));
  },

  _triggerDownload(content, filename) {
    const blob = new Blob([content], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  },

  downloadBackup(type = 'full') {
    const json = DataLayer.exportBackup(type);
    const stamp = new Date().toISOString().slice(0, 10);
    const label = { full: 'كاملة', stats: 'إحصاءات', settings: 'إعدادات', media: 'وسائط' }[type];
    this._triggerDownload(json, `نسخة-احتياطية-${label}_${stamp}.json`);
    toast('تم تنزيل النسخة الاحتياطية');
  }
};

/* ===== app.js ===== */
/**
 * ===== المتحكم الرئيسي (SPA Router) =====
 * يربط الصفحات ببعضها، ولا يحتوي على أي منطق بيانات — فقط توجيه وعرض.
 */
const App = {
  currentRoute: 'dashboard',
  _wired: false,

  defaultNavIcons: { dashboard: '🏠', entry: '📝', reports: '📊', about: 'ℹ️', procedures: '📋', settings: '⚙️' },

  /** يُستدعى مرة واحدة فقط عند تحميل الصفحة، بصرف النظر عن عدد مرات الدخول/الخروج
   *  من المكاتب لاحقًا — يربط أزرارًا ثابتة في الواجهة لا تتغير بتغيّر المكتب. */
  wireOnce() {
    if (this._wired) return;
    this._wired = true;

    const savedTheme = localStorage.getItem('officeStatsTheme');
    if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
    window.addEventListener('hashchange', () => this.renderRoute());

    const sidebar = document.querySelector('.sidebar');
    const toggleMenu = () => sidebar.classList.toggle('mobile-open');
    const closeMenu = () => sidebar.classList.remove('mobile-open');
    document.getElementById('mobileMenuBtn').addEventListener('click', toggleMenu);
    document.querySelectorAll('.nav-link').forEach(l => l.addEventListener('click', closeMenu));

    document.getElementById('presExitBtn').addEventListener('click', () => PresentationPage.stop());
    document.getElementById('presPrevBtn').addEventListener('click', () => { PresentationPage.pause(); PresentationPage.prev(); });
    document.getElementById('presNextBtn').addEventListener('click', () => { PresentationPage.pause(); PresentationPage.next(); });
    document.getElementById('presPlayPauseBtn').addEventListener('click', () => PresentationPage.togglePlay());
    document.getElementById('presSpeedSelect').addEventListener('change', (e) => PresentationPage.changeSpeed(+e.target.value));
  },

  /** يُستدعى في كل مرة يُختار فيها مكتب (من Workspace.enter) — يحمّل هوية وبيانات
   *  ذلك المكتب تحديدًا ويعرض الصفحة الرئيسية. */
  start() {
    this.wireOnce();
    this.refreshBranding();
    this.setupYearSelect();
    this.renderRoute();
  },

  refreshBranding() {
    const g = StorageEngine.readGlobal() || { organizationName: 'مكتب التواصل والعلاقات العامة', organizationLogo: '' };
    const s = DataLayer.getSettings();
    document.getElementById('branchNameLabel').textContent = s.branchName || '—';
    document.getElementById('officeNameLabel').textContent = g.organizationName;
    const badge = document.getElementById('brandBadge');
    badge.innerHTML = g.organizationLogo ? `<img src="${g.organizationLogo}" alt="الشعار">` : 'إح';

    const switchBtn = document.getElementById('switchOfficeBtn');
    switchBtn.style.display = Workspace.visibleOffices().length > 1 ? '' : 'none';

    // إخفاء تبويب الإعدادات كليًا من القائمة إن لم تتوفر أي صلاحية إعدادات أصلًا
    document.getElementById('settingsNavLink').style.display = Auth.hasAnySettingsAccess() ? '' : 'none';

    // أيقونات القائمة الرئيسية — مشتركة بين المكتبين، وتُعدَّل من الإعدادات ← عام
    const navIcons = { ...this.defaultNavIcons, ...(g.navIcons || {}) };
    Object.entries(navIcons).forEach(([key, icon]) => {
      const el = document.getElementById(`navIcon_${key}`);
      if (el) el.textContent = icon;
    });
  },

  setupYearSelect() {
    const s = DataLayer.getSettings();
    const sel = document.getElementById('yearSelect');
    const currentSelection = sel.value ? parseInt(sel.value) : new Date().getFullYear();
    const years = yearRange(Math.min(s.reportYearFrom, currentSelection), Math.max(s.reportYearTo, currentSelection));
    sel.innerHTML = years.map(y => `<option value="${y}" ${y === currentSelection ? 'selected' : ''}>${y}</option>`).join('');
    sel.onchange = () => this.renderRoute();
  },

  toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('officeStatsTheme', 'light'); }
    else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('officeStatsTheme', 'dark'); }
    this.renderRoute();
  },

  getYear() {
    const sel = document.getElementById('yearSelect');
    return sel ? parseInt(sel.value) : new Date().getFullYear();
  },

  titles: {
    dashboard: 'الصفحة الرئيسية', entry: 'إدخال البيانات',
    reports: 'التقارير', settings: 'الإعدادات', about: 'عن المكتب', procedures: 'دليل الإجراءات'
  },

  // مسارات قديمة (روابط سابقة) أصبحت تبويبات فرعية داخل الإعدادات — نحافظ عليها متاحة
  // حتى لا تنكسر أي روابط محفوظة لدى المستخدم، فقط نوجّهها للتبويب الصحيح.
  legacyRouteToSettingsTab: { departments: 'departments', health: 'health', backup: 'backup' },

  renderRoute() {
    let route = (location.hash || '#dashboard').replace('#', '');

    if (this.legacyRouteToSettingsTab[route]) {
      SettingsPage.activeTab = this.legacyRouteToSettingsTab[route];
      route = 'settings';
    }

    this.currentRoute = route;
    document.getElementById('pageTitle').textContent = this.titles[route] || '';
    document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.route === route));

    const content = document.getElementById('content');
    const year = this.getYear();

    try {
      if (route === 'dashboard') DashboardPage.render(content, year);
      else if (route === 'entry') EntryPage.render(content, year);
      else if (route === 'reports') ReportsPage.render(content, year);
      else if (route === 'about') AboutPage.render(content);
      else if (route === 'procedures') ProceduresPage.render(content);
      else if (route === 'settings') {
        if (!Auth.hasAnySettingsAccess()) { content.innerHTML = '<div class="card">لا تملك صلاحية الوصول لهذه الصفحة.</div>'; return; }
        SettingsPage.render(content, year);
      }
      else content.innerHTML = '<div class="card">الصفحة غير موجودة</div>';
    } catch (e) {
      content.innerHTML = `<div class="card" style="color:var(--danger)">تعذر تحميل الصفحة: ${e.message}</div>`;
      console.error(e);
    }
  }
};


/* ===== workspace.js ===== */
/**
 * ===== شاشة اختيار المكتب (Workspace Switcher) =====
 * نقطة الدخول الأولى للنظام. كل مكتب له تخزين مستقل بالكامل عبر StorageEngine،
 * فبمجرد اختيار مكتب تُحمَّل بياناته فقط، ولا تختلط بالمكتب الآخر إطلاقًا.
 *
 * هذه الشاشة تبقى مخصّصة لاختيار المكتب فقط دون أي عناصر إدارية — تعديل هوية
 * الجهة المشتركة (الاسم والشعار) متاح من داخل الإعدادات ← عام، في أي مكتب.
 */
const Workspace = {
  OFFICES: [
    { key: 'office1', defaultName: 'المكتب الأول' },
    { key: 'office2', defaultName: 'المكتب الثاني' }
  ],

  REMEMBER_KEY: 'officeStatsRememberedRole_v1',

  init() {
    StorageEngine.migrateLegacyIfNeeded();
    StorageEngine.ensureGlobalSettings();
    Auth.ensureDefaults();

    document.getElementById('switchOfficeBtn').addEventListener('click', () => this.exitToLanding());
    document.getElementById('logoutBtn').addEventListener('click', () => this.logout());
    document.getElementById('loginBtn').addEventListener('click', () => this.attemptLogin());
    document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') this.attemptLogin(); });

    // "تذكرني": إن وُجدت جلسة محفوظة على هذا الجهاز، نتخطى شاشة الدخول — لكن بعد
    // إعادة التحقق أن هذا الحساب لا يزال مفعّلًا وغير منتهي الصلاحية، وإلا فحساب
    // مؤقت أو مُعطَّل يبقى يتجاوز القيد طالما "تذكرني" محفوظة على هذا الجهاز.
    const remembered = localStorage.getItem(this.REMEMBER_KEY);
    if (remembered && ['admin', 'supervisor', 'employee'].includes(remembered)) {
      const acc = Auth.getAuth()[remembered];
      const stillValid = remembered === 'admin' || (acc && acc.enabled !== false && !Auth.isExpired(acc));
      if (stillValid) {
        Auth.currentRole = remembered;
        const visible = this.visibleOffices();
        if (visible.length === 1) this.enter(visible[0].key);
        else this.renderLanding();
        return;
      }
      localStorage.removeItem(this.REMEMBER_KEY); // لم يعد صالحًا — امسح الجلسة المحفوظة
    }

    this.showLogin();
  },

  /** المكاتب غير المخفية من إعدادات "وضع العرض". حماية إضافية: لو أُخفي كل شيء
   *  بالخطأ (حالة غير متوقعة)، نتجاهل الإخفاء ونعرض الكل بدل شاشة فارغة. */
  visibleOffices() {
    const g = StorageEngine.readGlobal() || {};
    const hidden = g.hiddenOffices || [];
    const visible = this.OFFICES.filter(o => !hidden.includes(o.key));
    return visible.length ? visible : this.OFFICES;
  },

  /** قراءة اسم المكتب المحفوظ دون تفعيله كمكتب حالي — لعرضه على البطاقة فقط.
   *  يدعم التوافق مع النسخ القديمة (officeName) إن لم يوجد branchName بعد. */
  peekBranchName(key) {
    const raw = localStorage.getItem(StorageEngine.keyFor(key));
    if (!raw) return null;
    try {
      const s = JSON.parse(raw).settings || {};
      return s.branchName || s.officeName || null;
    } catch (e) { return null; }
  },

  showLogin() {
    const g = StorageEngine.readGlobal() || {};
    document.getElementById('loginBranchName').textContent = g.organizationName || 'تسجيل الدخول';
    const logoEl = document.getElementById('loginLogo');
    logoEl.innerHTML = g.organizationLogo ? `<img src="${g.organizationLogo}" alt="الشعار">` : 'إح';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('landingScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginUsername').focus();
  },

  attemptLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    const result = Auth.login(username, password);
    if (result.success) {
      errEl.textContent = '';
      if (document.getElementById('rememberMeCheckbox').checked) {
        localStorage.setItem(this.REMEMBER_KEY, Auth.currentRole);
      }
      document.getElementById('loginScreen').classList.add('hidden');
      // بعد الدخول: مكتب واحد ظاهر فقط → ادخله مباشرة، وإلا اعرض شاشة الاختيار
      const visible = this.visibleOffices();
      if (visible.length === 1) this.enter(visible[0].key);
      else this.renderLanding();
    } else if (result.reason === 'expired') {
      errEl.textContent = 'انتهت صلاحية هذا الحساب المؤقت. تواصل مع مسؤول النظام لتجديده.';
    } else if (result.reason === 'disabled') {
      errEl.textContent = 'هذا الحساب معطَّل حاليًا. تواصل مع مسؤول النظام.';
    } else {
      // رسالة عامة لا تكشف أي تفاصيل عن مستويات الصلاحيات المتاحة
      errEl.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    }
  },

  /** تسجيل الخروج الكامل: يُنهي الجلسة، يمسح "تذكرني" إن وُجدت، ويعيد لشاشة الدخول. */
  logout() {
    Auth.logout();
    localStorage.removeItem(this.REMEMBER_KEY);
    document.getElementById('app').classList.add('hidden');
    document.getElementById('landingScreen').classList.add('hidden');
    this.showLogin();
  },

  renderLanding() {
    const g = StorageEngine.readGlobal() || { organizationName: 'مكتب التواصل والعلاقات العامة', organizationLogo: '' };

    document.getElementById('landingOrgName').textContent = g.organizationName;
    const logoEl = document.getElementById('landingLogo');
    logoEl.innerHTML = g.organizationLogo ? `<img src="${g.organizationLogo}" alt="الشعار">` : 'إح';

    document.getElementById('landingScreen').classList.remove('hidden');

    const container = document.getElementById('landingCards');
    const cardBg = g.landingCardBackground ? ` style="background-image:url('${g.landingCardBackground}')"` : '';
    container.innerHTML = this.visibleOffices().map(o => {
      const name = this.peekBranchName(o.key) || o.defaultName;
      return `
        <button type="button" class="landing-card"${cardBg} data-office="${o.key}">
          <div class="landing-card-name">${name}</div>
        </button>
      `;
    }).join('');
    container.querySelectorAll('.landing-card').forEach(btn => {
      btn.addEventListener('click', () => this.enter(btn.dataset.office));
    });

    // الزر يظهر فقط عند وجود أكثر من مكتب فعليًا (لا معنى لعرض "شامل" لمكتب واحد) —
    // ونستخدم .onclick بدل addEventListener لأن هذا عنصر ثابت قد تُستدعى renderLanding
    // من أجله أكثر من مرة في الجلسة، وaddEventListener كان سيراكم معالجات مكررة.
    const presBtn = document.getElementById('landingPresentationBtn');
    presBtn.style.display = this.visibleOffices().length > 1 ? '' : 'none';
    presBtn.onclick = () => PresentationPage.startForAllOffices();
  },

  /** يُختار مكتب بعد تسجيل الدخول بالفعل — لا حاجة لتسجيل دخول إضافي هنا. */
  enter(officeKey) {
    const isFresh = !StorageEngine.hasData(officeKey);
    StorageEngine.setWorkspace(officeKey);
    DataLayer.init();
    if (isFresh) {
      const def = this.OFFICES.find(o => o.key === officeKey);
      DataLayer.updateSettings({ branchName: def.defaultName });
    }
    document.getElementById('landingScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    location.hash = '#dashboard';
    App.start();
  },

  /** "تبديل المكتب": يبقي المستخدم مسجّلًا للدخول، فقط يعيده لشاشة اختيار المكتب. */
  /** عنصر واجهة صغير قابل لإعادة الاستخدام: خانة اختيار "تطبيق على المكتب الآخر أيضًا" —
   *  يظهر فقط إن كان هناك أكثر من مكتب واحد أصلًا. */
  otherOfficeCheckbox(idSuffix) {
    if (this.OFFICES.length < 2) return '';
    return `
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-muted);margin-top:8px">
        <input type="checkbox" id="other_office_${idSuffix}"> تطبيق نفس التغيير على المكتب الآخر أيضًا
      </label>
    `;
  },

  /** ينفّذ عملية معيّنة على بيانات المكتب الآخر مؤقتًا، ثم يعيد الحالة لمكتب العمل
   *  الحالي فور الانتهاء — يُستخدم لمزامنة إضافة/إعادة تسمية محور أو إدارة بين
   *  المكتبين، دون الحاجة لخروج المستخدم من المكتب الذي يعمل عليه فعليًا. */
  applyToOtherOffice(action) {
    const current = StorageEngine.currentWorkspace;
    const other = this.OFFICES.map(o => o.key).find(k => k !== current);
    if (!other) return;
    StorageEngine.setWorkspace(other);
    DataLayer.init();
    try { action(); }
    finally {
      StorageEngine.setWorkspace(current);
      DataLayer.init();
    }
  },

  exitToLanding() {
    document.getElementById('app').classList.add('hidden');
    this.renderLanding();
  }
};

Workspace.init();


</script>
</body>
</html>
