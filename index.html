<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A2E25">
<title>نظام الإحصاء والتقارير — مكتب التواصل والعلاقات العامة</title>
<style>
/* =========================================================
   نظام التصميم — نظام الإحصاء والتقارير
   الهوية: أخضر عميق رسمي + لمسة برونزية/ذهبية للتمييز
   ========================================================= */
:root{
  --green-950:#0A2E25;
  --green-800:#0E4B3D;
  --green-700:#146B54;
  --green-100:#E4EFEA;
  --gold-600:#B8902F;
  --gold-100:#F4E9CE;
  --bg:#F5F6F4;
  --surface:#FFFFFF;
  --surface-2:#EFF1EE;
  --text:#14201B;
  --text-muted:#5B6B63;
  --border:#DFE4E0;
  --success:#1E8A5F;
  --warning:#C98A1D;
  --danger:#B23A3A;
  --radius:10px;
  --shadow:0 1px 2px rgba(20,32,27,.06), 0 4px 16px rgba(20,32,27,.06);
  --font-ui: "Segoe UI", Tahoma, "Arial", sans-serif;
  --font-num: "Consolas", "Segoe UI", Tahoma, monospace;
}
[data-theme="dark"]{
  --bg:#0D1512;
  --surface:#152019;
  --surface-2:#1B2820;
  --text:#EAF1EC;
  --text-muted:#93A69B;
  --border:#25342B;
  --green-100:#173226;
  --gold-100:#2A2213;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--text);
  direction:rtl;
  font-size:15px;
  line-height:1.55;
}
.hidden{display:none !important;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;background:none;border:none;padding:0;margin:0;color:inherit;}
input,select,textarea{font-family:inherit;}

.saved-badge{font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:8px;}

/* ---------- شاشة اختيار المكتب ---------- */
.landing-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1200px 600px at 50% -10%, var(--green-100), transparent), var(--bg);
  padding:24px;
}
.landing-inner{text-align:center;max-width:640px;width:100%;}
.landing-title-badge{
  width:72px;height:72px;border-radius:16px;background:#fff;color:var(--gold-600);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;
  margin:0 auto 30px;overflow:hidden;flex:none;box-shadow:var(--shadow);
}
.landing-title-badge img{width:100%;height:100%;object-fit:cover;display:block;}
.landing-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.landing-card{
  background:var(--green-950);
  background-size:cover;background-position:center;background-repeat:no-repeat;
  border:none;border-radius:16px;
  padding:52px 20px;box-shadow:var(--shadow);text-align:center;transition:.15s;
  min-height:120px;display:flex;align-items:center;justify-content:center;
}
.landing-card:hover{transform:translateY(-2px);filter:brightness(1.05);}
.landing-card-name{font-size:19px;font-weight:700;color:var(--gold-600);text-shadow:0 1px 3px rgba(0,0,0,.4);}
@media (max-width:520px){.landing-cards{grid-template-columns:1fr;}}
.landing-footer{
  margin-top:26px;padding-top:16px;border-top:1px solid var(--border);
}
.landing-footer-org{font-size:14px;font-weight:700;color:var(--green-800);margin-bottom:3px;}
.landing-footer-system{font-size:12px;color:var(--text-muted);}

/* ---------- تخطيط عام ---------- */
.app{
  display:grid;
  grid-template-columns:236px 1fr;
  grid-template-rows:62px 1fr;
  grid-template-areas:"sidebar topbar" "sidebar content";
  min-height:100vh;
}
.sidebar{
  grid-area:sidebar;
  width:236px;
  background:var(--green-950);
  color:#EAF1EC;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:22px 18px 16px;}
.brand-badge{
  width:38px;height:38px;border-radius:10px;background:#fff;
  color:var(--gold-600);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;flex:none;overflow:hidden;
}
.brand-badge img{width:100%;height:100%;object-fit:cover;}
.brand-title{font-size:14px;font-weight:600;}
.brand-sub{font-size:11px;color:#9FB6AC;}
.nav{display:flex;flex-direction:column;padding:8px 12px;gap:2px;flex:1;}
.nav-link{
  padding:11px 14px;border-radius:8px;font-size:13.5px;color:#C9D8D0;
  border-right:3px solid transparent;
}
.nav-link:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-link.active{background:rgba(184,144,47,.16);color:#fff;border-right-color:var(--gold-600);}
.nav-icon{display:inline-block;width:18px;text-align:center;margin-left:4px;}
.sidebar-footer{padding:14px;}
/* الشريط الجانبي داكن ثابت دائمًا (بصرف النظر عن وضع التطبيق العام)، لكن أزرار
   أسفله كانت تستخدم لون النص المرتبط بوضع التطبيق (var(--text)) — في الوضع العادي
   يكون هذا اللون داكنًا، فيظهر نصًا داكنًا فوق خلفية داكنة (شبه غير مقروء). لون ثابت
   فاتح هنا يطابق لون نص الشريط الجانبي نفسه، بصرف النظر عن الوضع العام للتطبيق. */
.sidebar-footer .btn-ghost{color:#EAF1EC;border-color:rgba(234,241,236,.25);}
.sidebar-footer .btn-ghost:hover{background:rgba(255,255,255,.08);}

.topbar{
  grid-area:topbar;
  height:62px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:5;
}
.topbar-title{font-size:16px;font-weight:700;color:var(--green-800);}
.topbar-actions{display:flex;align-items:center;gap:12px;}
.year-select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);}

.content{grid-area:content;padding:24px;max-width:1400px;width:100%;margin:0 auto;min-width:0;}

/* ---------- أزرار ---------- */
.btn{border:none;border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:600;transition:.15s;}
.btn-primary{background:var(--green-800);color:#fff;}
.btn-primary:hover{background:var(--green-700);}
.btn-gold{background:var(--gold-600);color:#241A05;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface-2);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-small{padding:6px 12px;font-size:12.5px;}
.btn-block{width:100%;margin-top:18px;}

/* ---------- بطاقات المؤشرات ---------- */
.section-title{font-size:15px;font-weight:700;margin:28px 0 14px;color:var(--green-800);}
.section-title:first-child{margin-top:0;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat-card .label{font-size:12.5px;color:var(--text-muted);margin-bottom:8px;}
.stat-card .value{font-family:var(--font-num);font-size:26px;font-weight:700;color:var(--green-800);}
.stat-card .change{font-size:12px;margin-top:6px;display:inline-block;padding:2px 8px;border-radius:20px;}
.change.up{color:var(--success);background:rgba(30,138,95,.1);}
.change.down{color:var(--danger);background:rgba(178,58,58,.1);}
.change.flat{color:var(--text-muted);background:var(--surface-2);}

/* ---------- شارات أيقونية ملوّنة على البطاقات والمؤشرات — بألوان مؤسسية متعددة
   (أخضر/ذهبي/أزرق/تركواز) لا ألوان تسويقية حرة، إثراءً بصريًا يبقى منسجمًا مع الهوية
   الرسمية. تُطبَّق على الصفحة الرئيسية والعرض التقديمي معًا لأنهما يتشاركان نفس
   قوالب البطاقات (renderCategory واحدة للاثنين). ---------- */
.stat-card .stat-icon{
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:10px;background:var(--card-accent-soft, var(--green-100));
  color:var(--card-accent, var(--green-800));
}
.cards-grid .stat-card:nth-child(6n+1){--card-accent:#0E4B3D;--card-accent-soft:#0E4B3D1a;}
.cards-grid .stat-card:nth-child(6n+2){--card-accent:#B8902F;--card-accent-soft:#B8902F1a;}
.cards-grid .stat-card:nth-child(6n+3){--card-accent:#1E6FA8;--card-accent-soft:#1E6FA81a;}
.cards-grid .stat-card:nth-child(6n+4){--card-accent:#1E8A5F;--card-accent-soft:#1E8A5F1a;}
.cards-grid .stat-card:nth-child(6n+5){--card-accent:#146B7A;--card-accent-soft:#146B7A1a;}
.cards-grid .stat-card:nth-child(6n+6){--card-accent:#8A6D1E;--card-accent-soft:#8A6D1E1a;}
.stat-card:after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(160deg, transparent 55%, var(--card-accent-soft, transparent) 200%);
}

.kpi-item .kpi-icon{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;margin-bottom:8px;background:var(--card-accent-soft, var(--gold-100));
  color:var(--card-accent, var(--gold-600));
}
.kpi-grid .kpi-item:nth-child(6n+1){--card-accent:#0E4B3D;--card-accent-soft:#0E4B3D1a;}
.kpi-grid .kpi-item:nth-child(6n+2){--card-accent:#B8902F;--card-accent-soft:#B8902F1a;}
.kpi-grid .kpi-item:nth-child(6n+3){--card-accent:#1E6FA8;--card-accent-soft:#1E6FA81a;}
.kpi-grid .kpi-item:nth-child(6n+4){--card-accent:#1E8A5F;--card-accent-soft:#1E8A5F1a;}
.kpi-grid .kpi-item:nth-child(6n+5){--card-accent:#146B7A;--card-accent-soft:#146B7A1a;}
.kpi-grid .kpi-item:nth-child(6n+6){--card-accent:#8A6D1E;--card-accent-soft:#8A6D1E1a;}

.hero-badge{
  display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,var(--green-800),var(--green-950));
  color:#fff;border-radius:16px;padding:22px 26px;margin-bottom:22px;
}
.hero-ring{
  width:88px;height:88px;border-radius:50%;flex:none;
  background: conic-gradient(var(--gold-600) calc(var(--pct,0)*1%), rgba(255,255,255,.15) 0);
  display:flex;align-items:center;justify-content:center;
}
.hero-ring-inner{
  width:66px;height:66px;border-radius:50%;background:var(--green-950);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-num);
  font-weight:700;font-size:16px;
}
.hero-text h2{margin:0 0 4px;font-size:16px;}
.hero-text p{margin:0;font-size:12.5px;color:#C9D8D0;}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border-top:3px solid var(--gold-600);}
.chart-card h3{margin:0 0 10px;font-size:13.5px;color:var(--text-muted);font-weight:600;}
.chart-card canvas{max-height:170px;}
.chart-card.full{grid-column:1/-1;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
.kpi-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.kpi-item .kv{font-family:var(--font-num);font-size:19px;font-weight:700;color:var(--gold-600);}

/* ---------- قائمة "الأعلى" أفقية مرتبة ---------- */
.top-list-card{display:flex;flex-direction:column;gap:10px;}
.top-list-row{display:flex;align-items:center;gap:10px;}
.top-list-rank{
  width:24px;height:24px;border-radius:50%;flex:none;background:var(--green-100);color:var(--green-800);
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.top-list-row:nth-child(1) .top-list-rank{background:var(--gold-600);color:#fff;}
.top-list-info{flex:1;min-width:0;}
.top-list-name{font-size:12.5px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-list-bar-track{height:7px;background:var(--surface-2);border-radius:8px;overflow:hidden;}
.top-list-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-800),var(--gold-600));border-radius:8px;}
.top-list-value{font-family:var(--font-num);font-size:13.5px;font-weight:700;color:var(--green-800);flex:none;min-width:44px;text-align:left;}
.kpi-item .kl{font-size:12px;color:var(--text-muted);margin-top:4px;}

/* ---------- نماذج الإدخال ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text-muted);}
.tab-btn.active{background:var(--green-800);color:#fff;border-color:var(--green-800);}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:16px;}
.field label{display:block;font-size:12.5px;color:var(--text-muted);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13.5px;font-family:inherit;
}
.field textarea{resize:vertical;}
.indicator-check{display:flex;align-items:flex-start;gap:6px;font-size:12.5px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
.indicator-check input{margin-top:3px;flex:none;}
.indicator-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;}
.indicator-group-title{font-size:13px;font-weight:700;color:var(--green-800);margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--gold-600);}
.indicator-group-title:first-child{margin-top:0;}
.indicator-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
@media (max-width:480px){
  .indicator-grid{grid-template-columns:repeat(2,1fr);}
  .indicator-grid-3{grid-template-columns:repeat(2,1fr);}
}
.rte-toolbar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
.rte-toolbar button{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12.5px;color:var(--text);}
.rte-toolbar button:hover{background:var(--surface-2);}
.rte-box{
  min-height:70px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.7;
}
.rte-box:empty:before{content:attr(data-placeholder);color:var(--text-muted);}
.rte-box ul,.rte-box ol{padding-inline-start:22px;margin:6px 0;}

table{width:100%;border-collapse:collapse;font-size:13px;}
tfoot td{border-top:2px solid var(--green-800);background:var(--green-100);}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);}
th{color:var(--text-muted);font-weight:600;font-size:12.5px;background:var(--surface-2);}
tr:hover td{background:var(--surface-2);}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
.table-actions{display:flex;gap:6px;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--green-950);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
  box-shadow:var(--shadow);z-index:50;opacity:0;transition:.25s;pointer-events:none;
}
.toast.show{opacity:1;bottom:30px;}
.toast.error{background:var(--danger);}

.badge{padding:2px 9px;border-radius:20px;font-size:11px;}
.badge.on{background:rgba(30,138,95,.12);color:var(--success);}
.badge.off{background:var(--surface-2);color:var(--text-muted);}

.report-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:20px;}
.report-output{margin-top:18px;}
.exec-summary{background:var(--green-100);border-radius:10px;padding:16px 18px;margin-bottom:18px;font-size:13.5px;line-height:1.9;}
.exec-summary strong{display:block;margin-bottom:4px;}
.compare-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.report-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--green-800);}
.report-header img{height:66px;width:66px;object-fit:contain;border-radius:8px;flex:none;}
.report-header-branch{font-size:15px;font-weight:700;color:var(--green-800);}
.report-header-org{font-size:12px;color:var(--text-muted);}
.report-header h2{margin:2px 0 0;color:var(--green-800);}

.mobile-menu-btn{
  display:none;flex:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:17px;align-items:center;justify-content:center;
}

@media (max-width: 880px){
  .app{display:block;}
  .mobile-menu-btn{display:flex;}
  .sidebar{
    position:static;width:100%;height:auto;display:none;
    max-height:70vh;overflow-y:auto;
  }
  .sidebar.mobile-open{display:flex;}
  .topbar{padding:0 12px;gap:10px;}
  .topbar-title{font-size:14px;}
  .content{padding:14px;}
  .cards-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .charts-grid{grid-template-columns:1fr;}
  .compare-cols{grid-template-columns:1fr;}
  .hero-badge{flex-direction:column;text-align:center;gap:12px;}
  .report-toolbar{flex-direction:column;align-items:stretch;}
  .report-toolbar .field{width:100%;}
  .stat-card{padding:12px 14px;}
  .stat-card .value{font-size:21px;}
  .chart-card canvas{max-height:150px;}
  .kpi-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
}

/* هاتف صغير — شبكة أضيق (بطاقتان بالعرض بدل بطاقة واحدة) بحشوة وخط أصغر، حتى تتناسب
   البطاقات فعليًا مع عرض شاشات الهواتف الشائعة (~360-400px) بدل أن تمتد كل بطاقة
   بعرض الشاشة كاملة كما كانت تفعل بحد أدنى أكبر من العرض المتاح فعليًا. */
@media (max-width: 480px){
  .content{padding:10px;}
  .cards-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card{padding:10px 11px;}
  .stat-card .label{font-size:11px;margin-bottom:5px;}
  .stat-card .value{font-size:18px;}
  .stat-card .change{font-size:10px;padding:1px 6px;}
  .kpi-item{padding:9px;}
  .kpi-item .kv{font-size:15px;}
  .kpi-item .kl{font-size:10.5px;}
  .chart-card{padding:10px;}
  .chart-card h3{font-size:12px;}
  .chart-card canvas{max-height:130px;}
  .section-title{font-size:13.5px;margin:18px 0 10px;}
  .presentation-overlay{padding:10px;}
  .presentation-title{font-size:18px;}
}

#printBgImg{display:none;}
.cover-page{display:none;}
@media print{
  #printBgImg{
    display:block;position:fixed;top:0;left:0;width:100%;height:100%;
    object-fit:fill;z-index:-1;
  }
  .cover-page{display:block;position:relative;width:100%;}
  .cover-page.cover-front{break-after:page;page-break-after:always;}
  .cover-page.cover-back{break-before:page;page-break-before:always;}
  /* تبسيط جذري بعد أكثر من محاولة إصلاح جزئي: بدل محاولة إجبار الصورة والحاوية على
     ارتفاع محسوب (بالنسبة المئوية أولًا، ثم بالمليمتر المطابق للصفحة) — نعتمد الآن
     على القياس الطبيعي البسيط (height:auto حسب أبعاد الصورة نفسها)، تمامًا كما كان
     يعمل بشكل موثوق قبل إضافة النص الحي فوق الغلاف. الصورة الافتراضية المدمجة بأبعاد
     A4 تقريبًا أصلًا، فتملأ الصفحة طبيعيًا بلا أي حساب إضافي أو نسب مئوية قد تنكسر. */
  .cover-page img{width:100%;height:auto;display:block;object-fit:cover;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cover-page.cover-generated{width:100%;}
  /* النص فوق الغلاف: تموضع بالمليمتر (قيمة مطلقة) بدل النسبة المئوية — لا يعتمد على
     ارتفاع أي عنصر أب محسوب إطلاقًا، فلا يمكن أن "ينهار" مهما كانت ظروف الأصل. */
  .cover-overlay-text{
    position:absolute;bottom:158mm;right:0;left:0;text-align:center;padding:0 12mm;z-index:1;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .cover-overlay-title{font-family:var(--font-ui);font-size:64px;font-weight:900;color:#0E4B3D;margin-bottom:8px;letter-spacing:0.3px;}
  .cover-overlay-period{font-family:var(--font-ui);font-size:15px;font-weight:700;color:#3a3a3a;}
  .sidebar,.topbar,.no-print,.btn{display:none !important;}
  .content{padding:0;max-width:none;}
  body{background:#fff;color:#000;}
  .card{box-shadow:none;border:none;}
  /* القالب (الترويسة الرسمية) عنصر <img> ثابت الموضع يمتد حتى حواف الصفحة الفعلية
     بصرف النظر عن هامش @page (الذي يبقى صغيرًا: 4مم، مضبوط من ReportsPage.printToPdf).
     النزول بالكتابة عن حواف القالب يتم بحشوة على #printArea نفسها: أفقيًا (11مم) تعمل
     بشكل موثوق دائمًا لأنها تتكرر تلقائيًا في كل صفحة مطبوعة. رأسيًا (10مم ≈ سطر إلى
     سطرين) تعتمد على box-decoration-break: clone، وهي خاصية مصمَّمة خصيصًا لتكرار حشوة
     عنصر عند انقسامه بين عدة صفحات. */
  #printArea{
    box-sizing:border-box;padding:10mm 11mm;
    box-decoration-break:clone;-webkit-box-decoration-break:clone;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;position:relative;z-index:1;
  }
  /* شبكات CSS Grid لها دعم ترقيم صفحات ضعيف/غير متسق عبر المتصفحات عند الطباعة —
     أحيانًا تُجبَر الشبكة كاملة على القفز لصفحة جديدة إن لم يتسع عنصر واحد بداخلها،
     تاركة فراغًا كبيرًا في نهاية الصفحة السابقة. نحوّلها لتدفّق عادي (block) أثناء
     الطباعة فقط، بحيث يتدفّق كل عنصر بحرية ويُطبع الفراغ المتبقي بدل تركه فارغًا. */
  #printArea .charts-grid,#printArea .cards-grid,#printArea .kpi-grid{
    display:block !important;
  }
  #printArea .chart-card,#printArea .stat-card,#printArea .kpi-item{
    margin-bottom:10px;
  }
  /* منع انقسام كل عنصر "ذري" صغير (بطاقة، صف جدول، رأس تقرير) بين صفحتين. لا نطبّق
     هذا على الحاويات الكبيرة (الجدول كاملًا، شبكة البطاقات كاملة) لأن إجبار عنصر أطول
     من صفحة كاملة على البقاء متماسكًا يُنتج فراغات بيضاء كبيرة أو يُتجاهَل تمامًا؛
     الأصح ترك الحاوية تتدفّق بحرية بينما تبقى كل وحدة صغيرة بداخلها متماسكة. */
  #printArea tr,#printArea thead,#printArea .exec-summary,#printArea .kpi-item,
  #printArea .stat-card,#printArea .chart-card,#printArea .report-header{
    break-inside:avoid;page-break-inside:avoid;
  }
  /* كانت هناك قاعدة break-after:avoid على h3 (لمنع بقاء عنوان وحيدًا أسفل صفحة) —
     أزلناها لأنها بدت تتفاعل مع قواعد "منع الانقسام" على البطاقات فتدفع القسم كاملًا
     لصفحة جديدة حتى مع وجود مساحة كافية، منتجة صفحات إضافية وفراغات كبيرة غير
     ضرورية. المخاطرة المقبولة الآن: قد يبقى عنوان وحيدًا نادرًا في أسفل صفحة، وهذا
     أهون بكثير من تضخّم عدد الصفحات لتقرير شبه فارغ كما لوحظ فعليًا. */
  /* شفافية شاملة لكل عنصر داخل منطقة الطباعة (بدل تعداد كل صنف على حدة، وهي طريقة
     هشة أثبتت أنها تفوّت عناصر مثل .chart-card وصفوف الإجمالي) — يضمن ظهور القالب
     خلف كل المحتوى دون استثناء. */
  #printArea *{background:transparent !important;}
}

<script>

/* ===== utils.js ===== */
/**
 * ===== دوال مساعدة عامة =====
 */
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

/** تكبير الأرقام تدريجيًا من صفر إلى قيمتها الفعلية داخل أي حاوية — يمنح إحساسًا حيًّا
 *  بلا أي حاجة للمس أو تدخّل يدوي. يتجاهل أي نص غير رقمي بالكامل (مثل اسم جهة إحالة
 *  أو اسم شهر) لأنه لا معنى لعدّه تصاعديًا. مشتركة بين الصفحة الرئيسية والعرض التقديمي. */
function animateCountUp(containerSelector) {
  const targets = document.querySelectorAll(`${containerSelector} .stat-card .value, ${containerSelector} .kpi-item .kv`);
  targets.forEach(el => {
    const raw = el.textContent.trim();
    const match = raw.match(/^(-?[\d,]+(?:\.\d+)?)(%?)$/);
    if (!match) return; // نص غير رقمي بالكامل — يُعرض كما هو دون أي حركة
    const finalValue = parseFloat(match[1].replace(/,/g, ''));
    const suffix = match[2];
    const isDecimal = match[1].includes('.');
    if (isNaN(finalValue)) return;
    const duration = 700, start = performance.now();
    const step = (now) => {
      const progress = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out تدريجي، أكثر حيوية من الخطي
      const current = finalValue * eased;
      el.textContent = (isDecimal ? current.toFixed(1) : Math.round(current).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',')) + suffix;
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = raw; // ضمان القيمة النهائية مطابقة تمامًا للنص الأصلي المُنسَّق
    };
    requestAnimationFrame(step);
  });
}

const HIJRI_MONTHS = ['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

/** تحويل تاريخ ميلادي إلى هجري بخوارزمية الجدول الهجري التقريبية المعيارية (نفس
 *  الأساس المستخدم في أغلب المكتبات مفتوحة المصدر) — تقريب فلكي وليس تقويم أم القرى
 *  الرسمي (الذي يخضع لتعديل إداري وليس حسابًا فلكيًا بحتًا)، فقد يختلف يومًا أو
 *  يومين أحيانًا، خصوصًا قرب حدود الشهر. */
function gregorianToHijri(gy, gm, gd) {
  const jd = Math.floor((1461 * (gy + 4800 + Math.floor((gm - 14) / 12))) / 4) +
             Math.floor((367 * (gm - 2 - 12 * Math.floor((gm - 14) / 12))) / 12) -
             Math.floor((3 * Math.floor((gy + 4900 + Math.floor((gm - 14) / 12)) / 100)) / 4) +
             gd - 32075;
  let l = jd - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  l = l - 10631 * n + 354;
  const j = Math.floor((10985 - l) / 5316) * Math.floor((50 * l) / 17719) + Math.floor(l / 5670) * Math.floor((43 * l) / 15238);
  l = l - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50) - Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
  const hm = Math.floor((24 * l) / 709);
  const hd = l - Math.floor((709 * hm) / 24);
  const hy = 30 * n + j - 30;
  return { year: hy, month: hm, day: hd };
}

/** تسمية هجرية تقريبية (الشهر والسنة) لشهر/سنة ميلاديين، باستخدام اليوم ١٥ كيوم
 *  مُمثِّل لمنتصف الشهر — نظامنا يتتبع دقة شهرية فقط لا يومية، والشهر الميلادي الواحد
 *  قد يتداخل مع شهرين هجريين، فهذا تقريب معقول للعرض وليس تطابقًا حصريًا. */
function hijriLabel(gy, gm) {
  const h = gregorianToHijri(gy, gm, 15);
  return `${HIJRI_MONTHS[h.month - 1]} ${h.year}هـ`;
}

function toast(msg, isError = false) {
  let el = document.getElementById('toastEl');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toastEl';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

function fmtNum(n) { return new Intl.NumberFormat('ar-EG-u-nu-latn').format(n || 0); }
function fmtPct(n) { const v = n || 0; return (v > 0 ? '+' : '') + v + '%'; }
function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ar-EG-u-nu-latn', { dateStyle: 'medium', timeStyle: 'short' });
}

/** يبني قائمة سنوات بين حدين (شاملة)، تُستخدم في كل قوائم اختيار السنة بالنظام */
function yearRange(from, to) {
  const arr = [];
  for (let y = from; y <= to; y++) arr.push(y);
  return arr;
}

const ACTION_LABELS = {
  create: 'إضافة', update: 'تعديل', delete: 'حذف',
  backup: 'نسخ احتياطي', restore: 'استعادة', reset: 'إعادة تعيين', system: 'نظام'
};

/**
 * ===== محرر نص منسّق مشترك (Rich Text Editor) =====
 * شريط أدوات بسيط (عريض/مائل/تسطير/قوائم/محاذاة/اتجاه) لأي مربع contenteditable،
 * باستخدام execCommand المدعوم في كل المتصفحات دون أي مكتبة خارجية. تستخدمه أي صفحة
 * تحتاج نصًا منسّقًا (الملخص التنفيذي في التقارير، صفحة عن المكتب...) دون تكرار الكود.
 */
const RTE = {
  buttons: [
    { cmd: 'undo', label: '↺', title: 'تراجع' },
    { cmd: 'bold', label: 'B', title: 'عريض' },
    { cmd: 'italic', label: 'I', title: 'مائل' },
    { cmd: 'underline', label: 'U', title: 'تسطير' },
    { cmd: 'insertUnorderedList', label: '•', title: 'قائمة نقطية' },
    { cmd: 'insertOrderedList', label: '1.', title: 'قائمة رقمية' },
    { cmd: 'justifyRight', label: 'يمين', title: 'محاذاة لليمين' },
    { cmd: 'justifyCenter', label: 'توسيط', title: 'توسيط' },
    { cmd: 'justifyLeft', label: 'يسار', title: 'محاذاة لليسار' },
    { cmd: 'justifyFull', label: 'ضبط', title: 'ضبط (تبرير الطرفين)' },
    { cmd: 'line-spacing', label: 'تباعد', title: 'تبديل تباعد الأسطر' }
  ],
  tableButton: { cmd: 'insert-table', label: 'جدول', title: 'إدراج جدول' },
  lineSpacingPresets: ['1.5', '1.9', '2.3'],

  /** opts.table: true لإضافة زر "إدراج جدول" — يُستخدم فقط لحقول تحتاجه فعليًا
   *  (مثل حقل "المحتوى" في دليل الإجراءات)، وليس كل حقول النظام. */
  toolbarHtml(targetId, opts = {}) {
    const btns = opts.table ? [...this.buttons, this.tableButton] : this.buttons;
    return `<div class="rte-toolbar" data-target="${targetId}">
      ${btns.map(b => `<button type="button" data-cmd="${b.cmd}" title="${b.title}">${b.label}</button>`).join('')}
      <button type="button" data-dir-toggle title="تبديل اتجاه الفقرة (عربي/إنجليزي)">اتجاه</button>
    </div>`;
  },
  /** يربط شريط الأدوات بمربع النص، ويستدعي onChange(html) عند أي تعديل. */
  wire(targetId, onChange) {
    const box = document.getElementById(targetId);
    const toolbar = document.querySelector(`.rte-toolbar[data-target="${targetId}"]`);
    toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', () => {
        box.focus();
        const cmd = btn.dataset.cmd;
        if (cmd === 'line-spacing') {
          // المشكلة الأصلية: كان التباعد يُطبَّق على صندوق التحرير نفسه (style.lineHeight)
          // لا على المحتوى المحفوظ فعليًا — فيظهر أثناء الكتابة في الإعدادات فقط، ويختفي
          // تمامًا عند عرض نفس النص في أي صفحة أخرى لأن onChange كان يحفظ box.innerHTML
          // فقط (محتوى الصندوق)، وليس خاصية style الخاصة بالصندوق ذاته. الحل: نُغلِّف
          // المحتوى بعنصر يحمل التباعد كخاصية inline حقيقية، فيُحفَظ كجزء من النص نفسه
          // ويظهر أينما عُرض هذا النص لاحقًا، لا فقط أثناء التحرير.
          let wrapper = box.querySelector(':scope > [data-line-spacing]');
          if (!wrapper) {
            wrapper = document.createElement('div');
            wrapper.setAttribute('data-line-spacing', '');
            while (box.firstChild) wrapper.appendChild(box.firstChild);
            box.appendChild(wrapper);
          }
          const current = wrapper.style.lineHeight || this.lineSpacingPresets[0];
          const idx = this.lineSpacingPresets.indexOf(current);
          wrapper.style.lineHeight = this.lineSpacingPresets[(idx + 1) % this.lineSpacingPresets.length];
          onChange(box.innerHTML);
          return;
        }
        if (cmd === 'insert-table') {
          const rows = Math.max(1, parseInt(prompt('عدد الصفوف؟', '3'), 10) || 3);
          const cols = Math.max(1, parseInt(prompt('عدد الأعمدة؟', '3'), 10) || 3);
          let html = '<table style="width:100%;border-collapse:collapse;margin:8px 0" border="1"><tbody>';
          for (let r = 0; r < rows; r++) {
            html += '<tr>';
            for (let c = 0; c < cols; c++) html += '<td style="padding:6px;border:1px solid #ccc">&nbsp;</td>';
            html += '</tr>';
          }
          html += '</tbody></table><p><br></p>';
          document.execCommand('insertHTML', false, html);
          onChange(box.innerHTML);
          return;
        }
        document.execCommand(cmd, false, null);
        onChange(box.innerHTML);
      });
    });
    const dirBtn = toolbar.querySelector('[data-dir-toggle]');
    dirBtn.addEventListener('mousedown', (e) => e.preventDefault());
    dirBtn.addEventListener('click', () => { box.dir = box.dir === 'ltr' ? 'rtl' : 'ltr'; box.focus(); });
    box.addEventListener('input', () => onChange(box.innerHTML));
  }
};

/**
 * ===== طبقة التخزين الخام (Storage Engine) =====
 * الطبقة الوحيدة في كامل النظام التي تتعامل مباشرة مع localStorage.
 * لا تعرف شيئًا عن معنى البيانات — فقط تقرأ وتكتب وتمسح كائن JSON واحد.
 *
 * يدعم تعدد "المكاتب" (Workspaces): كل مكتب له مفتاح localStorage مستقل تمامًا،
 * بحيث تكون بياناته (إدارات، طلبات، إعدادات، كل شيء) منفصلة 100% عن أي مكتب آخر.
 * DataLayer لا يعرف شيئًا عن هذا التعدد — فقط يقرأ/يكتب عبر هذا الملف، وهذا الملف
 * يوجّه القراءة/الكتابة تلقائيًا إلى مفتاح المكتب الحالي المُختار.
 */
const StorageEngine = {
  PREFIX: 'officeStatsData_v2',
  LEGACY_KEY: 'officeStatsData_v2', // المفتاح القديم قبل دعم تعدد المكاتب (نسخة مستخدم واحد)
  currentWorkspace: null,

  setWorkspace(key) {
    this.currentWorkspace = key;
  },
  keyFor(workspaceKey) {
    return `${this.PREFIX}__${workspaceKey}`;
  },
  _key() {
    if (!this.currentWorkspace) throw new Error('لم يتم اختيار مكتب بعد');
    return this.keyFor(this.currentWorkspace);
  },

  read() {
    const raw = localStorage.getItem(this._key());
    if (!raw) return null;
    try { return JSON.parse(raw); }
    catch (e) {
      console.error('تعذرت قراءة البيانات المحفوظة:', e);
      return null;
    }
  },

  write(obj) {
    localStorage.setItem(this._key(), JSON.stringify(obj));
  },

  clear() {
    localStorage.removeItem(this._key());
  },

  // تقدير حجم البيانات المخزّنة (تقريبي، بالكيلوبايت) لعرضه في صفحة سلامة البيانات
  estimateSizeKB() {
    const raw = localStorage.getItem(this._key()) || '';
    return Math.round((raw.length * 2) / 1024 * 10) / 10; // UTF-16 تقريبًا
  },

  /** هل يوجد بيانات محفوظة مسبقًا لمكتب معيّن؟ (تُستخدم لمعرفة إن كان المكتب جديدًا) */
  hasData(workspaceKey) {
    return !!localStorage.getItem(this.keyFor(workspaceKey));
  },

  /** ترحيل تلقائي لمرة واحدة: لو كانت هناك بيانات من الإصدار السابق (قبل ميزة تعدد
   *  المكاتب) ولم يُنشأ "المكتب الأول" بعد، نقلها إليه بلا فقدان لأي شيء. */
  migrateLegacyIfNeeded() {
    const legacyRaw = localStorage.getItem(this.LEGACY_KEY);
    const office1Key = this.keyFor('office1');
    if (legacyRaw && !localStorage.getItem(office1Key)) {
      localStorage.setItem(office1Key, legacyRaw);
    }
  },

  // ---------- إعدادات مشتركة على مستوى الجهة الرئيسية (وليست خاصة بمكتب واحد) ----------
  // اسم الجهة وشعارها مشتركان بين كل المكاتب (الفروع)، لذلك يُخزَّنان في مفتاح واحد
  // مستقل تمامًا عن مفاتيح المكاتب، ولا يمر عبر DataLayer إطلاقًا.
  GLOBAL_KEY: 'officeStatsGlobalSettings_v1',

  readGlobal() {
    const raw = localStorage.getItem(this.GLOBAL_KEY);
    if (!raw) return null;
    try { return JSON.parse(raw); }
    catch (e) { return null; }
  },

  writeGlobal(obj) {
    localStorage.setItem(this.GLOBAL_KEY, JSON.stringify(obj));
  },

  /** يُنشئ الإعدادات المشتركة لأول مرة فقط، ويحاول استعارة الاسم/الشعار الحاليين
   *  من "المكتب الأول" إن كانا موجودين مسبقًا (من نسخة سابقة للنظام)، حتى لا يُطلب
   *  من المستخدم إعادة إدخالهما من الصفر. */
  ensureGlobalSettings() {
    const existing = this.readGlobal();
    if (existing) {
      // تركيبات قديمة (قبل إضافة الغلاف المدمج) قد لا تملك coverBackground إطلاقًا —
      // نُضيفه لها مرة واحدة دون المساس بأي إعداد آخر موجود فعلًا.
      if (!existing.coverBackground) this.writeGlobal({ ...existing, coverBackground: DEFAULT_COVER_BACKGROUND });
      return;
    }
    let organizationName = 'مكتب التواصل والعلاقات العامة';
    let organizationLogo = '';
    const office1Raw = localStorage.getItem(this.keyFor('office1'));
    if (office1Raw) {
      try {
        const parsed = JSON.parse(office1Raw);
        if (parsed.settings?.officeName) organizationName = parsed.settings.officeName;
        if (parsed.settings?.logoDataUrl) organizationLogo = parsed.settings.logoDataUrl;
      } catch (e) { /* تجاهل، استخدم القيم الافتراضية */ }
    }
    // خلفية غلاف مدمجة افتراضيًا في النظام نفسه (بلا أي نص عليها) — لا حاجة لرفعها
    // يدويًا؛ يمكن استبدالها من الإعدادات ← عام في أي وقت إن رغب المستخدم بتصميم آخر.
    this.writeGlobal({ organizationName, organizationLogo, coverBackground: DEFAULT_COVER_BACKGROUND });
  }
};
