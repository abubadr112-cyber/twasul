        reportYearTo: year + 1,
        lastBackupAt: null
        // ملاحظة: محتوى "عن المكتب" و"دليل الإجراءات" أصبح مشتركًا بين المكتبين (مخزَّن
        // في الإعدادات العامة عبر StorageEngine.readGlobal/writeGlobal مباشرة)، وليس هنا.
      },
      departments: [],
      customCategories: [], // محاور مخصّصة يضيفها المستخدم بالكامل من الإعدادات
      categoryOverrides: {}, // تخصيص أسماء المحاور الأساسية الستة وحقولها
      activityLog: [],
      seq: { departments: 0, activityLog: 0, customCategorySeq: 0 },
      meta: { createdAt: now, lastModifiedAt: now }
    };
    CORE_TABLES.forEach(t => { state[t] = []; state.seq[t] = 0; });
    return state;
  }

  function seedDefaults(state) {
    ['إدارة التواصل الحكومي', 'إدارة العلاقات العامة', 'إدارة الإعلام', 'إدارة المناسبات'].forEach(name => {
      state.seq.departments += 1;
      state.departments.push({ id: state.seq.departments, name, active: 1 });
    });
    return state;
  }

  let state = null;

  function persist() {
    state.meta.lastModifiedAt = new Date().toISOString();
    StorageEngine.write(state);
    const badge = document.getElementById('lastSavedBadge');
    if (badge) badge.textContent = 'آخر حفظ: ' + new Date().toLocaleTimeString('ar-EG-u-nu-latn');
  }

  function nextId(key) {
    state.seq[key] = (state.seq[key] || 0) + 1;
    return state.seq[key];
  }

  function log(action, entity, description) {
    state.activityLog.push({
      id: nextId('activityLog'),
      ts: new Date().toISOString(),
      action, entity, description
    });
    if (state.activityLog.length > MAX_LOG_ENTRIES) {
      state.activityLog = state.activityLog.slice(-MAX_LOG_ENTRIES);
    }
  }

  return {
    CORE_TABLES, SCHEMA_VERSION,

    // ---------- إعداد الجداول الديناميكي (أساسية معاد تسميتها + مخصّصة) ----------
    // كل الصفحات (Entry، سلامة البيانات...) تستدعي هذا بدلاً من قائمة ثابتة، بحيث تنعكس
    // إعادة التسمية والإضافة والحذف فورًا في كل مكان دون أي تعديل عليها.
    getTableConfig() {
      const merged = {};
      Object.entries(CORE_TABLE_CONFIG).forEach(([key, cfg]) => {
        const override = state.categoryOverrides[key] || {};
        merged[key] = {
          ...cfg,
          title: override.title || cfg.title,
          icon: override.icon || cfg.icon,
          labels: { ...cfg.labels, ...(override.labels || {}) },
          hidden: !!override.hidden,
          fieldTypes: cfg.fieldTypes || {},
          isCore: true
        };
      });
      state.customCategories.forEach(c => {
        merged[c.key] = {
          title: c.title, hasDept: false, keyFields: ['month', 'year'],
          valueFields: c.valueFields.map(f => f.key),
          icon: c.icon || DEFAULT_CUSTOM_ICON,
          labels: Object.fromEntries(c.valueFields.map(f => [f.key, f.label])),
          fieldTypes: Object.fromEntries(c.valueFields.map(f => [f.key, f.type || 'number'])),
          hidden: !!c.hidden,
          isCore: false
        };
      });
      return merged;
    },
    getRecordTables() { return Object.keys(this.getTableConfig()); },
    listCustomCategories() { return state.customCategories.map(c => ({ ...c, valueFields: c.valueFields.map(f => ({ ...f })) })); },

    /** تغيير اسم محور أساسي و/أو تسميات حقوله (لا يمس البيانات المخزّنة إطلاقًا) */
    renameCoreCategory(tableKey, { title, fieldLabels, icon }) {
      if (!CORE_TABLE_CONFIG[tableKey]) throw new Error('محور أساسي غير معروف');
      const existing = state.categoryOverrides[tableKey] || {};
      // تصفية أي تسمية حقل فارغة قبل الدمج (بنفس حماية العنوان والأيقونة أعلاه) — حقل
      // تسمية فارغ يُهمَل ويبقى على قيمته السابقة، بدل أن يُحفَظ فارغًا فيختفي نصه
      // بالكامل من كل مكان يُعرض فيه (كجدول اختيار مؤشرات التقرير).
      const cleanedLabels = {};
      Object.entries(fieldLabels || {}).forEach(([k, v]) => { if (v && v.trim()) cleanedLabels[k] = v; });
      state.categoryOverrides[tableKey] = {
        title: title !== undefined && title !== '' ? title : existing.title,
        icon: icon !== undefined && icon !== '' ? icon : existing.icon,
        labels: { ...existing.labels, ...cleanedLabels },
        hidden: existing.hidden
      };
      log('update', 'category', `إعادة تسمية محور: ${this.getTableConfig()[tableKey].title}`);
      persist();
    },

    /** إظهار/إخفاء محور في شاشة إدخال البيانات، دون حذفه أو التأثير على بياناته —
     *  تعمل للمحاور الأساسية والمخصّصة معًا. الإظهار/الإخفاء خاص بهذا المكتب فقط. */
    setCategoryVisibility(key, hidden) {
      if (CORE_TABLE_CONFIG[key]) {
        const existing = state.categoryOverrides[key] || {};
        state.categoryOverrides[key] = { ...existing, hidden };
      } else {
        const cat = state.customCategories.find(c => c.key === key);
        if (!cat) throw new Error('محور غير معروف');
        cat.hidden = hidden;
      }
      log('update', 'category', `${hidden ? 'إخفاء' : 'إظهار'} محور: ${this.getTableConfig()[key].title}`);
      persist();
    },

    /** إضافة محور مخصّص جديد بالكامل — يظهر تلقائيًا كتبويب في إدخال البيانات، وكبطاقات
     *  عامة في لوحة التحكم والتقارير، دون أي حاجة لتعديل كود أي صفحة. */
    /** fields: مصفوفة من نصوص (توافقًا مع الاستخدام القديم، تُصبح كلها من نوع "رقم")
     *  أو من كائنات {label, type} حيث type هو 'number' (افتراضي) أو 'text'. الحقول
     *  النصية تُخزَّن كتجميع تكراري (قيمة نصية + عدد مرات تكرارها) بدل رقم واحد، مما
     *  يسمح بتتبع أشياء مثل "المناسبة: تعزية ×3، عزاء ×1" ضمن نفس الشهر. */
    addCustomCategory(title, fields) {
      if (!title || !title.trim()) throw new Error('اسم المحور مطلوب');
      const normalized = fields.map(f => typeof f === 'string' ? { label: f, type: 'number' } : f)
        .filter(f => f && f.label && f.label.trim());
      if (!normalized.length) throw new Error('أضف اسم حقل واحد على الأقل');
      const key = 'custom_' + nextId('customCategorySeq');
      const valueFields = normalized.map((f, i) => ({ key: 'v' + (i + 1), label: f.label.trim(), type: f.type === 'text' ? 'text' : 'number' }));
      state.customCategories.push({ key, title: title.trim(), valueFields });
      state[key] = [];
      state.seq[key] = 0;
      log('create', 'category', `إضافة محور جديد: ${title}`);
      persist();
      return key;
    },
    updateCustomCategory(key, { title, fieldLabels, icon }) {
      const cat = state.customCategories.find(c => c.key === key);
      if (!cat) throw new Error('المحور غير موجود');
      if (title && title.trim()) cat.title = title.trim();
      if (icon && icon.trim()) cat.icon = icon.trim();
      if (fieldLabels) {
        cat.valueFields.forEach(f => {
          if (fieldLabels[f.key] && fieldLabels[f.key].trim()) f.label = fieldLabels[f.key].trim();
        });
      }
      log('update', 'category', `تعديل محور: ${cat.title}`);
      persist();
    },
    deleteCustomCategory(key) {
      const cat = state.customCategories.find(c => c.key === key);
      if (!cat) throw new Error('المحور غير موجود');
      state.customCategories = state.customCategories.filter(c => c.key !== key);
      delete state[key];
      delete state.seq[key];
      log('delete', 'category', `حذف محور: ${cat.title} (وكل بياناته)`);
      persist();
    },

    // ---------- التهيئة ----------
    init() {
      const loaded = StorageEngine.read();
      if (loaded) {
        state = loaded;
        // ضمان وجود كل الحقول (لتوافق النسخ القديمة/الناقصة)
        const fresh = defaultState();
        state.settings = { ...fresh.settings, ...(state.settings || {}) };
        // توافق مع نسخ سابقة: كان محتوى "عن المكتب" و"دليل الإجراءات" مخزَّنًا لكل مكتب
        // على حدة — أصبح الآن مشتركًا بين المكتبين. ننقل أي محتوى سابق (من أي مكتب
        // وُجد فيه أولًا) إلى التخزين المشترك مرة واحدة فقط، حتى لا يُفقد محتوى حقيقي
        // أدخله المستخدم عند التحويل لتخزين مشترك.
        const g = StorageEngine.readGlobal() || {};
        if (!g._aboutProcMigrated) {
          const legacy = state.settings;
          const sharedUpdate = {};
          if (legacy.aboutIntro) sharedUpdate.aboutIntro = legacy.aboutIntro;
          if (legacy.procGuideFieldTitles) sharedUpdate.procGuideFieldTitles = legacy.procGuideFieldTitles;
          ['intro', 'vision', 'mission', 'goals', 'content', 'conclusion'].forEach(k => {
            if (legacy['procGuide_' + k]) sharedUpdate['procGuide_' + k] = legacy['procGuide_' + k];
          });
          // توافق أقدم: قبل فصل دليل الإجراءات، كانت الرؤية/الرسالة/الأهداف ضمن "عن المكتب" مباشرة
          if (legacy.aboutVision && !sharedUpdate.procGuide_vision) sharedUpdate.procGuide_vision = legacy.aboutVision;
          if (legacy.aboutMission && !sharedUpdate.procGuide_mission) sharedUpdate.procGuide_mission = legacy.aboutMission;
          if (legacy.aboutGoals && !sharedUpdate.procGuide_goals) sharedUpdate.procGuide_goals = legacy.aboutGoals;
          if (legacy.aboutProcedures && !sharedUpdate.procGuide_content) sharedUpdate.procGuide_content = legacy.aboutProcedures;
          StorageEngine.writeGlobal({ ...g, ...sharedUpdate, _aboutProcMigrated: true });
        }
        // توافق مع نسخ سابقة: كان اسم المكتب يُحفظ في officeName قبل فصل هوية الجهة المشتركة
        if (!state.settings.branchName && state.settings.officeName) {
          state.settings.branchName = state.settings.officeName;
        }
        state.seq = { ...fresh.seq, ...(state.seq || {}) };
        state.meta = { ...fresh.meta, ...(state.meta || {}) };
        // توافق مع نسخ سابقة: إعادة هيكلة المحاور الأساسية الأربعة (اللقاءات اليومية،
        // الأنشطة والزيارات، التواصل، الجلسات الأسبوعية) بناءً على التقرير الرسمي —
        // نقل بيانات "الزيارات" القديمة لمحور "الأنشطة والزيارات" الجديد، وترقية أي
        // محور مخصّص كان يمثّل "التواصل" (بحقلين نصيين) إلى محور أساسي ثابت، مرة واحدة
        // فقط لكل مكتب حتى لا يتكرر النقل أو يُفقد شيء.
        if (!state.meta._axesRestructured) {
          if (Array.isArray(state.visits) && state.visits.length) {
            state.activities = (state.activities || []).concat(state.visits.map(r => ({
              id: r.id, month: r.month, year: r.year,
              visits_count: r.visits_count || 0, visitors_count: r.visitors_count || 0,
              official_meetings_count: 0, celebrations_count: 0, updated_at: r.updated_at
            })));
          }
          const commCat = (state.customCategories || []).find(c =>
            c.title && (c.title.includes('التواصل') || c.title.includes('الوجهاء'))
          );
          if (commCat && commCat.valueFields.length >= 2) {
            const [occField, methField] = commCat.valueFields;
            const oldRows = state[commCat.key] || [];
            // محور "التواصل" أصبح بثلاثة حقول (تهنئة/تعزية/طريقة) بدل حقلين (مناسبة/طريقة)
            // — لا يمكن تقسيم بيانات "المناسبة" القديمة تلقائيًا وبثقة بين تهنئة وتعزية،
            // فتُنقَل مبدئيًا إلى "مناسبات التهنئة" (أهون من فقدانها بالكامل)، ويُترك
            // للمستخدم مراجعتها وإعادة تصنيف ما يلزم يدويًا عبر شاشة الإدخال.
            state.communication = (state.communication || []).concat(oldRows.map(r => ({
              id: r.id, month: r.month, year: r.year,
              celebration: r[occField.key] || [], condolence: [], method: r[methField.key] || [],
              updated_at: r.updated_at
            })));
            state.customCategories = state.customCategories.filter(c => c.key !== commCat.key);
            delete state[commCat.key];
            delete state.seq[commCat.key];
          }
          state.meta._axesRestructured = true;
        }
        if (!Array.isArray(state.customCategories)) state.customCategories = [];
        if (typeof state.categoryOverrides !== 'object' || !state.categoryOverrides) state.categoryOverrides = {};
        CORE_TABLES.forEach(t => { if (!Array.isArray(state[t])) state[t] = []; });
        state.customCategories.forEach(c => { if (!Array.isArray(state[c.key])) state[c.key] = []; });
        if (!Array.isArray(state.departments)) state.departments = [];
        if (!Array.isArray(state.activityLog)) state.activityLog = [];
      } else {
        state = seedDefaults(defaultState());
        persist();
        log('system', 'system', 'تهيئة النظام لأول مرة بالبيانات الافتراضية');
        persist();
      }
      return state;
    },

    // ---------- الإعدادات ----------
    getSettings() { return { ...state.settings }; },
    updateSettings(patch) {
      state.settings = { ...state.settings, ...patch };
      log('update', 'settings', 'تم تحديث إعدادات النظام');
      persist();
    },

    // ---------- الإدارات ----------
    listDepartments(activeOnly = false) {
      return state.departments
        .filter(d => !activeOnly || d.active)
        .sort((a, b) => a.name.localeCompare(b.name, 'ar'));
    },
    addDepartment(name) {
      if (state.departments.some(d => d.name === name)) throw new Error('الإدارة موجودة مسبقًا');
      const dept = { id: nextId('departments'), name, active: 1 };
      state.departments.push(dept);
      log('create', 'department', `إضافة إدارة: ${name}`);
      persist();
      return dept;
    },
    updateDepartment(id, patch) {
      const d = state.departments.find(x => x.id === id);
      if (!d) throw new Error('الإدارة غير موجودة');
      Object.assign(d, patch);
      log('update', 'department', `تعديل إدارة: ${d.name}`);
      persist();
    },
    deleteDepartment(id) {
      const d = state.departments.find(x => x.id === id);
      const used = state.requests.some(r => r.department_id === id);
      if (used) throw new Error('لا يمكن حذف الإدارة لوجود بيانات مرتبطة بها. يمكنك إيقافها بدلاً من ذلك.');
      state.departments = state.departments.filter(x => x.id !== id);
      log('delete', 'department', `حذف إدارة: ${d ? d.name : id}`);
      persist();
    },

    // ---------- CRUD عام للجداول الشهرية (موحّد عبر getTableConfig) ----------
    listRecords(table, filters = {}) {
      if (!Array.isArray(state[table])) return [];
      return state[table]
        .filter(r => Object.entries(filters).every(([k, v]) => v === undefined || v === '' || r[k] === v))
        .sort((a, b) => b.year - a.year || b.month - a.month);
    },
    upsertRecord(table, record) {
      const cfg = this.getTableConfig()[table];
      if (!cfg) throw new Error('محور غير معروف: ' + table);
      const arr = state[table];
      const existing = arr.find(r => cfg.keyFields.every(k => r[k] === record[k]));
      const isNew = !existing;
      // نُحدِّث فقط الحقول الموجودة فعليًا في record المُمرَّر — وليس كل valueFields
      // دومًا — حتى لا يُمحى تجميع نصي (تالي) موجود مسبقًا لحقل نصي لم يُرسَل ضمن هذا
      // الحفظ (مثل استيراد CSV أو نموذج الإدخال اليدوي عند وجود حقول نصية في نفس المحور).
      if (existing) {
        cfg.valueFields.forEach(f => { if (f in record) existing[f] = record[f]; });
        existing.updated_at = new Date().toISOString();
      } else {
        const row = { id: nextId(table) };
        cfg.keyFields.forEach(f => { row[f] = record[f]; });
        cfg.valueFields.forEach(f => { row[f] = (f in record) ? record[f] : (cfg.fieldTypes && cfg.fieldTypes[f] === 'text' ? [] : 0); });
        row.updated_at = new Date().toISOString();
        arr.push(row);
      }
      const monthLabel = record.month && record.year ? `${record.month}/${record.year}` : '';
      log(isNew ? 'create' : 'update', table, `${isNew ? 'إضافة' : 'تعديل'} بيانات ${cfg.title} (${monthLabel})`);
      persist();
    },
    /** محور "الطلبات" بشكله الجديد له بنية غنية (مصفوفات إحالات وإجراءات متغيّرة
     *  العدد) لا تناسب النمط العام القائم على valueFields المسطّحة، لذلك له دوال
     *  حفظ/قراءة مخصّصة بدل استخدام upsertRecord/listRecords العامّة. سجل واحد فقط
     *  لكل (شهر/سنة) — لا ارتباط بإدارة، لأن "جهة الإحالة" أصبحت نصًا حرًا لكل صف
     *  إحالة على حدة بدل الارتباط بقائمة الإدارات الثابتة. */
    upsertStructuredRequest(record) {
      const arr = state.requests;
      const typeNorm = (record.requestType || '').trim();
      // المطابقة الآن بالشهر + السنة + نوع الطلب معًا (وليس الشهر والسنة فقط)، حتى
      // تتعايش عدة أنواع طلبات مختلفة ضمن الشهر نفسه دون أن يستبدل أحدها الآخر.
      const existing = arr.find(r => r.month === record.month && r.year === record.year && (r.requestType || '').trim() === typeNorm);
      const isNew = !existing;
      const row = existing || { id: nextId('requests') };
      row.month = record.month;
      row.year = record.year;
      row.requestType = typeNorm;
      row.totalCount = +record.totalCount || 0;
      row.referrals = Array.isArray(record.referrals)
        ? record.referrals.map(r => ({ count: +r.count || 0, destination: (r.destination || '').trim() })).filter(r => r.count > 0 || r.destination)
        : [];
      row.followUpMechanism = record.followUpMechanism === 'other' ? 'other' : 'office';
      row.followUpOther = record.followUpMechanism === 'other' ? (record.followUpOther || '') : '';
      row.inProgressItems = Array.isArray(record.inProgressItems)
        ? record.inProgressItems.map(r => ({ count: +r.count || 0, action: (r.action || '').trim() })).filter(r => r.count > 0 || r.action)
        : [];
      row.completedCount = +record.completedCount || 0;
      row.updated_at = new Date().toISOString();
      if (isNew) arr.push(row);
      const typeLabel = typeNorm ? ` — ${typeNorm}` : '';
      log(isNew ? 'create' : 'update', 'requests', `${isNew ? 'إضافة' : 'تعديل'} بيانات الطلبات (${record.month}/${record.year}${typeLabel})`);
      persist();
      return row;
    },
    getStructuredRequest(month, year, requestType = '') {
      const typeNorm = (requestType || '').trim();
      return state.requests.find(r => r.month === month && r.year === year && (r.requestType || '').trim() === typeNorm) || null;
    },
    /** "إضافة سريعة": يضيف الزيادات المُعطاة إلى القيم الحالية للسجل المطابق (شهر/سنة/
     *  إدارة إن وُجدت) بدل استبدالها بالكامل — مفيد لتحديث بيانات يوم واحد دون الحاجة
     *  لإعادة كتابة مجموع الشهر كله في كل مرة. يُعيد القيم النهائية بعد الإضافة. */
    incrementRecord(table, keys, increments) {
      const cfg = this.getTableConfig()[table];
      if (!cfg) throw new Error('محور غير معروف: ' + table);
      // مهم: نقتصر هنا على الحقول الرقمية الفعلية فقط (لا نوع 'text' التجميعي ولا
      // 'label' النصي البسيط) — المرور على valueFields بالكامل دون تصفية كان يُطبِّق
      // (existing[f] || 0) + (increments[f] || 0) حتى على حقول نصية/مصفوفات تجميع،
      // وجمع مصفوفة مع رقم في JS يُحوِّلها إلى نص عبر الإكراه الضمني وينتج قيمة
      // تالفة مثل "[object Object]0" بدل الحفاظ على التجميع الصحيح. هذا الخلل كان
      // كامنًا دون أن يظهر لأن كل محور سابقًا كان إما أرقامًا بالكامل أو نصوصًا
      // بالكامل، لا مزيجًا من الاثنين ضمن نفس المحور — إلى أن أُضيف حقل نصي لمحور
      // "الجلسات الأسبوعية" الذي يحوي حقولًا رقمية أيضًا.
      const numberFields = cfg.valueFields.filter(f => !cfg.fieldTypes || (cfg.fieldTypes[f] !== 'text' && cfg.fieldTypes[f] !== 'label'));
      const arr = state[table];
      const existing = arr.find(r => cfg.keyFields.every(k => r[k] === keys[k]));
      const isNew = !existing;
      let row;
      if (existing) {
        numberFields.forEach(f => { existing[f] = (existing[f] || 0) + (increments[f] || 0); });
        existing.updated_at = new Date().toISOString();
        row = existing;
      } else {
        row = { id: nextId(table) };
        cfg.keyFields.forEach(k => { row[k] = keys[k]; });
        numberFields.forEach(f => { row[f] = increments[f] || 0; });
        row.updated_at = new Date().toISOString();
        arr.push(row);
      }
      const monthLabel = keys.month && keys.year ? `${keys.month}/${keys.year}` : '';
      log(isNew ? 'create' : 'update', table, `إضافة سريعة ليوم على بيانات ${cfg.title} (${monthLabel})`);
      persist();
      const result = {};
      numberFields.forEach(f => { result[f] = row[f]; });
      return result;
    },
    /** يجمع مجموع التكرارات لحقل نصي (سواء كان مصفوفة تجميع، أو غير موجود بعد) —
     *  يُستخدم لحساب "الإجمالي" لأي حقل نصي بنفس طريقة الحقول الرقمية العادية. */
    sumTextTally(tallyArr) {
      return Array.isArray(tallyArr) ? tallyArr.reduce((s, t) => s + (t.count || 0), 0) : 0;
    },
    /** "إضافة سريعة" لحقل نصي بنظام العدّ — تضيف تكرارًا (أو أكثر) لقيمة نصية معيّنة
     *  ضمن حقل مُعرَّف بنوع "نصي" في محور مخصّص، بدل استبدال القيمة بالكامل. مثال:
     *  حقل "المناسبة" في محور "التواصل مع الوجهاء" — كل إضافة تزيد عدّاد القيمة
     *  المطابقة (مثل "تعزية") أو تنشئ قيمة جديدة إن لم تكن موجودة من قبل. */
    incrementTextTally(table, keys, fieldKey, value, count = 1) {
      const cfg = this.getTableConfig()[table];
      if (!cfg) throw new Error('محور غير معروف: ' + table);
      if (!cfg.valueFields.includes(fieldKey)) throw new Error('حقل غير معروف: ' + fieldKey);
      const valueNorm = (value || '').trim();
      if (!valueNorm) throw new Error('القيمة مطلوبة');
      const arr = state[table];
      let row = arr.find(r => cfg.keyFields.every(k => r[k] === keys[k]));
      const isNew = !row;
      if (!row) {
        row = { id: nextId(table) };
        cfg.keyFields.forEach(k => { row[k] = keys[k]; });
        cfg.valueFields.forEach(f => { row[f] = cfg.fieldTypes[f] === 'text' ? [] : 0; });
        arr.push(row);
      }
      if (!Array.isArray(row[fieldKey])) row[fieldKey] = [];
      const entry = row[fieldKey].find(t => t.value === valueNorm);
      if (entry) entry.count += count;
      else row[fieldKey].push({ value: valueNorm, count });
      row.updated_at = new Date().toISOString();
      const monthLabel = keys.month && keys.year ? `${keys.month}/${keys.year}` : '';
      log(isNew ? 'create' : 'update', table, `إضافة سريعة (${valueNorm}) على بيانات ${cfg.title} (${monthLabel})`);
      persist();
      return row[fieldKey];
    },
    deleteRecord(table, id) {
      const cfg = this.getTableConfig()[table];
      state[table] = state[table].filter(r => r.id !== id);
      log('delete', table, `حذف سجل من ${cfg ? cfg.title : table} (#${id})`);
      persist();
    },

    // ---------- سجل النشاط ----------
    getActivityLog(limit = 50) {
      return [...state.activityLog].reverse().slice(0, limit);
    },

    // ---------- سلامة البيانات ----------
    dataHealth() {
      const cfg = this.getTableConfig();
      const tables = this.getRecordTables();
      const counts = {};
      tables.forEach(t => { counts[t] = (state[t] || []).length; });
      const totalRecords = Object.values(counts).reduce((s, v) => s + v, 0);

      const allRows = tables.flatMap(t => (state[t] || []).map(r => ({ table: t, ...r })));
      const years = allRows.map(r => r.year).filter(Boolean);
      const earliestYear = years.length ? Math.min(...years) : null;
      const latestYear = years.length ? Math.max(...years) : null;

      const issues = [];
      const activeDeptIds = new Set(state.departments.map(d => d.id));

      tables.forEach(t => {
        const c = cfg[t];
        (state[t] || []).forEach(r => {
          c.valueFields.forEach(f => {
            if (typeof r[f] !== 'number' || r[f] < 0) {
              issues.push({ severity: 'error', message: `قيمة غير منطقية (${c.labels[f]}) في سجل ${c.title} بتاريخ ${r.month}/${r.year}` });
            }
          });
          if (t === 'requests') {
            if (r.completed + r.in_progress !== r.total) {
              issues.push({ severity: 'warning', message: `في سجل الطلبات بتاريخ ${r.month}/${r.year}: مجموع (المنجزة + تحت الإجراء) لا يساوي الإجمالي` });
            }
            if (!activeDeptIds.has(r.department_id)) {
              issues.push({ severity: 'warning', message: `سجل طلبات بتاريخ ${r.month}/${r.year} يشير إلى إدارة غير موجودة` });
            }
          }
        });
      });

      return {
        counts, totalRecords, earliestYear, latestYear,
        departmentsCount: state.departments.length,
        lastModifiedAt: state.meta.lastModifiedAt,
        lastBackupAt: state.settings.lastBackupAt,
        storageSizeKB: StorageEngine.estimateSizeKB(),
        issues
      };
    },

    // ---------- النسخ الاحتياطي ----------
    // يشمل النسخ الاحتياطي الكامل بيانات هذا المكتب (state) والإعدادات المشتركة بين
    // المكتبين معًا (هوية الجهة، القوالب، بيانات الدخول...) في ملف واحد. الصيغة تدعم
    // أيضًا استيراد ملفات النسخ الاحتياطي القديمة (بيانات المكتب فقط دون الإعدادات
    // المشتركة، أو دون البيانات الوصفية الغنية المُضافة لاحقًا).

    /** أسماء جداول بيانات المحاور المخصّصة (غير الأساسية) — تُحسَب من customCategories
     *  نفسها لأن أسماء مفاتيحها ديناميكية (لا تُعرَف مسبقًا كـCORE_TABLES). */
    _customTableKeys() { return (state.customCategories || []).map(c => c.key); },

    /** يبني كائن البيانات الوصفية الغنية المرفقة مع كل نسخة احتياطية — تُحتسب من
     *  المحتوى الفعلي وقت التصدير، لا قيم ثابتة. */
    _backupMeta(type, workspacePart, globalPart) {
      let recordCount = 0;
      if (workspacePart) {
        CORE_TABLES.concat(this._customTableKeys()).forEach(t => { recordCount += (workspacePart[t] || []).length; });
      }
      const attachmentFields = ['organizationLogo', 'coverBackground', 'reportBackgroundPortrait', 'reportBackgroundLandscape', 'landingCardBackground'];
      const attachmentCount = globalPart ? attachmentFields.filter(f => globalPart[f]).length : 0;
      return {
        schemaVersion: SCHEMA_VERSION,
        backupType: type, // 'full' | 'stats' | 'settings' | 'media'
        createdAt: new Date().toISOString(),
        recordCount,
        departmentCount: workspacePart ? (workspacePart.departments || []).length : 0,
        attachmentCount
      };
    },

    /** type: 'full' (كل شيء) | 'stats' (بيانات المحاور فقط) | 'settings' (الإعدادات
     *  فقط بلا سجلات) | 'media' (الشعار والخلفيات فقط). */
    exportBackup(type = 'full') {
      state.settings.lastBackupAt = new Date().toISOString();
      const g = StorageEngine.readGlobal() || {};
      let workspacePart = null, globalPart = null;

      if (type === 'full') {
        workspacePart = state; globalPart = g;
      } else if (type === 'stats') {
        workspacePart = { departments: state.departments, customCategories: state.customCategories, categoryOverrides: state.categoryOverrides, seq: state.seq };
        CORE_TABLES.concat(this._customTableKeys()).forEach(t => { workspacePart[t] = state[t]; });
      } else if (type === 'settings') {
        workspacePart = { settings: state.settings, categoryOverrides: state.categoryOverrides };
        const { coverBackground, reportBackgroundPortrait, reportBackgroundLandscape, landingCardBackground, ...restGlobal } = g;
        globalPart = restGlobal;
      } else if (type === 'media') {
        globalPart = {};
        ['organizationLogo', 'coverBackground', 'reportBackgroundPortrait', 'reportBackgroundLandscape', 'landingCardBackground'].forEach(f => { if (g[f]) globalPart[f] = g[f]; });
      }

      const meta = this._backupMeta(type, workspacePart, globalPart);
      const backup = { ...meta, workspaceState: workspacePart, globalSettings: globalPart };
      const json = JSON.stringify(backup, null, 2);
      log('backup', 'system', `تم تصدير نسخة احتياطية (${{ full: 'شاملة', stats: 'إحصاءات فقط', settings: 'إعدادات فقط', media: 'وسائط فقط' }[type]})`);
      this._logBackupHistory({ ...meta, sizeKB: Math.round(json.length / 1024 * 10) / 10 }, json);
      persist();
      return json;
    },

    /** يتحقق من صحة الملف ويُرجع ملخصًا لعرضه على المستخدم قبل أي تنفيذ فعلي —
     *  لا يُغيّر أي بيانات، فحص فقط. */
    inspectBackupFile(jsonText) {
      let parsed;
      try { parsed = JSON.parse(jsonText); } catch (e) { throw new Error('ملف غير صالح: ليس بصيغة JSON سليمة'); }
      if (typeof parsed !== 'object' || parsed === null) throw new Error('ملف غير صالح: التنسيق غير متعرف عليه');
      const workspacePart = parsed.workspaceState;
      const isLegacy = !('backupType' in parsed);
      // التوافق مع النسخ القديمة (قبل هذا التحسين): إما بيانات المكتب مباشرة على
      // المستوى الأعلى، أو بصيغة workspaceState بلا بيانات وصفية غنية.
      const effectiveWorkspace = workspacePart || (isLegacy && !parsed.globalSettings ? parsed : null);
      if (effectiveWorkspace) {
        const backupType = parsed.backupType || 'full';
        // كل نوع نسخة له متطلباته الخاصة — نسخة "إحصاءات فقط" مثلًا لا تحوي settings
        // بتصميم صحيح، فلا يصح مطالبتها به. النسخ القديمة (isLegacy) تُفترض كاملة.
        let required = [];
        if (isLegacy || backupType === 'full') required = ['departments', 'settings', ...CORE_TABLES];
        else if (backupType === 'stats') required = ['departments', ...CORE_TABLES];
        else if (backupType === 'settings') required = ['settings'];
        const missing = required.filter(k => !(k in effectiveWorkspace));
        if (missing.length) throw new Error('ملف غير صالح: يفتقد إلى بيانات أساسية (' + missing.join(', ') + ')');
      }
      if (!parsed.workspaceState && !parsed.globalSettings && !isLegacy) {
        throw new Error('ملف غير صالح: لا يحوي أي بيانات قابلة للاستيراد');
      }
      if (parsed.schemaVersion && parsed.schemaVersion > SCHEMA_VERSION) {
        throw new Error(`هذا الملف من إصدار أحدث من النظام الحالي (${parsed.schemaVersion} > ${SCHEMA_VERSION}) — يُرجى تحديث النظام أولًا قبل الاستيراد`);
      }
      let recordCount = 0;
      if (workspacePart) CORE_TABLES.concat((workspacePart.customCategories || []).map(c => c.key)).forEach(t => { recordCount += (workspacePart[t] || []).length; });
      return {
        parsed,
        backupType: parsed.backupType || 'full (نسخة قديمة)',
        createdAt: parsed.createdAt || null,
        schemaVersion: parsed.schemaVersion || null,
        recordCount: parsed.recordCount ?? recordCount,
        departmentCount: parsed.departmentCount ?? (workspacePart ? (workspacePart.departments || []).length : 0),
        attachmentCount: parsed.attachmentCount ?? null,
        sizeKB: Math.round(jsonText.length / 1024 * 10) / 10,
        isLegacy
      };
    },

    validateBackup(parsed) { this.inspectBackupFile(JSON.stringify(parsed)); return true; }, // للتوافق الخلفي

    /** mode: 'merge' (الافتراضي الآمن — يضيف السجلات غير الموجودة فقط، لا يمسّ أي
     *  سجل حالي) | 'update' (يستبدل قيمة السجلات المشتركة بمحتوى النسخة، ويضيف غير
     *  الموجود، دون حذف أي سجل آخر) | 'replace' (استبدال كامل — يمسح كل شيء أولًا).
     *  يُرجع تقريرًا تفصيليًا بعد التنفيذ. */
    importBackup(jsonText, mode = 'replace') {
      const t0 = Date.now();
      const { parsed } = this.inspectBackupFile(jsonText);
      const workspacePart = parsed.workspaceState || (!parsed.globalSettings ? parsed : null);
      const report = { added: 0, updated: 0, skipped: 0, errors: 0, mode };

      if (mode === 'replace') {
        const fresh = defaultState();
        if (workspacePart) {
          state = {
            ...fresh, ...workspacePart,
            settings: { ...fresh.settings, ...(workspacePart.settings || {}) },
            seq: { ...fresh.seq, ...(workspacePart.seq || {}) }
          };
          CORE_TABLES.concat(this._customTableKeys()).forEach(t => { report.added += (state[t] || []).length; });
        }
      } else {
        // merge/update: نمرّ على كل جدول بيانات (أساسي أو مخصّص) موجود في النسخة،
        // ونُطبِّق upsertRecord/upsertStructuredRequest سجلًا سجلًا — وهو بالضبط نفس
        // منطق "الإدخال اليدوي" المستخدم أصلًا، فنضمن اتساقًا تامًا مع بقية النظام
        // بدل إعادة اختراع منطق دمج منفصل.
        if (workspacePart) {
          if (Array.isArray(workspacePart.departments)) {
            workspacePart.departments.forEach(d => {
              try {
                const exists = state.departments.some(x => x.name === d.name);
                if (!exists) { this.addDepartment(d.name); report.added++; }
                else report.skipped++;
              } catch (e) { report.errors++; }
            });
          }
          ['requests', 'activities', 'communication', 'weekly_sessions'].forEach(table => {
            (workspacePart[table] || []).forEach(rec => {
              try {
                const cfg = this.getTableConfig()[table];
                const keys = {}; cfg.keyFields.forEach(k => { keys[k] = rec[k]; });
                if (table === 'requests') keys.requestType = rec.requestType;
                const existing = table === 'requests'
                  ? this.getStructuredRequest(rec.month, rec.year, rec.requestType)
                  : state[table].find(r => cfg.keyFields.every(k => r[k] === rec[k]));
                if (existing && mode === 'merge') { report.skipped++; return; }
                if (table === 'requests') this.upsertStructuredRequest(rec);
                else this.upsertRecord(table, rec);
                existing ? report.updated++ : report.added++;
              } catch (e) { report.errors++; }
            });
          });
          (workspacePart.customCategories || []).forEach(cc => {
            try {
              if (!state.customCategories.some(x => x.key === cc.key)) {
                state.customCategories.push(cc);
                state.seq[cc.key] = state.seq[cc.key] || 0;
                if (!state[cc.key]) state[cc.key] = [];
              }
            } catch (e) { report.errors++; }
          });
        }
      }

      if (parsed.globalSettings && (mode === 'replace' || mode === 'update')) {
        const currentGlobal = StorageEngine.readGlobal() || {};
        StorageEngine.writeGlobal(mode === 'replace' ? parsed.globalSettings : { ...currentGlobal, ...parsed.globalSettings });
      } else if (parsed.globalSettings && mode === 'merge') {
        const currentGlobal = StorageEngine.readGlobal() || {};
        const merged = { ...parsed.globalSettings, ...currentGlobal }; // القيم الحالية تبقى أولوية في الدمج الآمن
        StorageEngine.writeGlobal(merged);
      }

      report.durationMs = Date.now() - t0;
      log('restore', 'system', `تم استيراد نسخة احتياطية (${{ merge: 'دمج', update: 'تحديث', replace: 'استبدال كامل' }[mode]}) — أُضيف ${report.added}، حُدِّث ${report.updated}، تُجوهل ${report.skipped}`);
      persist();
      return report;
    },

    // ---------- سجل النسخ الاحتياطية ----------
    /** يُخزَّن آخر ١٠ نسخ فقط (بمحتواها الكامل، لإتاحة إعادة التنزيل) لتفادي تضخّم
     *  التخزين المحلي بلا حدود؛ الأقدم يُحذف تلقائيًا عند تجاوز الحد. */
    _logBackupHistory(meta, content) {
      if (!state.settings.backupHistory) state.settings.backupHistory = [];
      state.settings.backupHistory.unshift({
        id: 'bkp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        ...meta,
        filename: this._backupFilename(meta.backupType),
        content
      });
      state.settings.backupHistory = state.settings.backupHistory.slice(0, 10);
    },
    _backupFilename(type) {
      const stamp = new Date().toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
      const label = { full: 'كاملة', stats: 'إحصاءات', settings: 'إعدادات', media: 'وسائط' }[type] || type;
      return `نسخة-احتياطية-${label}_${stamp}.json`;
    },
    listBackupHistory() { return state.settings.backupHistory || []; },
    deleteBackupHistoryEntry(id) {
      state.settings.backupHistory = (state.settings.backupHistory || []).filter(b => b.id !== id);
      persist();
    },

    resetAll() {
      state = seedDefaults(defaultState());
      log('reset', 'system', 'تمت إعادة تعيين النظام بالكامل إلى الحالة الافتراضية');
      persist();
    }
  };
})();


/* ===== auth.js ===== */
/**
 * ===== الصلاحيات (Auth) =====
 * ثلاثة مستويات ثابتة: admin (مسؤول النظام، صلاحيات كاملة دومًا)، supervisor (مشرف)،
 * employee (موظف). هذه الحسابات **مشتركة بين المكتبين** (وليست خاصة بمكتب واحد)،
 * لأن تسجيل الدخول يحدث قبل اختيار أي مكتب أصلًا — تمامًا مثل هوية الجهة الرئيسية.
 *
 * ⚠️ تنبيه مهم: هذا نظام "فصل استخدام" (Access Gating) لمنع التعديل العرضي بين عدة
 * أشخاص يستخدمون نفس الجهاز — وليس نظام حماية أمنية حقيقية. النظام كامل يعمل محليًا
 * في المتصفح دون خادم، وأي بيانات الدخول محفوظة كنص عادي يمكن لأي شخص لديه معرفة
 * تقنية بسيطة الوصول إليها عبر أدوات المطوّر في المتصفح. لا تستخدمه لحماية معلومات
 * حسّاسة فعليًا — دوره منع الأخطاء العرضية بين الموظفين، لا أكثر.
 */
const Auth = {
  currentRole: null, // 'admin' | 'supervisor' | 'employee' | null قبل تسجيل الدخول

  DEFAULT_AUTH: {
    admin: { username: 'admin', password: 'admin123' },
    supervisor: {
      username: 'supervisor', password: 'super123', enabled: true, expiresAt: null,
      permissions: { settings_general: true, settings_fields: true, settings_departments: true, settings_health: true, settings_backup: false, about_edit: true }
    },
    employee: {
      username: 'employee', password: 'employee123', enabled: true, expiresAt: null,
      permissions: { settings_general: false, settings_fields: false, settings_departments: false, settings_health: false, settings_backup: false, about_edit: false }
    }
  },

  /** يُنشئ بيانات الدخول الافتراضية لأول مرة فقط. يحاول أيضًا استعارة بيانات مسؤول
   *  النظام من أي مكتب كان يحتفظ ببيانات دخول خاصة به من نسخة سابقة للنظام (قبل أن
   *  تصبح الحسابات مشتركة)، حتى لا يفقد المستخدم أي تخصيص سابق. */
  ensureDefaults() {
    const g = StorageEngine.readGlobal() || {};
    if (g.auth) return;
    let auth = this.DEFAULT_AUTH;
    const office1Raw = localStorage.getItem(StorageEngine.keyFor('office1'));
    if (office1Raw) {
      try {
        const parsed = JSON.parse(office1Raw);
        if (parsed.auth) auth = parsed.auth;
      } catch (e) { /* تجاهل، استخدم الافتراضي */ }
    }
    StorageEngine.writeGlobal({ ...g, auth });
  },

  getAuth() {
    const g = StorageEngine.readGlobal() || {};
    return g.auth || this.DEFAULT_AUTH;
  },

  login(username, password) {
    const auth = this.getAuth();
    for (const role of ['admin', 'supervisor', 'employee']) {
      if (auth[role].username === username && auth[role].password === password) {
        if (role !== 'admin') {
          if (auth[role].enabled === false) return { success: false, reason: 'disabled' };
          if (this.isExpired(auth[role])) return { success: false, reason: 'expired' };
        }
        this.currentRole = role;
        return { success: true, role };
      }
    }
    return { success: false, reason: 'invalid' };
  },

  /** هل تجاوز هذا الحساب تاريخ انتهاء صلاحيته المحدَّد؟ حساب بلا تاريخ = لا ينتهي أبدًا. */
  isExpired(roleAuth) {
    if (!roleAuth || !roleAuth.expiresAt) return false;
    return new Date(roleAuth.expiresAt) < new Date();
  },

  logout() { this.currentRole = null; },

  isAdmin() { return this.currentRole === 'admin'; },

  updateRoleCredentials(role, { username, password }) {
    const g = StorageEngine.readGlobal() || {};
    const auth = { ...this.getAuth() };
    if (!auth[role]) throw new Error('دور غير معروف');
    auth[role] = { ...auth[role] };
    if (username && username.trim()) auth[role].username = username.trim();
    if (password && password.trim()) auth[role].password = password.trim();
    StorageEngine.writeGlobal({ ...g, auth });
  },

  updateRolePermissions(role, permissions) {
    if (role === 'admin') throw new Error('صلاحيات مسؤول النظام ثابتة ولا يمكن تعديلها');
    const g = StorageEngine.readGlobal() || {};
    const auth = { ...this.getAuth() };
    if (!auth[role]) throw new Error('دور غير معروف');
    auth[role] = { ...auth[role], permissions: { ...auth[role].permissions, ...permissions } };
    StorageEngine.writeGlobal({ ...g, auth });
  },

  /** يضبط تفعيل/تعطيل حساب وتاريخ انتهاء صلاحيته (اختياري) — لمسؤول النظام فقط،
   *  ولا تنطبق على حساب مسؤول النظام نفسه أبدًا (يبقى دائمًا مفعّلًا بلا انتهاء). */
  updateRoleExpiry(role, { enabled, expiresAt }) {
    if (role === 'admin') throw new Error('لا ينطبق على حساب مسؤول النظام');
    const g = StorageEngine.readGlobal() || {};
    const auth = { ...this.getAuth() };
    if (!auth[role]) throw new Error('دور غير معروف');
    auth[role] = { ...auth[role], enabled: !!enabled, expiresAt: expiresAt || null };
    StorageEngine.writeGlobal({ ...g, auth });
  },

  /** هل يملك المستخدم الحالي صلاحية معيّنة؟ 'entry' و'reports' أساسيتان لأي حساب
   *  مسجّل دخول (مشرف أو موظف)، و'org_identity' و'manage_users' حكر على مسؤول
   *  النظام دائمًا مهما حدث، وبقية الصلاحيات قابلة للمنح فرديًا. */
  can(permKey) {
    if (this.currentRole === 'admin') return true;
    if (!this.currentRole) return false;
    if (permKey === 'entry' || permKey === 'reports') return true;
    if (permKey === 'org_identity' || permKey === 'manage_users') return false;
    const perms = this.getAuth()[this.currentRole]?.permissions || {};
    return !!perms[permKey];
  },

  /** هل يملك المستخدم الحالي أي صلاحية إعدادات على الإطلاق؟ يُستخدم لإخفاء تبويب
   *  الإعدادات كليًا من القائمة الجانبية إن لم تكن هناك أي صلاحية أصلًا. */
  hasAnySettingsAccess() {
    if (this.currentRole === 'admin') return true;
    return ['settings_general', 'settings_fields', 'settings_departments', 'settings_health', 'settings_backup']
      .some(p => this.can(p));
  }
};


/* ===== analytics.js ===== */
/**
 * ===== طبقة التحليلات (Analytics) =====
 * كل حساب أو تجميع يظهر في أي شاشة (لوحة التحكم، الرسوم البيانية، مؤشرات الأداء، التقارير)
 * يمر من هنا فقط. لا تكرّر أي صفحة عمليات الجمع بنفسها — هذا يضمن أن الرقم نفسه
 * يظهر بنفس القيمة في كل مكان، ويجعل تعديل منطق الحساب مركزيًا في مكان واحد.
 *
 * المحاور الأربعة الأساسية: الطلبات (اللقاءات اليومية) — الأنشطة والزيارات —
 * التواصل — الجلسات الأسبوعية. مبنية على التقرير الرسمي الشهري المرفوع لسمو الأمير.
 */
const Analytics = {
  /** الطلبات بنية غنية وليست حقولًا مسطّحة: العدد الإجمالي والمنجزة مباشرة على
   *  السجل، بينما "تحت الإجراء" و"المُحالة" مجموع مصفوفات متغيّرة العدد. */
  _sumRequests(year, month = null) {
    const rows = DataLayer.listRecords('requests', { year }).filter(r => month === null || r.month === month);
    return {
      t: rows.reduce((s, r) => s + (r.totalCount || 0), 0),
      c: rows.reduce((s, r) => s + (r.completedCount || 0), 0),
      p: rows.reduce((s, r) => s + (r.inProgressItems || []).reduce((s2, x) => s2 + (x.count || 0), 0), 0),
      referred: rows.reduce((s, r) => s + (r.referrals || []).reduce((s2, x) => s2 + (x.count || 0), 0), 0)
    };
  },
  /** تجميع "عدد الطلبات المحالة" حسب نص "جهة الإحالة" عبر كل السجلات المُعطاة. */
  _referralBreakdown(rows) {
    const map = {};
    rows.forEach(r => (r.referrals || []).forEach(x => {
      const key = (x.destination || '').trim() || 'غير محدد';
      map[key] = (map[key] || 0) + (x.count || 0);
    }));
    return Object.entries(map)
      .map(([name, total]) => ({ name, total }))
      .filter(x => x.total > 0)
      .sort((a, b) => b.total - a.total);
  },
  _sumSimple(table, col, year, month = null) {
    return DataLayer.listRecords(table, { year })
      .filter(r => month === null || r.month === month)
      .reduce((s, r) => s + (r[col] || 0), 0);
  },
  /** جمع حقل نصي تراكمي (مصفوفة {value,count}) عبر كل السجلات — لمحور "التواصل". */
  _sumTextField(table, col, year, month = null) {
    return DataLayer.listRecords(table, { year })
      .filter(r => month === null || r.month === month)
      .reduce((s, r) => s + DataLayer.sumTextTally(r[col]), 0);
  },
  /** تفصيل قيم حقل نصي تراكمي (مثل "المناسبة": تعزية×3، عزاء×1) عبر مجموعة سجلات. */
  _textFieldBreakdown(rows, col) {
    const map = {};
    rows.forEach(r => (r[col] || []).forEach(t => {
      const key = (t.value || '').trim() || 'غير محدد';
      map[key] = (map[key] || 0) + (t.count || 0);
    }));
    return Object.entries(map)
      .map(([name, total]) => ({ name, total }))
      .filter(x => x.total > 0)
      .sort((a, b) => b.total - a.total);
  },
  _pctChange(now, prev) {
    return prev ? Math.round(((now - prev) / prev) * 1000) / 10 : (now > 0 ? 100 : 0);
  },

  dashboard(year) {
    const rNow = this._sumRequests(year), rPrev = this._sumRequests(year - 1);
    const visNow = this._sumSimple('activities', 'visits_count', year), visPrev = this._sumSimple('activities', 'visits_count', year - 1);
    const vrNow = this._sumSimple('activities', 'visitors_count', year), vrPrev = this._sumSimple('activities', 'visitors_count', year - 1);
    const omNow = this._sumSimple('activities', 'official_meetings_count', year), omPrev = this._sumSimple('activities', 'official_meetings_count', year - 1);
    const celNow = this._sumSimple('activities', 'celebrations_count', year), celPrev = this._sumSimple('activities', 'celebrations_count', year - 1);
    const commCelNow = this._sumTextField('communication', 'celebration', year), commCelPrev = this._sumTextField('communication', 'celebration', year - 1);
    const commConNow = this._sumTextField('communication', 'condolence', year), commConPrev = this._sumTextField('communication', 'condolence', year - 1);
    const methNow = this._sumTextField('communication', 'method', year), methPrev = this._sumTextField('communication', 'method', year - 1);
    const sesNow = this._sumSimple('weekly_sessions', 'sessions_count', year), sesPrev = this._sumSimple('weekly_sessions', 'sessions_count', year - 1);
    const sesAttNow = this._sumSimple('weekly_sessions', 'attendees_count', year), sesAttPrev = this._sumSimple('weekly_sessions', 'attendees_count', year - 1);

    const rateNow = rNow.t ? Math.round((rNow.c / rNow.t) * 1000) / 10 : 0;
    const ratePrev = rPrev.t ? Math.round((rPrev.c / rPrev.t) * 1000) / 10 : 0;

    return {
      year,
      cards: {
        total_requests: { value: rNow.t, change: this._pctChange(rNow.t, rPrev.t) },
        completed_requests: { value: rNow.c, change: this._pctChange(rNow.c, rPrev.c) },
        in_progress_requests: { value: rNow.p, change: this._pctChange(rNow.p, rPrev.p) },
        referred_requests: { value: rNow.referred, change: this._pctChange(rNow.referred, rPrev.referred) },
        // نسبة الإنجاز تُقارن بفارق النقاط المئوية وليس بنسبة تغيّر نسبية، لأن ذلك أوضح وأدق لقارئ التقرير
        completion_rate: { value: rateNow, changePoints: Math.round((rateNow - ratePrev) * 10) / 10 },
        total_visits: { value: visNow, change: this._pctChange(visNow, visPrev) },
        total_visitors: { value: vrNow, change: this._pctChange(vrNow, vrPrev) },
        total_official_meetings: { value: omNow, change: this._pctChange(omNow, omPrev) },
        total_celebrations: { value: celNow, change: this._pctChange(celNow, celPrev) },
        total_communication_celebrations: { value: commCelNow, change: this._pctChange(commCelNow, commCelPrev) },
        total_communication_condolences: { value: commConNow, change: this._pctChange(commConNow, commConPrev) },
        total_communication_methods: { value: methNow, change: this._pctChange(methNow, methPrev) },
        total_sessions: { value: sesNow, change: this._pctChange(sesNow, sesPrev) },
        total_session_attendees: { value: sesAttNow, change: this._pctChange(sesAttNow, sesAttPrev) }
      }
    };
  },

  chartsData(year) {
    const months = Array.from({ length: 12 }, (_, i) => i + 1);
    const byMonth = (table, col) => months.map(m => this._sumSimple(table, col, year, m));
    const reqByMonth = months.map(m => this._sumRequests(year, m));
    const byReferral = this._referralBreakdown(DataLayer.listRecords('requests', { year }));
    const commRows = DataLayer.listRecords('communication', { year });

    return {
      year, monthNames: MONTHS,
      requests_total: reqByMonth.map(r => r.t),
      requests_completed: reqByMonth.map(r => r.c),
      requests_in_progress: reqByMonth.map(r => r.p),
      visits: byMonth('activities', 'visits_count'),
      visitors: byMonth('activities', 'visitors_count'),
      official_meetings: byMonth('activities', 'official_meetings_count'),
      celebrations: byMonth('activities', 'celebrations_count'),
      sessions: byMonth('weekly_sessions', 'sessions_count'),
      session_attendees: byMonth('weekly_sessions', 'attendees_count'),
      by_referral: byReferral,
      by_celebration: this._textFieldBreakdown(commRows, 'celebration'),
      by_condolence: this._textFieldBreakdown(commRows, 'condolence'),
      by_method: this._textFieldBreakdown(commRows, 'method')
    };
  },

  kpis(year) {
    const r = this._sumRequests(year);
    const monthsWithData = new Set(DataLayer.listRecords('requests', { year }).map(x => x.month)).size || 1;
    const byReferral = this._referralBreakdown(DataLayer.listRecords('requests', { year }));

    const monthlyTotals = Array.from({ length: 12 }, (_, i) => ({ m: i + 1, t: this._sumRequests(year, i + 1).t }))
      .sort((a, b) => b.t - a.t);

    return {
      completion_rate: r.t ? Math.round((r.c / r.t) * 1000) / 10 : 0,
      avg_requests_month: Math.round((r.t / monthsWithData) * 10) / 10,
      avg_visits_month: Math.round((this._sumSimple('activities', 'visits_count', year) / monthsWithData) * 10) / 10,
      avg_visitors_month: Math.round((this._sumSimple('activities', 'visitors_count', year) / monthsWithData) * 10) / 10,
      avg_sessions_month: Math.round((this._sumSimple('weekly_sessions', 'sessions_count', year) / monthsWithData) * 10) / 10,
      top_referral: byReferral[0]?.total ? byReferral[0].name : '—',
      top_month: monthlyTotals[0]?.t ? MONTHS[monthlyTotals[0].m - 1] : '—'
    };
  },

  aggregateRange(fromYear, fromMonth, toYear, toMonth) {
    const inRange = (y, m) => (y > fromYear || (y === fromYear && m >= fromMonth)) && (y < toYear || (y === toYear && m <= toMonth));
    const pick = table => DataLayer.listRecords(table).filter(x => inRange(x.year, x.month));

    const r = pick('requests'), act = pick('activities'), comm = pick('communication'), ws = pick('weekly_sessions');

    const byReferral = this._referralBreakdown(r);
    const sumField = (arr, key) => arr.reduce((s, x) => s + (x[key] || 0), 0);
    const sumNested = (arr, key) => arr.reduce((s, x) => s + (x[key] || []).reduce((s2, y) => s2 + (y.count || 0), 0), 0);

    return {
      period: { fromYear, fromMonth, toYear, toMonth },
      requests: {
        total: sumField(r, 'totalCount'), completed: sumField(r, 'completedCount'),
        in_progress: sumNested(r, 'inProgressItems'), referred: sumNested(r, 'referrals')
      },
      visits: sumField(act, 'visits_count'),
      visitors: sumField(act, 'visitors_count'),
      official_meetings: sumField(act, 'official_meetings_count'),
      celebrations: sumField(act, 'celebrations_count'),
      communication_celebrations: sumNested(comm, 'celebration'),
      communication_condolences: sumNested(comm, 'condolence'),
      communication_methods: sumNested(comm, 'method'),
      sessions: sumField(ws, 'sessions_count'),
      session_attendees: sumField(ws, 'attendees_count'),
      by_referral: byReferral,
      by_celebration: this._textFieldBreakdown(comm, 'celebration'),
      by_condolence: this._textFieldBreakdown(comm, 'condolence'),
      by_method: this._textFieldBreakdown(comm, 'method')
    };
  },

  /** مؤشرات أداء محسوبة لأي فترة تقرير (وليس سنة كاملة فقط)، بناءً على ناتج aggregateRange
   *  نفسه دون أي استعلام إضافي — حساب واحد يُعاد استخدامه، بلا ازدواجية. */
  periodKpis(range) {
    const { fromYear, fromMonth, toYear, toMonth } = range.period;
    const monthsCount = (toYear - fromYear) * 12 + (toMonth - fromMonth) + 1;
    const perMonth = v => monthsCount ? Math.round((v / monthsCount) * 10) / 10 : 0;
    return {
      monthsCount,
      completion_rate: range.requests.total ? Math.round((range.requests.completed / range.requests.total) * 1000) / 10 : 0,
      avg_requests_month: perMonth(range.requests.total),
      avg_visits_month: perMonth(range.visits),
      avg_sessions_month: perMonth(range.sessions),
      top_referral: range.by_referral[0]?.name || '—'
    };
  },

  /** سلسلة شهرية لأي فترة تقرير (وليست سنة كاملة فقط) — تُستخدم لرسم اتجاه الطلبات
   *  وربطها بصريًا بمؤشرات الأداء المحسوبة لنفس الفترة بالضبط. */
  monthlySeries(fromYear, fromMonth, toYear, toMonth) {
    const months = [];
    let y = fromYear, m = fromMonth;
    while (y < toYear || (y === toYear && m <= toMonth)) {
      months.push({ y, m });
      m++; if (m > 12) { m = 1; y++; }
    }
    const labels = months.map(({ y, m }) => `${MONTHS[m - 1].slice(0, 3)} ${y}`);
    const req = months.map(({ y, m }) => this._sumRequests(y, m));
    return {
      labels,
      requests_total: req.map(r => r.t),
      requests_completed: req.map(r => r.c),
      requests_in_progress: req.map(r => r.p),
      visits: months.map(({ y, m }) => this._sumSimple('activities', 'visits_count', y, m)),
      sessions: months.map(({ y, m }) => this._sumSimple('weekly_sessions', 'sessions_count', y, m))
    };
  },

  /** إجمالي كل محور مخصّص (أضافه المستخدم من الإعدادات) لسنة معيّنة — تُستخدم في تبويب
   *  "مؤشرات إضافية" بلوحة التحكم. تعمل تلقائيًا مع أي عدد من المحاور المخصّصة دون تعديل. */
  customCategoryTotals(year) {
    return DataLayer.listCustomCategories().map(c => {
      const rows = DataLayer.listRecords(c.key, { year });
      const cfg = DataLayer.getTableConfig()[c.key];
      const totals = {};
      c.valueFields.forEach(f => {
        if (cfg.fieldTypes[f.key] === 'text') {
          totals[f.key] = rows.reduce((s, r) => s + DataLayer.sumTextTally(r[f.key]), 0);
        } else {
          totals[f.key] = rows.reduce((s, r) => s + (r[f.key] || 0), 0);
        }
      });
      return { key: c.key, title: c.title, fields: c.valueFields, totals };
    });
  },

  /** نفس الفكرة لكن لأي فترة تقرير مخصّصة بدل سنة كاملة. */
  customCategoryRangeTotals(fromYear, fromMonth, toYear, toMonth) {
    const inRange = (y, m) => (y > fromYear || (y === fromYear && m >= fromMonth)) && (y < toYear || (y === toYear && m <= toMonth));
    return DataLayer.listCustomCategories().map(c => {
      const rows = DataLayer.listRecords(c.key).filter(x => inRange(x.year, x.month));
      const cfg = DataLayer.getTableConfig()[c.key];
      const totals = {};
      c.valueFields.forEach(f => {
        if (cfg.fieldTypes[f.key] === 'text') {
          totals[f.key] = rows.reduce((s, r) => s + DataLayer.sumTextTally(r[f.key]), 0);
        } else {
          totals[f.key] = rows.reduce((s, r) => s + (r[f.key] || 0), 0);
        }
      });
      return { key: c.key, title: c.title, fields: c.valueFields, totals };
    });
  },

  earliestDataYear() {
    const all = DataLayer.getRecordTables().flatMap(t => DataLayer.listRecords(t));
    const founding = DataLayer.getSettings().foundingYear;
    if (!all.length) return founding || new Date().getFullYear();
    return Math.min(founding || Infinity, ...all.map(x => x.year));
  }
};


/* ===== charts.js ===== */
/**
 * محرك رسوم بيانية خفيف مبني بالكامل بلغة JavaScript الأصلية (Canvas API)
 * لا يعتمد على أي مكتبة خارجية (لا Chart.js ولا غيرها) — ليتوافق مع متطلب
 * عدم الاعتماد على مكونات خارجية تتطلب اتصالاً بالإنترنت أو تثبيتًا.
 * يدعم: line, bar, doughnut
 */
class MiniChart {
  constructor(canvas, config) {
    this.canvas = canvas;
    this.config = config;
    this.dpr = window.devicePixelRatio || 1;
    this._resize();
    window.addEventListener('resize', () => { this._resize(); this.draw(); });
    this.draw();
  }

  _resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    const cssW = rect.width;
    // ارتفاع الرسم يعتمد على العرض المتاح فعليًا للبطاقة (لا رقم ثابت كبير دائمًا)،
    // بحد أقصى معقول يبقيه متناسبًا مع بقية البطاقات بدل أن يهيمن على الصفحة — كان
    // ثابتًا عند 220-260px بصرف النظر عن ضيق الشاشة (خصوصًا بالوضع الأفقي)، فيبدو
    // ضخمًا جدًا مقارنة ببقية العناصر كما لاحظ المستخدم فعليًا.
    const cssH = Math.max(120, Math.min(cssW * 0.42, 170));
    this.canvas.style.width = cssW + 'px';
    this.canvas.style.height = cssH + 'px';
    this.canvas.width = cssW * this.dpr;
    this.canvas.height = cssH * this.dpr;
    this.ctx = this.canvas.getContext('2d');
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.w = cssW; this.h = cssH;
  }

  draw() {
    const { type } = this.config;
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.w, this.h);
    ctx.font = (this._isNarrow() ? '10px' : '11px') + ' Segoe UI, Tahoma, sans-serif';
    if (type === 'line' || type === 'bar') this._drawCartesian();
    else if (type === 'doughnut') this._drawDoughnut();
  }

  _isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }
  _isNarrow() { return this.w < 380; }
  _gridColor() { return this._isDark() ? '#25342B' : '#E7EAE7'; }
  _textColor() { return this._isDark() ? '#93A69B' : '#5B6B63'; }

  _drawCartesian() {
    const { labels, datasets, type } = this.config;
    const ctx = this.ctx;
    const allValues = datasets.flatMap(d => d.data);
    const maxVal = Math.max(1, ...allValues);
    const niceMax = this._niceMax(maxVal);

    const yLabelWidth = ctx.measureText(this._fmt(niceMax)).width;
    const padL = Math.max(28, yLabelWidth + 12), padR = 10, padT = 16, padB = this._isNarrow() ? 22 : 28;
    const plotW = this.w - padL - padR;
    const plotH = this.h - padT - padB;

    // خطوط الشبكة الأفقية
    ctx.strokeStyle = this._gridColor();
    ctx.fillStyle = this._textColor();
    ctx.lineWidth = 1;
    const steps = 4;
    for (let i = 0; i <= steps; i++) {
      const y = padT + plotH - (plotH * i / steps);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(this.w - padR, y);
      ctx.stroke();
      const val = Math.round(niceMax * i / steps);
      ctx.textAlign = 'right';
      ctx.fillText(this._fmt(val), padL - 6, y + 3);
    }

    // تسميات المحور الأفقي — نُظهر عددًا من التسميات يتناسب مع العرض الفعلي المتاح
    // فقط، بدلاً من قاعدة ثابتة، لضمان عدم تداخل النصوص على شاشات الجوال الضيقة.
    ctx.textAlign = 'center';
    const approxLabelWidth = this._isNarrow() ? 34 : 46; // تقدير عرض تسمية شهر واحدة بالبكسل
    const maxLabelsFit = Math.max(2, Math.floor(plotW / approxLabelWidth));
    const step = Math.max(1, Math.ceil(labels.length / maxLabelsFit));
    labels.forEach((lab, i) => {
      if (i % step !== 0) return;
      const x = padL + plotW * (i + 0.5) / labels.length;
      ctx.fillText(this._isNarrow() ? lab.slice(0, 3) : lab, x, this.h - 8);
    });

    if (type === 'bar') {
      const groupW = plotW / labels.length;
      const barGap = 4;
      const barW = (groupW - barGap * (datasets.length + 1)) / datasets.length;
      datasets.forEach((ds, di) => {
        ctx.fillStyle = ds.color;
        ds.data.forEach((v, i) => {
          const x = padL + groupW * i + barGap + di * (barW + barGap);
          const barH = plotH * (v / niceMax);
          const y = padT + plotH - barH;
          this._roundRect(ctx, x, y, barW, barH, 3);
          ctx.fill();
        });
      });
    } else {
      datasets.forEach(ds => {
        ctx.strokeStyle = ds.color;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ds.data.forEach((v, i) => {
          const x = padL + plotW * (i + 0.5) / labels.length;
          const y = padT + plotH - plotH * (v / niceMax);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        // نقاط
        ctx.fillStyle = ds.color;
        ds.data.forEach((v, i) => {
          const x = padL + plotW * (i + 0.5) / labels.length;
          const y = padT + plotH - plotH * (v / niceMax);
          ctx.beginPath();
          ctx.arc(x, y, 2.6, 0, Math.PI * 2);
          ctx.fill();
        });
      });
    }

    if (datasets.length > 1) this._legend(datasets);
  }

  _drawDoughnut() {
    const { colors } = this.config;
    let { labels, data } = this.config;
    const ctx = this.ctx;

    // حد أقصى لعناصر المفتاح المعروضة كي لا يطول عن ارتفاع اللوحة عند وجود إدارات كثيرة
    const MAX_LEGEND_ITEMS = 6;
    if (labels.length > MAX_LEGEND_ITEMS) {
      const otherSum = data.slice(MAX_LEGEND_ITEMS).reduce((s, v) => s + v, 0);
      labels = [...labels.slice(0, MAX_LEGEND_ITEMS), `أخرى (${labels.length - MAX_LEGEND_ITEMS})`];
      data = [...data.slice(0, MAX_LEGEND_ITEMS), otherSum];
    }

    // نحجز مساحة مستقلة للمفتاح أسفل اللوحة، بحيث لا يتداخل نصه مع الرسم الدائري إطلاقًا
    const legendH = labels.length * (this._isNarrow() ? 14 : 15) + 10;
    const chartAreaH = this.h - legendH;
    const cx = this.w / 2, cy = chartAreaH / 2;
    const radius = Math.min(this.w, chartAreaH) / 2 - 8;
    const total = data.reduce((s, v) => s + v, 0) || 1;
    let start = -Math.PI / 2;

    if (data.every(v => v === 0)) {
      ctx.fillStyle = this._textColor();
      ctx.textAlign = 'center';
      ctx.fillText('لا توجد بيانات', cx, cy);
      return;
    }

    data.forEach((v, i) => {
      const angle = (v / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, start, start + angle);
      ctx.closePath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      start += angle;
    });
    // حفرة الدونات
    ctx.fillStyle = this._isDark() ? '#152019' : '#FFFFFF';
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.58, 0, Math.PI * 2);
    ctx.fill();

    // مفتاح الرسم (Legend) — في مساحته المحجوزة أسفل الرسم، لا فوقه
    ctx.textAlign = 'right';
    ctx.font = (this._isNarrow() ? '9.5px' : '11px') + ' Segoe UI, Tahoma, sans-serif';
    let ly = chartAreaH + 14;
    labels.forEach((lab, i) => {
      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(this.w - 14, ly - 8, 9, 9);
      ctx.fillStyle = this._textColor();
      ctx.fillText(lab, this.w - 20, ly);
      ly += this._isNarrow() ? 14 : 15;
    });
  }

  _legend(datasets) {
    const ctx = this.ctx;
    let x = this.w - 10;
    ctx.font = (this._isNarrow() ? '9px' : '11px') + ' Segoe UI, Tahoma, sans-serif';
    ctx.textAlign = 'right';
    datasets.forEach(ds => {
      const width = ctx.measureText(ds.label).width;
      ctx.fillStyle = ds.color;
      ctx.fillRect(x - width - 14, 4, 9, 9);
      ctx.fillStyle = this._textColor();
      ctx.fillText(ds.label, x, 12);
      x -= (width + 26);
    });
  }

  _roundRect(ctx, x, y, w, h, r) {
    if (h <= 0) { ctx.beginPath(); return; }
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  _niceMax(v) {
    if (v <= 5) return 5;
    const pow = Math.pow(10, Math.floor(Math.log10(v)));
    const n = v / pow;
    let nice;
    if (n <= 1) nice = 1; else if (n <= 2) nice = 2; else if (n <= 5) nice = 5; else nice = 10;
    return nice * pow;
  }
  _fmt(n) { return new Intl.NumberFormat('ar-EG-u-nu-latn').format(n); }
}


/* ===== xlsExport.js ===== */
/**
 * تصدير إلى Excel بدون أي مكتبة خارجية
 * يستخدم صيغة SpreadsheetML (XML) التي يفتحها Excel مباشرة ويدعم عدة أوراق عمل،
 * وهي صيغة نصية خالصة يمكن توليدها بجافاسكريبت الأصلية دون الحاجة لأي مكتبة ضغط أو تحويل.
 */
const XlsExport = {
  escapeXml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  },

  cell(value) {
    const isNum = typeof value === 'number' && !isNaN(value);
    const type = isNum ? 'Number' : 'String';
    return `<Cell><Data ss:Type="${type}">${this.escapeXml(value)}</Data></Cell>`;
  },

  sheet(name, rows) {
    const rowsXml = rows.map(r => `<Row>${r.map(c => this.cell(c)).join('')}</Row>`).join('');
    return `<Worksheet ss:Name="${this.escapeXml(name)}"><Table>${rowsXml}</Table></Worksheet>`;
  },

  /**
   * sheets: [{ name: 'اسم الورقة', rows: [[...], [...]] }, ...]
   */
  download(sheets, fileName) {
    const sheetsXml = sheets.map(s => this.sheet(s.name, s.rows)).join('');
    const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:html="http://www.w3.org/TR/REC-html40">
<Styles>
  <Style ss:ID="Default" ss:Name="Normal"><Alignment ss:Vertical="Bottom" ss:ReadingOrder="RightToLeft"/></Style>
</Styles>
${sheetsXml}
</Workbook>`;
    const blob = new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName.endsWith('.xls') ? fileName : fileName + '.xls';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
};


/* ===== pages/dashboard.js ===== */
/**
 * ===== صفحة لوحة التحكم =====
 * العنصر الرئيسي في النظام. تقرأ فقط من Analytics ولا تحسب أي شيء بنفسها —
 * تُحسب كل الأرقام مرة واحدة في render()، وتُوزَّع بعد ذلك على التصنيفات (Categories)
 * فقط للعرض، دون أي إعادة حساب. هذا يبقي المؤشرات "مصدرًا واحدًا للحقيقة" رغم التقسيم.
 *
 * المحاور الأربعة: اللقاءات اليومية (الطلبات) — الأنشطة والزيارات — التواصل —
 * الجلسات الأسبوعية. مبنية على التقرير الرسمي الشهري المرفوع لسمو الأمير.
 */
const DashboardPage = {
  activeCategory: 'overview',
  _ctx: null, // يحتفظ بآخر بيانات محسوبة (dash/chartData/kpis) لإعادة استخدامها عند تبديل التصنيف

  /** التصنيفات مبنية ديناميكيًا من DataLayer.getTableConfig() بدل عناوين ثابتة، حتى
   *  تنعكس أي إعادة تسمية أو تغيير أيقونة من الإعدادات هنا فورًا. */
  buildBaseCategories() {
    const cfg = DataLayer.getTableConfig();
    return [
      { key: 'overview', title: 'نظرة عامة' },
      { key: 'requests', title: cfg.requests.title },
      { key: 'activities', title: cfg.activities.title },
      { key: 'communication', title: cfg.communication.title },
      { key: 'weekly_sessions', title: cfg.weekly_sessions.title },
      { key: 'performance', title: 'الأداء العام' }
    ];
  },

  render(container, year) {
    const dash = Analytics.dashboard(year);
    const chartData = Analytics.chartsData(year);
    const kpis = Analytics.kpis(year);
    const customTotals = Analytics.customCategoryTotals(year);
    this._ctx = { dash, chartData, kpis, year, customTotals };

    // تبويب "مؤشرات إضافية" يظهر فقط إن وُجدت محاور مخصّصة أضافها المستخدم من الإعدادات
    const base = this.buildBaseCategories();
    this.categories = customTotals.length
      ? [...base, { key: 'custom', title: 'مؤشرات إضافية' }]
      : base;
    if (!this.categories.some(c => c.key === this.activeCategory)) this.activeCategory = 'overview';

    const pct = dash.cards.completion_rate.value;

    container.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-gold btn-small" id="startPresentationBtn" title="عرض تقديمي" aria-label="عرض تقديمي">🖥️</button>
      </div>
      <div class="hero-badge">
        <div class="hero-ring" style="--pct:${pct}">
          <div class="hero-ring-inner">${pct}%</div>
        </div>
        <div class="hero-text">
          <h2>نسبة إنجاز الطلبات لعام ${year}</h2>
          <p>من إجمالي ${fmtNum(dash.cards.total_requests.value)} طلب — ${fmtNum(dash.cards.completed_requests.value)} طلب منجز</p>
        </div>
      </div>

      <div class="tabs" id="dashTabs"></div>
      <div id="dashCategoryBody"></div>
    `;

    document.getElementById('startPresentationBtn').addEventListener('click', () => PresentationPage.startForOffice());
    const tabsEl = document.getElementById('dashTabs');
    tabsEl.innerHTML = this.categories.map(c =>
      `<button class="tab-btn ${c.key === this.activeCategory ? 'active' : ''}" data-cat="${c.key}">${c.title}</button>`
    ).join('');
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.activeCategory = btn.dataset.cat;
        tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        this.renderCategory();
      });
    });

    this.renderCategory();
  },

  card(label, d) {
    let changeHtml = '';
    if (d.changePoints !== undefined) {
      const v = d.changePoints;
      changeHtml = `<div class="change ${v > 0 ? 'up' : v < 0 ? 'down' : 'flat'}">${v > 0 ? '+' : ''}${v} نقطة عن العام السابق</div>`;
    } else if (d.change !== undefined) {
      changeHtml = `<div class="change ${d.change > 0 ? 'up' : d.change < 0 ? 'down' : 'flat'}">${fmtPct(d.change)} عن العام السابق</div>`;
    }
    return `
      <div class="stat-card">
        <div class="label">${label}</div>
        <div class="value">${typeof d.value === 'number' ? fmtNum(d.value) : d.value}</div>
        ${changeHtml}
      </div>`;
  },
  kpiItem(label, value) {
    return `<div class="kpi-item"><div class="kv">${value}</div><div class="kl">${label}</div></div>`;
  },
  chartCard(title, canvasId, full = false) {
    return `<div class="chart-card${full ? ' full' : ''}"><h3>${title}</h3><canvas id="${this._idPrefix || ''}${canvasId}"></canvas></div>`;
  },
  /** قائمة "الأعلى" أفقية مرتبة — تُظهر الاسم والرقم الدقيق أمامه مباشرة، أوضح للقراءة
   *  من رسم دائري حين يكون الترتيب والقيمة الفعلية أهم من مجرّد النسبة البصرية. */
  topListCard(data) {
    const top = data.slice(0, 5);
    if (!top.length) return `<p style="color:var(--text-muted);font-size:12.5px">لا توجد بيانات كافية بعد.</p>`;
    const max = top[0].total || 1;
    return `
      <div class="chart-card full top-list-card">
        ${top.map((x, i) => `
          <div class="top-list-row">
            <div class="top-list-rank">${i + 1}</div>
            <div class="top-list-info">
              <div class="top-list-name">${x.name}</div>
              <div class="top-list-bar-track"><div class="top-list-bar-fill" style="width:${Math.round((x.total / max) * 100)}%"></div></div>
            </div>
            <div class="top-list-value">${fmtNum(x.total)}</div>
          </div>
        `).join('')}
      </div>`;
  },

  /** targetBodyId/categoryOverride اختياريان — تمكّنان إعادة استخدام هذا المنطق نفسه
   *  خارج الصفحة الرئيسية (في العرض التقديمي مثلًا) دون تكرار أي كود، مع تفادي تصادم
   *  معرّفات عناصر الرسوم البيانية عبر بادئة فريدة لكل هدف. */
  renderCategory(targetBodyId, categoryOverride) {
    const { dash, chartData, kpis, customTotals } = this._ctx;
    const c = dash.cards;
    const bodyId = targetBodyId || 'dashCategoryBody';
    const body = document.getElementById(bodyId);
    const cat = categoryOverride || this.activeCategory;
    this._idPrefix = bodyId === 'dashCategoryBody' ? '' : bodyId + '_';

    const tcfg = DataLayer.getTableConfig();
    const reqTitle = tcfg.requests.title;
    const reqTotalLabel = tcfg.requests.labels.totalCount;
    const reqCompletedLabel = tcfg.requests.labels.completedCount;
    const reqInProgressLabel = tcfg.requests.labels.inProgressCount;
    const reqReferralLabel = tcfg.requests.labels.referralCount;
    const referralDestLabel = tcfg.requests.labels.referralDestination;

    const activitiesTitle = tcfg.activities.title;
    const visitsLabel = tcfg.activities.labels.visits_count;
    const visitorsLabel = tcfg.activities.labels.visitors_count;
    const officialMeetingsLabel = tcfg.activities.labels.official_meetings_count;
    const celebrationsLabel = tcfg.activities.labels.celebrations_count;

    const commTitle = tcfg.communication.title;
    const celebrationLabel = tcfg.communication.labels.celebration;
    const condolenceLabel = tcfg.communication.labels.condolence;
    const methodLabel = tcfg.communication.labels.method;

    const sessionsTitle = tcfg.weekly_sessions.title;
    const sessionsLabel = tcfg.weekly_sessions.labels.sessions_count;
    const sessionAttendeesLabel = tcfg.weekly_sessions.labels.attendees_count;

    // أيقونات مأخوذة من إعدادات كل محور نفسها (Settings ← الحقول والمؤشرات)، فتبقى
    // متّسقة مع أي أيقونة يختارها المستخدم لاحقًا، لا ثابتة في الكود.
    const reqIcon = tcfg.requests.icon, activitiesIcon = tcfg.activities.icon;
    const commIcon = tcfg.communication.icon, sessionsIcon = tcfg.weekly_sessions.icon;
    const rateIcon = '🎯', trophyIcon = '🏆', avgIcon = '📈';

    const chartsToBuild = [];

    if (cat === 'overview') {
      body.innerHTML = `
        <div class="section-title">أبرز المؤشرات</div>
        <div class="cards-grid">
          ${this.card(reqTotalLabel, c.total_requests, reqIcon)}
          ${this.card('نسبة الإنجاز', { value: c.completion_rate.value + '%', changePoints: c.completion_rate.changePoints }, rateIcon)}
          ${this.card(visitsLabel, c.total_visits, activitiesIcon)}
          ${this.card(sessionsLabel, c.total_sessions, sessionsIcon)}
          ${this.card(celebrationLabel, c.total_communication_celebrations, commIcon)}
        </div>
        <div class="section-title">لمحة سريعة</div>
        <div class="kpi-grid">
          ${this.kpiItem('أكثر ' + referralDestLabel + ' لـ' + reqTitle, kpis.top_referral, trophyIcon)}
          ${this.kpiItem('أكثر شهر نشاطًا', kpis.top_month, trophyIcon)}
          ${this.kpiItem('متوسط ' + reqTitle + ' الشهري', fmtNum(kpis.avg_requests_month), avgIcon)}
        </div>
        <div class="section-title">الاتجاه العام</div>
        <div class="charts-grid">
          ${this.chartCard('تطور ' + reqTitle + ' حسب الأشهر', 'chartRequestsTrend')}
          ${this.chartCard(visitsLabel + ' حسب الأشهر', 'chartVisitsTrend')}
        </div>
      `;
      chartsToBuild.push(
        ['chartRequestsTrend', { type: 'line', labels: chartData.monthNames, datasets: [{ label: reqTotalLabel, data: chartData.requests_total, color: '#0E4B3D' }] }],
        ['chartVisitsTrend', { type: 'bar', labels: chartData.monthNames, datasets: [{ label: visitsLabel, data: chartData.visits, color: '#B8902F' }] }]
      );

    } else if (cat === 'requests') {
      body.innerHTML = `
        <div class="section-title">مؤشرات ${reqTitle}</div>
        <div class="cards-grid">
          ${this.card(reqTotalLabel, c.total_requests, reqIcon)}
          ${this.card(reqCompletedLabel, c.completed_requests, '✅')}
          ${this.card(reqInProgressLabel, c.in_progress_requests, '⏳')}
          ${this.card(reqReferralLabel, c.referred_requests, '↗️')}
          ${this.card('نسبة الإنجاز', { value: c.completion_rate.value + '%', changePoints: c.completion_rate.changePoints }, rateIcon)}
        </div>
        <div class="kpi-grid" style="margin-top:12px">
          ${this.kpiItem('متوسط ' + reqTitle + ' الشهري', fmtNum(kpis.avg_requests_month), avgIcon)}
          ${this.kpiItem('أكثر ' + referralDestLabel + ' لـ' + reqTitle, kpis.top_referral, trophyIcon)}
        </div>
        <div class="section-title">الرسوم البيانية</div>
        <div class="charts-grid">
          ${this.chartCard('تطور ' + reqTitle + ' حسب الأشهر', 'chartRequestsTrend')}
          ${this.chartCard(reqCompletedLabel + ' مقابل ' + reqInProgressLabel, 'chartRequestsCompare')}
        </div>
        <div class="section-title">أعلى ${referralDestLabel} لـ${reqTitle}</div>
        ${this.topListCard(chartData.by_referral)}
      `;
      chartsToBuild.push(
        ['chartRequestsTrend', { type: 'line', labels: chartData.monthNames, datasets: [{ label: reqTotalLabel, data: chartData.requests_total, color: '#0E4B3D' }] }],
        ['chartRequestsCompare', { type: 'bar', labels: chartData.monthNames, datasets: [
          { label: reqCompletedLabel, data: chartData.requests_completed, color: '#146B54' },
          { label: reqInProgressLabel, data: chartData.requests_in_progress, color: '#B8902F' }
        ]}]
      );

    } else if (cat === 'activities') {
      body.innerHTML = `
        <div class="section-title">${activitiesTitle}</div>
        <div class="cards-grid">
          ${this.card(visitsLabel, c.total_visits, activitiesIcon)}
          ${this.card(visitorsLabel, c.total_visitors, '👥')}
          ${this.card(officialMeetingsLabel, c.total_official_meetings, '🏛️')}
          ${this.card(celebrationsLabel, c.total_celebrations, '🎉')}
        </div>
        <div class="kpi-grid" style="margin-top:12px">
          ${this.kpiItem('متوسط ' + visitsLabel + ' الشهري', fmtNum(kpis.avg_visits_month), avgIcon)}
        </div>
        <div class="section-title">الرسوم البيانية</div>
        <div class="charts-grid">
          ${this.chartCard(visitsLabel + ' حسب الأشهر', 'chartVisits')}
          ${this.chartCard(visitorsLabel + ' حسب الأشهر', 'chartVisitors')}
        </div>
      `;
      chartsToBuild.push(
        ['chartVisits', { type: 'bar', labels: chartData.monthNames, datasets: [{ label: visitsLabel, data: chartData.visits, color: '#1E8A5F' }] }],
        ['chartVisitors', { type: 'line', labels: chartData.monthNames, datasets: [{ label: visitorsLabel, data: chartData.visitors, color: '#7C8B82' }] }]
      );

    } else if (cat === 'communication') {
      body.innerHTML = `
        <div class="section-title">${commTitle}</div>
        <div class="cards-grid">
          ${this.card(celebrationLabel, c.total_communication_celebrations, '🎊')}
          ${this.card(condolenceLabel, c.total_communication_condolences, '🕊️')}
          ${this.card(methodLabel, c.total_communication_methods, commIcon)}
        </div>
        <div class="section-title">التوزيع التفصيلي</div>
        <div class="charts-grid">
          ${this.chartCard(celebrationLabel + ' — التوزيع', 'chartCelebration')}
          ${this.chartCard(condolenceLabel + ' — التوزيع', 'chartCondolence')}
          ${this.chartCard(methodLabel + ' — التوزيع', 'chartMethod', true)}
        </div>
      `;
      chartsToBuild.push(
        ['chartCelebration', { type: 'doughnut', labels: chartData.by_celebration.map(x => x.name), data: chartData.by_celebration.map(x => x.total), colors: ['#0E4B3D','#146B54','#B8902F','#1E8A5F','#7C8B82','#C98A1D'] }],
        ['chartCondolence', { type: 'doughnut', labels: chartData.by_condolence.map(x => x.name), data: chartData.by_condolence.map(x => x.total), colors: ['#7C8B82','#0E4B3D','#146B54','#B8902F','#1E8A5F','#C98A1D'] }],
        ['chartMethod', { type: 'doughnut', labels: chartData.by_method.map(x => x.name), data: chartData.by_method.map(x => x.total), colors: ['#B8902F','#0E4B3D','#146B54','#1E8A5F','#7C8B82','#C98A1D'] }]
      );

    } else if (cat === 'weekly_sessions') {
      body.innerHTML = `
        <div class="section-title">${sessionsTitle}</div>
        <div class="cards-grid">

        </div>
        <div class="kpi-grid" style="margin-top:12px">
